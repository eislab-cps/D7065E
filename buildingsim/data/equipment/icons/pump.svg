<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="pumpVolute" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a6070"/>
      <stop offset="100%" stop-color="#1e2a34"/>
    </linearGradient>
    <linearGradient id="pumpMotor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a4a55"/>
      <stop offset="100%" stop-color="#1e2830"/>
    </linearGradient>
    <radialGradient id="pumpImp" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#334455"/>
      <stop offset="100%" stop-color="#1a2530"/>
    </radialGradient>
  </defs>
  <!-- Base plate -->
  <rect x="12" y="98" width="104" height="10" rx="2" fill="#1a2030"/>
  <rect x="12" y="98" width="104" height="3" rx="1" fill="#2a3040"/>
  <!-- Base bolt holes -->
  <circle cx="24" cy="103" r="3" fill="#1a2030"/><circle cx="24" cy="103" r="2" fill="#334455"/>
  <circle cx="48" cy="103" r="3" fill="#1a2030"/><circle cx="48" cy="103" r="2" fill="#334455"/>
  <circle cx="80" cy="103" r="3" fill="#1a2030"/><circle cx="80" cy="103" r="2" fill="#334455"/>
  <circle cx="104" cy="103" r="3" fill="#1a2030"/><circle cx="104" cy="103" r="2" fill="#334455"/>
  <!-- Volute casing -->
  <circle cx="42" cy="72" r="34" fill="url(#pumpVolute)"/>
  <circle cx="42" cy="72" r="34" fill="none" stroke="#667788" stroke-width="1.2" opacity="0.5"/>
  <!-- Volute highlight -->
  <path d="M18 60 A34 34 0 0 1 60 42" fill="none" stroke="#88aacc" stroke-width="2" opacity="0.2"/>
  <!-- Impeller visible inside -->
  <circle cx="42" cy="72" r="20" fill="url(#pumpImp)"/>
  <!-- Impeller vanes -->
  <path d="M42 52 Q52 56 50 64 Q44 60 42 52Z" fill="#3a5060" opacity="0.8"/>
  <path d="M62 72 Q58 82 50 80 Q54 74 62 72Z" fill="#3a5060" opacity="0.8"/>
  <path d="M42 92 Q32 88 34 80 Q40 84 42 92Z" fill="#3a5060" opacity="0.8"/>
  <path d="M22 72 Q26 62 34 64 Q30 70 22 72Z" fill="#3a5060" opacity="0.8"/>
  <circle cx="42" cy="72" r="6" fill="#2a3845"/>
  <circle cx="42" cy="72" r="3" fill="#88aacc" opacity="0.4"/>
  <!-- Inlet flange (left) -->
  <rect x="6" y="64" width="14" height="16" rx="3" fill="#2a3845"/>
  <rect x="6" y="64" width="14" height="16" rx="3" fill="none" stroke="#445566" stroke-width="0.8"/>
  <!-- Inlet flange bolts -->
  <circle cx="9" cy="67" r="2" fill="#1a2030"/><circle cx="9" cy="75" r="2" fill="#1a2030"/>
  <circle cx="17" cy="67" r="2" fill="#1a2030"/><circle cx="17" cy="75" r="2" fill="#1a2030"/>
  <!-- Outlet flange (top) -->
  <rect x="34" y="34" width="16" height="12" rx="3" fill="#2a3845"/>
  <rect x="34" y="34" width="16" height="12" rx="3" fill="none" stroke="#445566" stroke-width="0.8"/>
  <circle cx="37" cy="37" r="2" fill="#1a2030"/><circle cx="37" cy="43" r="2" fill="#1a2030"/>
  <circle cx="47" cy="37" r="2" fill="#1a2030"/><circle cx="47" cy="43" r="2" fill="#1a2030"/>
  <!-- Outlet pipe -->
  <rect x="38" y="8" width="8" height="28" rx="2" fill="#2a3845"/>
  <rect x="38" y="8" width="4" height="28" rx="1" fill="#88aacc" opacity="0.1"/>
  <!-- Motor housing -->
  <rect x="76" y="56" width="44" height="32" rx="6" fill="url(#pumpMotor)"/>
  <rect x="76" y="56" width="44" height="32" rx="6" fill="none" stroke="#445566" stroke-width="1" opacity="0.5"/>
  <!-- Motor vents -->
  <rect x="80" y="64" width="36" height="2" rx="1" fill="#1a2030" opacity="0.8"/>
  <rect x="80" y="70" width="36" height="2" rx="1" fill="#1a2030" opacity="0.8"/>
  <rect x="80" y="76" width="36" height="2" rx="1" fill="#1a2030" opacity="0.8"/>
  <!-- Coupling -->
  <rect x="74" y="66" width="4" height="12" rx="1" fill="#334455"/>
  <!-- Motor end plate -->
  <rect x="116" y="56" width="8" height="32" rx="4" fill="#2a3845"/>
  <!-- Status LED on motor -->
  <circle cx="80" cy="58" r="3" fill="#1a2030"/>
  <circle cx="80" cy="58" r="2" fill="#ffffff" opacity="0.7"/>
</svg>
