  <line x1="68" y1="32" x2="80" y2="32" stroke="#2a5030" stroke-width="0.8"/>
  <line x1="80" y1="26" x2="80" y2="44" stroke="#2a5030" stroke-width="0.8"/>
  <line x1="86" y1="32" x2="106" y2="32" stroke="#2a5030" stroke-width="0.8"/>
  <line x1="94" y1="26" x2="94" y2="40" stroke="#2a5030" stroke-width="0.8"/>
