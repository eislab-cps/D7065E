  <circle cx="22" cy="16" r="2.5" fill="#1a2030"/><circle cx="22" cy="16" r="1.5" fill="#334455"/>
  <circle cx="106" cy="16" r="2.5" fill="#1a2030"/><circle cx="106" cy="16" r="1.5" fill="#334455"/>
