  <rect x="18" y="82" width="92" height="18" rx="3" fill="#1a2030"/>
  <rect x="18" y="82" width="92" height="18" rx="3" fill="none" stroke="#334455" stroke-width="0.7"/>
  <rect x="22" y="85" width="12" height="10" rx="1" fill="#2a3845"/><circle cx="28" cy="90" r="2" fill="#334455"/><circle cx="28" cy="90" r="1" fill="#667788"/>
  <rect x="36" y="85" width="12" height="10" rx="1" fill="#2a3845"/><circle cx="42" cy="90" r="2" fill="#334455"/>
  <rect x="50" y="85" width="12" height="10" rx="1" fill="#2a3845"/><circle cx="56" cy="90" r="2" fill="#334455"/>
  <rect x="64" y="85" width="12" height="10" rx="1" fill="#2a3845"/><circle cx="70" cy="90" r="2" fill="#334455"/>
  <rect x="78" y="85" width="12" height="10" rx="1" fill="#2a3845"/><circle cx="84" cy="90" r="2" fill="#334455"/>
  <rect x="92" y="85" width="12" height="10" rx="1" fill="#2a3845"/><circle cx="98" cy="90" r="2" fill="#334455"/>
