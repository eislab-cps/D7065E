  <circle cx="30" cy="70" r="4" fill="#1a2030"/><circle cx="30" cy="70" r="2.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="44" cy="70" r="4" fill="#1a2030"/><circle cx="44" cy="70" r="2.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="58" cy="70" r="4" fill="#1a2030"/><circle cx="58" cy="70" r="2.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="72" cy="70" r="4" fill="#1a2030"/><circle cx="72" cy="70" r="2.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="86" cy="70" r="4" fill="#1a2030"/><circle cx="86" cy="70" r="2.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="100" cy="70" r="4" fill="#1a2030"/><circle cx="100" cy="70" r="2.5" fill="#ffffff" opacity="0.4"/>
