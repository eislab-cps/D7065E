<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="aqsBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3a45"/>
      <stop offset="100%" stop-color="#1a2530"/>
    </linearGradient>
    <linearGradient id="aqsPCB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2820"/>
      <stop offset="100%" stop-color="#0f1a14"/>
    </linearGradient>
  </defs>
  <!-- Housing body -->
  <rect x="14" y="10" width="100" height="108" rx="8" fill="url(#aqsBody)"/>
