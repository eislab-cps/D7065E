  <circle cx="24" cy="32" r="1.5" fill="#2a3845"/><circle cx="32" cy="32" r="1.5" fill="#2a3845"/><circle cx="40" cy="32" r="1.5" fill="#2a3845"/><circle cx="48" cy="32" r="1.5" fill="#2a3845"/><circle cx="56" cy="32" r="1.5" fill="#2a3845"/>
  <circle cx="24" cy="38" r="1.5" fill="#2a3845"/><circle cx="32" cy="38" r="1.5" fill="#2a3845"/><circle cx="40" cy="38" r="1.5" fill="#2a3845"/><circle cx="48" cy="38" r="1.5" fill="#2a3845"/><circle cx="56" cy="38" r="1.5" fill="#2a3845"/>
  <circle cx="24" cy="44" r="1.5" fill="#2a3845"/><circle cx="32" cy="44" r="1.5" fill="#2a3845"/><circle cx="40" cy="44" r="1.5" fill="#2a3845"/><circle cx="48" cy="44" r="1.5" fill="#2a3845"/><circle cx="56" cy="44" r="1.5" fill="#2a3845"/>
  <circle cx="24" cy="50" r="1.5" fill="#2a3845"/><circle cx="32" cy="50" r="1.5" fill="#2a3845"/><circle cx="40" cy="50" r="1.5" fill="#2a3845"/><circle cx="48" cy="50" r="1.5" fill="#2a3845"/><circle cx="56" cy="50" r="1.5" fill="#2a3845"/>
