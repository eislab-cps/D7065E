<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="tsHousing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a4a55"/>
      <stop offset="100%" stop-color="#1e2830"/>
    </linearGradient>
    <linearGradient id="tsProbe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a6070"/>
      <stop offset="50%" stop-color="#88aacc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2a3845"/>
    </linearGradient>
    <linearGradient id="tsDisplay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2840"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
  </defs>
  <!-- Mounting bracket (wall plate) -->
  <rect x="52" y="8" width="24" height="90" rx="3" fill="#1e2830"/>
  <rect x="52" y="8" width="24" height="4" rx="2" fill="#2a3540"/>
  <circle cx="64" cy="12" r="3" fill="#1a2030"/><circle cx="64" cy="12" r="2" fill="#334455"/>
  <circle cx="64" cy="92" r="3" fill="#1a2030"/><circle cx="64" cy="92" r="2" fill="#334455"/>
  <!-- Housing body -->
  <rect x="30" y="18" width="68" height="60" rx="7" fill="url(#tsHousing)"/>
  <rect x="30" y="18" width="68" height="60" rx="7" fill="none" stroke="#667788" stroke-width="1" opacity="0.5"/>
  <!-- Housing shine -->
  <rect x="32" y="20" width="20" height="56" rx="4" fill="#88aacc" opacity="0.06"/>
  <!-- Display screen -->
  <rect x="36" y="24" width="56" height="28" rx="3" fill="url(#tsDisplay)"/>
  <rect x="36" y="24" width="56" height="28" rx="3" fill="none" stroke="#445566" stroke-width="0.8"/>
  <!-- Temperature reading -->
  <text x="48" y="43" font-size="14" font-weight="bold" fill="#88aacc" opacity="0.9" font-family="monospace">23.4</text>
  <text x="82" y="43" font-size="8" fill="#667788" font-family="monospace">°C</text>
  <rect x="38" y="27" width="30" height="2" rx="1" fill="#445566" opacity="0.5"/>
  <!-- Terminal block / screw terminals -->
  <rect x="36" y="58" width="56" height="14" rx="3" fill="#1a2030"/>
  <rect x="40" y="61" width="8" height="8" rx="1" fill="#2a3845"/><circle cx="44" cy="65" r="2" fill="#334455"/><circle cx="44" cy="65" r="1" fill="#667788"/>
  <rect x="51" y="61" width="8" height="8" rx="1" fill="#2a3845"/><circle cx="55" cy="65" r="2" fill="#334455"/><circle cx="55" cy="65" r="1" fill="#667788"/>
  <rect x="62" y="61" width="8" height="8" rx="1" fill="#2a3845"/><circle cx="66" cy="65" r="2" fill="#334455"/><circle cx="66" cy="65" r="1" fill="#667788"/>
  <rect x="73" y="61" width="8" height="8" rx="1" fill="#2a3845"/><circle cx="77" cy="65" r="2" fill="#334455"/><circle cx="77" cy="65" r="1" fill="#667788"/>
  <!-- Status LED -->
  <circle cx="88" cy="28" r="3" fill="#1a2030"/>
  <circle cx="88" cy="28" r="2" fill="#ffffff" opacity="0.8"/>
  <!-- Probe cylinder extending down -->
  <rect x="58" y="78" width="12" height="34" rx="5" fill="url(#tsProbe)"/>
  <rect x="58" y="78" width="12" height="34" rx="5" fill="none" stroke="#667788" stroke-width="0.8" opacity="0.5"/>
  <!-- Probe tip -->
  <ellipse cx="64" cy="112" rx="5" ry="3" fill="#334455"/>
  <ellipse cx="64" cy="112" rx="3" ry="2" fill="#88aacc" opacity="0.4"/>
  <!-- Probe connector rings -->
  <rect x="58" y="82" width="12" height="2" rx="1" fill="#445566"/>
  <rect x="58" y="88" width="12" height="2" rx="1" fill="#445566"/>
  <!-- Cable -->
  <path d="M90 65 Q100 65 100 80 Q100 96 86 96" fill="none" stroke="#1a2030" stroke-width="3" stroke-linecap="round"/>
  <path d="M90 65 Q100 65 100 80 Q100 96 86 96" fill="none" stroke="#2a3845" stroke-width="2" stroke-linecap="round"/>
</svg>
