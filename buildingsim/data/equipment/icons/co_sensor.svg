<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="coBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a20"/>
      <stop offset="100%" stop-color="#1e1810"/>
    </linearGradient>
  </defs>
  <!-- Warning stripe pattern (diagonal black/yellow) -->
  <rect x="6" y="6" width="116" height="116" rx="8" fill="url(#coBody)"/>
  <!-- Diagonal warning stripes -->
  <clipPath id="coClip"><rect x="6" y="6" width="116" height="116" rx="8"/></clipPath>
  <g clip-path="url(#coClip)" opacity="0.15">
    <line x1="-10" y1="20" x2="130" y2="160" stroke="#cc8800" stroke-width="14"/>
    <line x1="10" y1="0" x2="150" y2="140" stroke="#cc8800" stroke-width="14"/>
    <line x1="-30" y1="40" x2="110" y2="180" stroke="#cc8800" stroke-width="14"/>
    <line x1="30" y1="-20" x2="170" y2="120" stroke="#cc8800" stroke-width="14"/>
  </g>
  <!-- Main face plate -->
  <rect x="12" y="12" width="104" height="104" rx="6" fill="#2a2010" opacity="0.8"/>
  <rect x="12" y="12" width="104" height="104" rx="6" fill="none" stroke="#cc8800" stroke-width="1.5" opacity="0.5"/>
  <!-- CO label (large, center) -->
  <rect x="16" y="16" width="96" height="30" rx="4" fill="#1a1208"/>
  <text x="26" y="38" font-size="22" font-weight="bold" fill="#cc8800" opacity="0.95" font-family="monospace">CO</text>
  <!-- Warning subtitle -->
  <rect x="16" y="49" width="96" height="14" rx="3" fill="#1a1208"/>
  <rect x="18" y="51" width="60" height="3" rx="1" fill="#cc8800" opacity="0.4"/>
  <rect x="18" y="57" width="40" height="2" rx="1" fill="#cc8800" opacity="0.3"/>
  <!-- Buzzer grille -->
  <rect x="16" y="66" width="50" height="40" rx="4" fill="#1a1208"/>
  <rect x="16" y="66" width="50" height="40" rx="4" fill="none" stroke="#443318" stroke-width="0.8"/>
  <!-- Grille dots -->
  <circle cx="27" cy="74" r="2" fill="#2a2010"/><circle cx="36" cy="74" r="2" fill="#2a2010"/><circle cx="45" cy="74" r="2" fill="#2a2010"/><circle cx="54" cy="74" r="2" fill="#2a2010"/>
  <circle cx="27" cy="82" r="2" fill="#2a2010"/><circle cx="36" cy="82" r="2" fill="#2a2010"/><circle cx="45" cy="82" r="2" fill="#2a2010"/><circle cx="54" cy="82" r="2" fill="#2a2010"/>
  <circle cx="27" cy="90" r="2" fill="#2a2010"/><circle cx="36" cy="90" r="2" fill="#2a2010"/><circle cx="45" cy="90" r="2" fill="#2a2010"/><circle cx="54" cy="90" r="2" fill="#2a2010"/>
  <circle cx="27" cy="98" r="2" fill="#2a2010"/><circle cx="36" cy="98" r="2" fill="#2a2010"/><circle cx="45" cy="98" r="2" fill="#2a2010"/><circle cx="54" cy="98" r="2" fill="#2a2010"/>
  <!-- Test button -->
  <circle cx="87" cy="78" r="12" fill="#1a1208" stroke="#443318" stroke-width="1.2"/>
  <circle cx="87" cy="78" r="8" fill="#2a2010"/>
  <circle cx="87" cy="78" r="5" fill="#3a3018"/>
  <rect x="84" y="77" width="6" height="2" rx="1" fill="#cc8800" opacity="0.5"/>
  <!-- Multi-color LED row -->
  <circle cx="70" cy="100" r="4" fill="#1a1208"/>
  <circle cx="70" cy="100" r="2.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="82" cy="100" r="4" fill="#1a1208"/>
  <circle cx="82" cy="100" r="2.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="94" cy="100" r="4" fill="#1a1208"/>
  <circle cx="94" cy="100" r="2.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="106" cy="100" r="4" fill="#1a1208"/>
  <circle cx="106" cy="100" r="2.5" fill="#ffffff" opacity="0.3"/>
  <!-- Corner screws -->
  <circle cx="18" cy="18" r="3" fill="#1a1208"/><circle cx="18" cy="18" r="2" fill="#2a2010"/>
  <circle cx="110" cy="18" r="3" fill="#1a1208"/><circle cx="110" cy="18" r="2" fill="#2a2010"/>
  <circle cx="18" cy="110" r="3" fill="#1a1208"/><circle cx="18" cy="110" r="2" fill="#2a2010"/>
  <circle cx="110" cy="110" r="3" fill="#1a1208"/><circle cx="110" cy="110" r="2" fill="#2a2010"/>
</svg>
