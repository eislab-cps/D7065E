<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="feBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a1010"/>
      <stop offset="40%" stop-color="#8a1818"/>
      <stop offset="100%" stop-color="#3a0808"/>
    </linearGradient>
    <linearGradient id="feShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="feGauge" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a3040"/>
      <stop offset="100%" stop-color="#1a2030"/>
    </linearGradient>
  </defs>
  <!-- Wall bracket -->
  <rect x="8" y="30" width="12" height="60" rx="3" fill="#1e2830"/>
  <rect x="8" y="36" width="12" height="6" rx="2" fill="#334455"/>
  <rect x="8" y="72" width="12" height="6" rx="2" fill="#334455"/>
  <circle cx="14" cy="32" r="3" fill="#1a2030"/><circle cx="14" cy="32" r="2" fill="#2a3845"/><circle cx="14" cy="32" r="0.8" fill="#88aacc" opacity="0.6"/>
  <circle cx="14" cy="86" r="3" fill="#1a2030"/><circle cx="14" cy="86" r="2" fill="#2a3845"/><circle cx="14" cy="86" r="0.8" fill="#88aacc" opacity="0.6"/>
  <!-- Main cylinder body -->
  <rect x="26" y="32" width="46" height="84" rx="12" fill="url(#feBody)"/>
  <rect x="26" y="32" width="46" height="84" rx="12" fill="url(#feShine)"/>
  <rect x="26" y="32" width="46" height="84" rx="12" fill="none" stroke="#cc3333" stroke-width="0.8" opacity="0.4"/>
  <!-- Cylinder label band -->
  <rect x="26" y="60" width="46" height="28" fill="#cc2020" opacity="0.2"/>
  <!-- Label line details -->
  <rect x="30" y="64" width="38" height="2" rx="1" fill="#ffffff" opacity="0.15"/>
  <rect x="30" y="70" width="30" height="2" rx="1" fill="#ffffff" opacity="0.1"/>
  <!-- Top valve assembly -->
  <rect x="38" y="18" width="22" height="16" rx="4" fill="#2a3040"/>
  <rect x="38" y="18" width="22" height="7" rx="4" fill="#334455"/>
  <!-- Handle/lever -->
  <rect x="34" y="14" width="6" height="14" rx="2" fill="#3a4a55"/>
  <rect x="34" y="14" width="6" height="5" rx="2" fill="#445566"/>
  <!-- Safety pin -->
  <circle cx="37" cy="22" r="3" fill="#1a2030" stroke="#88aacc" stroke-width="0.8"/>
  <line x1="37" y1="19" x2="37" y2="14" stroke="#88aacc" stroke-width="1"/>
  <!-- Pressure gauge -->
  <circle cx="76" cy="44" r="12" fill="#1a2030" stroke="#334455" stroke-width="1.5"/>
  <circle cx="76" cy="44" r="10" fill="#1e2a34"/>
  <circle cx="76" cy="44" r="8" fill="none" stroke="#2a3845" stroke-width="0.5"/>
  <!-- Gauge arc (green zone) -->
  <path d="M68 44 A8 8 0 0 1 84 44" fill="none" stroke="#2a5020" stroke-width="2.5" opacity="0.7"/>
  <!-- Gauge needle -->
  <line x1="76" y1="44" x2="78" y2="37" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
  <circle cx="76" cy="44" r="1.5" fill="#99aabb"/>
  <!-- Tick marks -->
  <line x1="76" y1="34" x2="76" y2="37" stroke="#667788" stroke-width="1"/>
  <line x1="83" y1="40" x2="80.5" y2="41.5" stroke="#667788" stroke-width="0.8"/>
  <line x1="69" y1="40" x2="71.5" y2="41.5" stroke="#667788" stroke-width="0.8"/>
  <!-- Hose connector -->
  <rect x="60" y="28" width="18" height="6" rx="2" fill="#2a3040"/>
  <path d="M78 31 Q90 31 92 40 Q94 52 88 58" fill="none" stroke="#1a2030" stroke-width="5" stroke-linecap="round"/>
  <path d="M78 31 Q90 31 92 40 Q94 52 88 58" fill="none" stroke="#334455" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Nozzle -->
  <rect x="84" y="55" width="14" height="8" rx="3" fill="#2a3040"/>
  <path d="M98 57 L106 54 L106 62 L98 59Z" fill="#2a3040"/>
  <!-- Bottom base ring -->
  <ellipse cx="49" cy="116" rx="23" ry="5" fill="#2a3040"/>
  <ellipse cx="49" cy="116" rx="23" ry="5" fill="none" stroke="#334455" stroke-width="0.8"/>
</svg>
