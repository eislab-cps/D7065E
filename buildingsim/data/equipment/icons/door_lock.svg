<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="dlHousing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a4a55"/>
      <stop offset="100%" stop-color="#1e2830"/>
    </linearGradient>
    <linearGradient id="dlFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#445566"/>
      <stop offset="100%" stop-color="#2a3845"/>
    </linearGradient>
  </defs>
  <!-- Main housing -->
  <rect x="24" y="10" width="72" height="108" rx="8" fill="url(#dlHousing)"/>
  <rect x="24" y="10" width="72" height="108" rx="8" fill="none" stroke="#667788" stroke-width="1" opacity="0.5"/>
  <!-- Metal faceplate -->
  <rect x="30" y="16" width="60" height="96" rx="5" fill="url(#dlFace)"/>
  <rect x="30" y="16" width="60" height="96" rx="5" fill="none" stroke="#99aabb" stroke-width="0.8" opacity="0.5"/>
  <!-- Faceplate shine -->
  <rect x="32" y="18" width="20" height="92" rx="3" fill="#88aacc" opacity="0.06"/>
  <!-- Mounting screws -->
  <circle cx="38" cy="24" r="3.5" fill="#2a3040"/><circle cx="38" cy="24" r="2.5" fill="#3a4a55"/><line x1="35.5" y1="24" x2="40.5" y2="24" stroke="#1a2030" stroke-width="1"/><line x1="38" y1="21.5" x2="38" y2="26.5" stroke="#1a2030" stroke-width="1"/>
  <circle cx="82" cy="24" r="3.5" fill="#2a3040"/><circle cx="82" cy="24" r="2.5" fill="#3a4a55"/><line x1="79.5" y1="24" x2="84.5" y2="24" stroke="#1a2030" stroke-width="1"/><line x1="82" y1="21.5" x2="82" y2="26.5" stroke="#1a2030" stroke-width="1"/>
  <circle cx="38" cy="104" r="3.5" fill="#2a3040"/><circle cx="38" cy="104" r="2.5" fill="#3a4a55"/><line x1="35.5" y1="104" x2="40.5" y2="104" stroke="#1a2030" stroke-width="1"/><line x1="38" y1="101.5" x2="38" y2="106.5" stroke="#1a2030" stroke-width="1"/>
  <circle cx="82" cy="104" r="3.5" fill="#2a3040"/><circle cx="82" cy="104" r="2.5" fill="#3a4a55"/><line x1="79.5" y1="104" x2="84.5" y2="104" stroke="#1a2030" stroke-width="1"/><line x1="82" y1="101.5" x2="82" y2="106.5" stroke="#1a2030" stroke-width="1"/>
  <!-- LED strip at top -->
  <rect x="36" y="30" width="48" height="8" rx="3" fill="#1a2030"/>
  <rect cx="40" cy="32" r="2" fill="#ffffff" opacity="0.8"/>
  <circle cx="44" cy="34" r="2.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="52" cy="34" r="2.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="60" cy="34" r="2.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="68" cy="34" r="2.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="76" cy="34" r="2.5" fill="#ffffff" opacity="0.5"/>
  <!-- Card slot -->
  <rect x="38" y="44" width="44" height="5" rx="1" fill="#1a2030"/>
  <rect x="38" y="44" width="44" height="2" rx="1" fill="#2a3845" opacity="0.8"/>
  <rect x="38" y="44" width="44" height="5" rx="1" fill="none" stroke="#667788" stroke-width="0.6"/>
  <!-- Keypad area -->
  <rect x="36" y="54" width="48" height="44" rx="4" fill="#1e2830"/>
  <rect x="36" y="54" width="48" height="44" rx="4" fill="none" stroke="#445566" stroke-width="0.8"/>
  <!-- Keypad buttons 3x4 grid -->
  <rect x="40" y="58" width="12" height="8" rx="2" fill="#2a3a45"/><rect x="54" y="58" width="12" height="8" rx="2" fill="#2a3a45"/><rect x="68" y="58" width="12" height="8" rx="2" fill="#2a3a45"/>
  <rect x="40" y="69" width="12" height="8" rx="2" fill="#2a3a45"/><rect x="54" y="69" width="12" height="8" rx="2" fill="#2a3a45"/><rect x="68" y="69" width="12" height="8" rx="2" fill="#2a3a45"/>
  <rect x="40" y="80" width="12" height="8" rx="2" fill="#2a3a45"/><rect x="54" y="80" width="12" height="8" rx="2" fill="#2a3a45"/><rect x="68" y="80" width="12" height="8" rx="2" fill="#2a3a45"/>
  <rect x="40" y="91" width="12" height="5" rx="2" fill="#334455"/><rect x="54" y="91" width="12" height="5" rx="2" fill="#3a5a45"/><rect x="68" y="91" width="12" height="5" rx="2" fill="#553a3a"/>
  <!-- Deadbolt -->
  <rect x="82" y="66" width="10" height="16" rx="2" fill="#1a2030"/>
  <rect x="84" y="68" width="6" height="12" rx="1" fill="#2a3040"/>
  <rect x="85" y="70" width="4" height="8" rx="1" fill="#334455"/>
  <rect x="85" y="70" width="4" height="3" rx="1" fill="#88aacc" opacity="0.3"/>
</svg>
