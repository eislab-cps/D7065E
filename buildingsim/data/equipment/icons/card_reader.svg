<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="crPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a4a55"/>
      <stop offset="100%" stop-color="#1e2830"/>
    </linearGradient>
    <linearGradient id="crScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2840"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
  </defs>
  <!-- Wall mounting bracket -->
  <rect x="14" y="20" width="8" height="88" rx="3" fill="#1a2530"/>
  <rect x="14" y="20" width="8" height="4" rx="2" fill="#2a3540"/>
  <rect x="14" y="100" width="8" height="4" rx="2" fill="#2a3540"/>
  <!-- Main panel body -->
  <rect x="22" y="14" width="78" height="100" rx="7" fill="url(#crPanel)"/>
  <rect x="22" y="14" width="78" height="100" rx="7" fill="none" stroke="#667788" stroke-width="1" opacity="0.5"/>
  <!-- Left chrome accent strip -->
  <rect x="24" y="16" width="6" height="96" rx="3" fill="#88aacc" opacity="0.08"/>
  <!-- Mounting screws -->
  <circle cx="32" cy="22" r="3"/><circle cx="32" cy="22" r="2" fill="#334455"/><line x1="30" y1="22" x2="34" y2="22" stroke="#1a2030" stroke-width="0.8"/><line x1="32" y1="20" x2="32" y2="24" stroke="#1a2030" stroke-width="0.8"/>
  <circle cx="90" cy="22" r="3"/><circle cx="90" cy="22" r="2" fill="#334455"/><line x1="88" y1="22" x2="92" y2="22" stroke="#1a2030" stroke-width="0.8"/><line x1="90" y1="20" x2="90" y2="24" stroke="#1a2030" stroke-width="0.8"/>
  <circle cx="32" cy="106" r="3"/><circle cx="32" cy="106" r="2" fill="#334455"/><line x1="30" y1="106" x2="34" y2="106" stroke="#1a2030" stroke-width="0.8"/><line x1="32" y1="104" x2="32" y2="108" stroke="#1a2030" stroke-width="0.8"/>
  <circle cx="90" cy="106" r="3"/><circle cx="90" cy="106" r="2" fill="#334455"/><line x1="88" y1="106" x2="92" y2="106" stroke="#1a2030" stroke-width="0.8"/><line x1="90" y1="104" x2="90" y2="108" stroke="#1a2030" stroke-width="0.8"/>
  <!-- Small screen -->
  <rect x="32" y="26" width="56" height="30" rx="3" fill="url(#crScreen)"/>
  <rect x="32" y="26" width="56" height="30" rx="3" fill="none" stroke="#445566" stroke-width="0.8"/>
  <!-- Screen content -->
  <rect x="36" y="31" width="28" height="3" rx="1" fill="#88aacc" opacity="0.6"/>
  <rect x="36" y="37" width="20" height="2" rx="1" fill="#88aacc" opacity="0.4"/>
  <rect x="36" y="43" width="32" height="2" rx="1" fill="#ffffff" opacity="0.4"/>
  <!-- Card slot -->
  <rect x="32" y="62" width="56" height="7" rx="2" fill="#1a2030"/>
  <rect x="32" y="62" width="56" height="3" rx="1" fill="#2a3845" opacity="0.6"/>
  <rect x="32" y="62" width="56" height="7" rx="2" fill="none" stroke="#445566" stroke-width="0.7"/>
  <!-- Slot label -->
  <line x1="38" y1="65" x2="76" y2="65" stroke="#88aacc" stroke-width="0.5" opacity="0.4" stroke-dasharray="3,2"/>
  <!-- LED array -->
  <rect x="32" y="75" width="56" height="10" rx="3" fill="#1a2030"/>
  <circle cx="42" cy="80" r="3" fill="#ffffff" opacity="0.8"/>
  <circle cx="52" cy="80" r="3" fill="#ffffff" opacity="0.5"/>
  <circle cx="62" cy="80" r="3" fill="#ffffff" opacity="0.3"/>
  <circle cx="72" cy="80" r="3" fill="#ffffff" opacity="0.3"/>
  <circle cx="80" cy="80" r="3" fill="#ffffff" opacity="0.5"/>
  <!-- Antenna symbol -->
  <line x1="60" y1="92" x2="60" y2="100" stroke="#445566" stroke-width="1.5"/>
  <path d="M52 96 Q60 88 68 96" fill="none" stroke="#667788" stroke-width="1" opacity="0.7"/>
  <path d="M48 100 Q60 85 72 100" fill="none" stroke="#445566" stroke-width="0.8" opacity="0.5"/>
  <!-- Panel seam -->
  <line x1="22" y1="20" x2="100" y2="20" stroke="#445566" stroke-width="0.5" opacity="0.6"/>
  <line x1="22" y1="108" x2="100" y2="108" stroke="#445566" stroke-width="0.5" opacity="0.6"/>
</svg>
