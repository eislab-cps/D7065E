  <path d="M64 64 Q76 46 68 38 Q56 42 64 64Z" fill="#3a5060" opacity="0.9"/>
  <path d="M64 64 Q82 66 86 56 Q78 46 64 64Z" fill="#3a5060" opacity="0.9"/>
