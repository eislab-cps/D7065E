<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="vfFlange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#445566"/>
      <stop offset="100%" stop-color="#1e2a34"/>
    </linearGradient>
    <radialGradient id="vfCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#445566"/>
      <stop offset="100%" stop-color="#1a2530"/>
    </radialGradient>
  </defs>
  <!-- Mounting flange (square) -->
  <rect x="8" y="8" width="112" height="112" rx="12" fill="url(#vfFlange)"/>
  <rect x="8" y="8" width="112" height="112" rx="12" fill="none" stroke="#667788" stroke-width="1.5" opacity="0.5"/>
  <!-- Mounting bolt holes -->
  <circle cx="22" cy="22" r="5" fill="#1a2030"/><circle cx="22" cy="22" r="3.5" fill="#2a3845"/><circle cx="22" cy="22" r="1.5" fill="#88aacc" opacity="0.5"/>
  <circle cx="106" cy="22" r="5" fill="#1a2030"/><circle cx="106" cy="22" r="3.5" fill="#2a3845"/><circle cx="106" cy="22" r="1.5" fill="#88aacc" opacity="0.5"/>
  <circle cx="22" cy="106" r="5" fill="#1a2030"/><circle cx="22" cy="106" r="3.5" fill="#2a3845"/><circle cx="22" cy="106" r="1.5" fill="#88aacc" opacity="0.5"/>
  <circle cx="106" cy="106" r="5" fill="#1a2030"/><circle cx="106" cy="106" r="3.5" fill="#2a3845"/><circle cx="106" cy="106" r="1.5" fill="#88aacc" opacity="0.5"/>
