  <circle cx="64" cy="64" r="38" fill="none" stroke="#2a3845" stroke-width="1"/>
  <circle cx="64" cy="64" r="30" fill="none" stroke="#2a3845" stroke-width="1"/>
  <!-- Grille spokes -->
  <line x1="64" y1="18" x2="64" y2="110" stroke="#2a3845" stroke-width="1"/>
  <line x1="18" y1="64" x2="110" y2="64" stroke="#2a3845" stroke-width="1"/>
  <line x1="29" y1="29" x2="99" y2="99" stroke="#2a3845" stroke-width="1"/>
  <line x1="99" y1="29" x2="29" y2="99" stroke="#2a3845" stroke-width="1"/>
