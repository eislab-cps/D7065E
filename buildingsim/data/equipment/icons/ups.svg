<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="upsBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3a45"/>
      <stop offset="100%" stop-color="#1a2530"/>
    </linearGradient>
    <linearGradient id="upsDisplay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1820"/>
      <stop offset="100%" stop-color="#06100c"/>
    </linearGradient>
  </defs>
  <!-- Rack mount ears (left/right flanges) -->
  <rect x="4" y="14" width="14" height="100" rx="3" fill="#1a2030"/>
  <circle cx="11" cy="24" r="4" fill="#1a2030"/><circle cx="11" cy="24" r="3" fill="#2a3845"/><circle cx="11" cy="24" r="1.2" fill="#88aacc" opacity="0.5"/>
  <circle cx="11" cy="64" r="4" fill="#1a2030"/><circle cx="11" cy="64" r="3" fill="#2a3845"/><circle cx="11" cy="64" r="1.2" fill="#88aacc" opacity="0.5"/>
  <circle cx="11" cy="104" r="4" fill="#1a2030"/><circle cx="11" cy="104" r="3" fill="#2a3845"/><circle cx="11" cy="104" r="1.2" fill="#88aacc" opacity="0.5"/>
  <rect x="110" y="14" width="14" height="100" rx="3" fill="#1a2030"/>
  <circle cx="117" cy="24" r="4" fill="#1a2030"/><circle cx="117" cy="24" r="3" fill="#2a3845"/><circle cx="117" cy="24" r="1.2" fill="#88aacc" opacity="0.5"/>
  <circle cx="117" cy="64" r="4" fill="#1a2030"/><circle cx="117" cy="64" r="3" fill="#2a3845"/><circle cx="117" cy="64" r="1.2" fill="#88aacc" opacity="0.5"/>
  <circle cx="117" cy="104" r="4" fill="#1a2030"/><circle cx="117" cy="104" r="3" fill="#2a3845"/><circle cx="117" cy="104" r="1.2" fill="#88aacc" opacity="0.5"/>
  <!-- Main chassis body -->
  <rect x="18" y="14" width="92" height="100" rx="4" fill="url(#upsBody)"/>
  <rect x="18" y="14" width="92" height="100" rx="4" fill="none" stroke="#445566" stroke-width="1" opacity="0.5"/>
  <!-- Front panel top section: LCD display -->
  <rect x="22" y="18" width="60" height="28" rx="3" fill="url(#upsDisplay)"/>
  <rect x="22" y="18" width="60" height="28" rx="3" fill="none" stroke="#334455" stroke-width="0.8"/>
  <!-- LCD content lines -->
  <rect x="25" y="22" width="40" height="3" rx="1" fill="#00cc44" opacity="0.7"/>
  <rect x="25" y="28" width="28" height="2" rx="1" fill="#88aacc" opacity="0.5"/>
  <rect x="25" y="33" width="34" height="2" rx="1" fill="#88aacc" opacity="0.4"/>
  <rect x="25" y="38" width="20" height="2" rx="1" fill="#88aacc" opacity="0.3"/>
  <!-- Battery indicator LEDs (right of display) -->
  <rect x="86" y="18" width="20" height="28" rx="3" fill="#1a2030"/>
  <rect x="86" y="18" width="20" height="28" rx="3" fill="none" stroke="#334455" stroke-width="0.7"/>
  <!-- Battery bar -->
  <rect x="90" y="22" width="12" height="4" rx="1" fill="#2a6030" opacity="0.9"/>
  <rect x="90" y="28" width="12" height="4" rx="1" fill="#2a6030" opacity="0.9"/>
  <rect x="90" y="34" width="12" height="4" rx="1" fill="#2a6030" opacity="0.7"/>
  <rect x="90" y="40" width="12" height="4" rx="1" fill="#2a3020" opacity="0.4"/>
  <!-- Fan grille (center area) -->
  <rect x="22" y="50" width="50" height="30" rx="3" fill="#1a2030"/>
  <rect x="22" y="50" width="50" height="30" rx="3" fill="none" stroke="#334455" stroke-width="0.7"/>
  <!-- Fan grille lines -->
  <line x1="24" y1="54" x2="70" y2="54" stroke="#2a3845" stroke-width="1" opacity="0.8"/>
  <line x1="24" y1="58" x2="70" y2="58" stroke="#2a3845" stroke-width="1" opacity="0.8"/>
  <line x1="24" y1="62" x2="70" y2="62" stroke="#2a3845" stroke-width="1" opacity="0.8"/>
  <line x1="24" y1="66" x2="70" y2="66" stroke="#2a3845" stroke-width="1" opacity="0.8"/>
  <line x1="24" y1="70" x2="70" y2="70" stroke="#2a3845" stroke-width="1" opacity="0.8"/>
  <line x1="24" y1="74" x2="70" y2="74" stroke="#2a3845" stroke-width="1" opacity="0.8"/>
  <!-- Power connectors (right side) -->
  <rect x="76" y="50" width="30" height="30" rx="3" fill="#1a2030"/>
  <rect x="76" y="50" width="30" height="30" rx="3" fill="none" stroke="#334455" stroke-width="0.7"/>
  <!-- IEC connectors -->
  <rect x="79" y="54" width="10" height="8" rx="2" fill="#2a3845"/>
  <rect x="79" y="54" width="10" height="8" rx="2" fill="none" stroke="#445566" stroke-width="0.6"/>
  <rect x="92" y="54" width="10" height="8" rx="2" fill="#2a3845"/>
  <rect x="92" y="54" width="10" height="8" rx="2" fill="none" stroke="#445566" stroke-width="0.6"/>
  <rect x="79" y="66" width="10" height="8" rx="2" fill="#2a3845"/>
  <rect x="92" y="66" width="10" height="8" rx="2" fill="#2a3845"/>
  <!-- Battery section (lower) -->
  <rect x="22" y="84" width="84" height="26" rx="3" fill="#1a2030"/>
  <rect x="22" y="84" width="84" height="26" rx="3" fill="none" stroke="#334455" stroke-width="0.7"/>
  <!-- Battery cells visible -->
  <rect x="26" y="88" width="18" height="16" rx="2" fill="#1e3040"/>
  <rect x="26" y="88" width="18" height="7" rx="1" fill="#334455" opacity="0.5"/>
  <rect x="46" y="88" width="18" height="16" rx="2" fill="#1e3040"/>
  <rect x="46" y="88" width="18" height="7" rx="1" fill="#334455" opacity="0.5"/>
  <rect x="66" y="88" width="18" height="16" rx="2" fill="#1e3040"/>
  <rect x="66" y="88" width="18" height="7" rx="1" fill="#334455" opacity="0.5"/>
  <rect x="86" y="88" width="16" height="16" rx="2" fill="#1e3040"/>
  <rect x="86" y="88" width="16" height="7" rx="1" fill="#334455" opacity="0.5"/>
  <!-- Battery terminals -->
  <circle cx="30" cy="92" r="2" fill="#cc8800" opacity="0.7"/>
  <circle cx="40" cy="92" r="2" fill="#334455"/>
  <circle cx="50" cy="92" r="2" fill="#cc8800" opacity="0.7"/>
  <circle cx="60" cy="92" r="2" fill="#334455"/>
</svg>
