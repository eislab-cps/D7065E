<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="cTankG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a6070"/>
      <stop offset="40%" stop-color="#3a4a55"/>
      <stop offset="100%" stop-color="#1a2830"/>
    </linearGradient>
    <linearGradient id="cMotorG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#445566"/>
      <stop offset="100%" stop-color="#2a3040"/>
    </linearGradient>
    <linearGradient id="cShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#88aacc" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#88aacc" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#88aacc" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="cGauge" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#334455"/>
      <stop offset="100%" stop-color="#1a2030"/>
    </radialGradient>
  </defs>
  <!-- Base plate -->
  <rect x="8" y="97" width="112" height="10" rx="2" fill="#1e2830"/>
  <rect x="8" y="97" width="112" height="3" rx="1" fill="#2a3a45"/>
  <!-- Mounting bolts -->
  <circle cx="18" cy="102" r="3" fill="#1a2830"/><circle cx="18" cy="102" r="2" fill="#445566"/><circle cx="18" cy="102" r="0.8" fill="#88aacc"/>
  <circle cx="40" cy="102" r="3" fill="#1a2830"/><circle cx="40" cy="102" r="2" fill="#445566"/><circle cx="40" cy="102" r="0.8" fill="#88aacc"/>
  <circle cx="88" cy="102" r="3" fill="#1a2830"/><circle cx="88" cy="102" r="2" fill="#445566"/><circle cx="88" cy="102" r="0.8" fill="#88aacc"/>
  <circle cx="110" cy="102" r="3" fill="#1a2830"/><circle cx="110" cy="102" r="2" fill="#445566"/><circle cx="110" cy="102" r="0.8" fill="#88aacc"/>
  <!-- Tank cylinder body -->
  <rect x="12" y="56" width="68" height="40" rx="9" fill="url(#cTankG)"/>
  <rect x="12" y="56" width="68" height="40" rx="9" fill="url(#cShine)"/>
  <!-- Tank end caps -->
  <ellipse cx="21" cy="76" rx="10" ry="20" fill="#2a3a45"/>
  <ellipse cx="21" cy="76" rx="7" ry="18" fill="#334455"/>
  <ellipse cx="71" cy="76" rx="10" ry="20" fill="#2a3a45"/>
  <ellipse cx="71" cy="76" rx="7" ry="18" fill="#334455"/>
  <!-- Tank seam/weld lines -->
  <line x1="21" y1="62" x2="71" y2="62" stroke="#2a3845" stroke-width="0.6" stroke-dasharray="4,2" opacity="0.7"/>
  <line x1="21" y1="76" x2="71" y2="76" stroke="#4a6070" stroke-width="0.8" opacity="0.5"/>
  <line x1="21" y1="90" x2="71" y2="90" stroke="#2a3845" stroke-width="0.6" stroke-dasharray="4,2" opacity="0.7"/>
  <!-- Cooling fins on tank -->
  <rect x="28" y="55" width="2" height="42" rx="1" fill="#1e2a35" opacity="0.9"/>
  <rect x="36" y="55" width="2" height="42" rx="1" fill="#1e2a35" opacity="0.9"/>
  <rect x="44" y="55" width="2" height="42" rx="1" fill="#1e2a35" opacity="0.9"/>
  <rect x="52" y="55" width="2" height="42" rx="1" fill="#1e2a35" opacity="0.9"/>
  <rect x="60" y="55" width="2" height="42" rx="1" fill="#1e2a35" opacity="0.9"/>
  <!-- Tank highlight stripe -->
  <rect x="22" y="58" width="56" height="5" rx="2" fill="#88aacc" opacity="0.12"/>
  <!-- Motor housing -->
  <rect x="83" y="59" width="33" height="36" rx="5" fill="url(#cMotorG)"/>
  <rect x="83" y="59" width="33" height="7" rx="4" fill="#445566" opacity="0.8"/>
  <!-- Motor vent slots -->
  <rect x="86" y="70" width="27" height="2" rx="1" fill="#1a2030" opacity="0.9"/>
  <rect x="86" y="75" width="27" height="2" rx="1" fill="#1a2030" opacity="0.9"/>
  <rect x="86" y="80" width="27" height="2" rx="1" fill="#1a2030" opacity="0.9"/>
  <rect x="86" y="85" width="27" height="2" rx="1" fill="#1a2030" opacity="0.9"/>
  <!-- Fan circle -->
  <circle cx="99" cy="76" r="11" fill="#1a2530" stroke="#334455" stroke-width="1.2"/>
  <!-- Fan blades -->
  <path d="M99 65 Q104 69 99 73 Q94 69 99 65Z" fill="#3a5060" opacity="0.9"/>
  <path d="M110 76 Q106 81 102 76 Q106 71 110 76Z" fill="#3a5060" opacity="0.9"/>
  <path d="M99 87 Q94 83 99 79 Q104 83 99 87Z" fill="#3a5060" opacity="0.9"/>
  <path d="M88 76 Q92 71 96 76 Q92 81 88 76Z" fill="#3a5060" opacity="0.9"/>
  <circle cx="99" cy="76" r="3.5" fill="#334455"/>
  <circle cx="99" cy="76" r="1.5" fill="#88aacc" opacity="0.7"/>
  <!-- Connecting belt/pipe -->
  <rect x="79" y="73" width="6" height="6" rx="1" fill="#2a3845"/>
  <!-- Outlet pipe (top) -->
  <rect x="31" y="44" width="7" height="14" rx="2" fill="#2a3a45"/>
  <rect x="29" y="42" width="11" height="4" rx="2" fill="#334455"/>
  <!-- Inlet pipe (bottom) -->
  <rect x="52" y="94" width="7" height="11" rx="2" fill="#2a3a45"/>
  <rect x="50" y="101" width="11" height="4" rx="2" fill="#334455"/>
  <!-- Pressure gauge -->
  <circle cx="99" cy="53" r="10" fill="#1a2030" stroke="#445566" stroke-width="1.5"/>
  <circle cx="99" cy="53" r="9" fill="url(#cGauge)"/>
  <circle cx="99" cy="53" r="7.5" fill="none" stroke="#334455" stroke-width="0.5"/>
  <!-- Gauge tick marks -->
  <line x1="99" y1="45" x2="99" y2="47.5" stroke="#667788" stroke-width="1.2"/>
  <line x1="106" y1="50" x2="104" y2="51.5" stroke="#667788" stroke-width="1"/>
  <line x1="92" y1="50" x2="94" y2="51.5" stroke="#667788" stroke-width="1"/>
  <line x1="92" y1="56" x2="94" y2="54.5" stroke="#667788" stroke-width="1"/>
  <line x1="106" y1="56" x2="104" y2="54.5" stroke="#667788" stroke-width="1"/>
  <!-- Gauge needle -->
  <line x1="99" y1="53" x2="104" y2="47" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
  <circle cx="99" cy="53" r="1.5" fill="#99aabb"/>
  <!-- LED -->
  <circle cx="87" cy="59" r="3" fill="#1a2030"/>
  <circle cx="87" cy="59" r="2.2" fill="#ffffff" opacity="0.85"/>
  <circle cx="87" cy="59" r="1" fill="#ffffff"/>
  <!-- Chrome border -->
  <rect x="12" y="56" width="68" height="40" rx="9" fill="none" stroke="#99aabb" stroke-width="1" opacity="0.4"/>
  <rect x="83" y="59" width="33" height="36" rx="5" fill="none" stroke="#667788" stroke-width="0.8" opacity="0.4"/>
</svg>
