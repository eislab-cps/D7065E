<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="fapBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2024"/>
      <stop offset="100%" stop-color="#1a1418"/>
    </linearGradient>
    <linearGradient id="fapDoor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a2428"/>
      <stop offset="100%" stop-color="#1e1418"/>
    </linearGradient>
  </defs>
  <!-- Panel body -->
  <rect x="6" y="6" width="116" height="116" rx="6" fill="url(#fapBody)"/>
  <rect x="6" y="6" width="116" height="116" rx="6" fill="none" stroke="#553333" stroke-width="1.5" opacity="0.6"/>
  <!-- Door panel -->
  <rect x="10" y="10" width="108" height="108" rx="4" fill="url(#fapDoor)"/>
  <!-- Door hinge -->
  <rect x="10" y="10" width="4" height="108" rx="2" fill="#cc3333" opacity="0.3"/>
  <!-- Header bar (red) -->
  <rect x="14" y="14" width="100" height="12" rx="3" fill="#8a1818"/>
  <rect x="14" y="14" width="100" height="5" rx="2" fill="#aa2020" opacity="0.6"/>
  <rect x="18" y="17" width="40" height="3" rx="1" fill="#ffffff" opacity="0.2"/>
  <!-- Alarm LED row (top) - red LEDs -->
  <circle cx="28" cy="32" r="4" fill="#1a0808"/><circle cx="28" cy="32" r="2.5" fill="#ffffff" opacity="0.7"/>
  <circle cx="40" cy="32" r="4" fill="#1a0808"/><circle cx="40" cy="32" r="2.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="52" cy="32" r="4" fill="#1a0808"/><circle cx="52" cy="32" r="2.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="64" cy="32" r="4" fill="#1a0808"/><circle cx="64" cy="32" r="2.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="76" cy="32" r="4" fill="#1a0808"/><circle cx="76" cy="32" r="2.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="88" cy="32" r="4" fill="#1a0808"/><circle cx="88" cy="32" r="2.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="100" cy="32" r="4" fill="#1a0808"/><circle cx="100" cy="32" r="2.5" fill="#ffffff" opacity="0.3"/>
  <!-- Zone indicator LED matrix (left section) -->
  <rect x="14" y="40" width="50" height="50" rx="3" fill="#180e0e"/>
  <rect x="14" y="40" width="50" height="50" rx="3" fill="none" stroke="#553333" stroke-width="0.8"/>
  <!-- Zone LEDs 4x5 grid -->
  <circle cx="24" cy="48" r="3" fill="#1a0808"/><circle cx="24" cy="48" r="1.8" fill="#ffffff" opacity="0.6"/>
  <circle cx="34" cy="48" r="3" fill="#1a0808"/><circle cx="34" cy="48" r="1.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="44" cy="48" r="3" fill="#1a0808"/><circle cx="44" cy="48" r="1.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="54" cy="48" r="3" fill="#1a0808"/><circle cx="54" cy="48" r="1.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="24" cy="58" r="3" fill="#1a0808"/><circle cx="24" cy="58" r="1.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="34" cy="58" r="3" fill="#1a0808"/><circle cx="34" cy="58" r="1.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="44" cy="58" r="3" fill="#1a0808"/><circle cx="44" cy="58" r="1.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="54" cy="58" r="3" fill="#1a0808"/><circle cx="54" cy="58" r="1.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="24" cy="68" r="3" fill="#1a0808"/><circle cx="24" cy="68" r="1.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="34" cy="68" r="3" fill="#1a0808"/><circle cx="34" cy="68" r="1.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="44" cy="68" r="3" fill="#1a0808"/><circle cx="44" cy="68" r="1.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="54" cy="68" r="3" fill="#1a0808"/><circle cx="54" cy="68" r="1.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="24" cy="78" r="3" fill="#1a0808"/><circle cx="24" cy="78" r="1.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="34" cy="78" r="3" fill="#1a0808"/><circle cx="34" cy="78" r="1.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="44" cy="78" r="3" fill="#1a0808"/><circle cx="44" cy="78" r="1.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="54" cy="78" r="3" fill="#1a0808"/><circle cx="54" cy="78" r="1.8" fill="#ffffff" opacity="0.3"/>
  <!-- LCD display (center-right) -->
  <rect x="68" y="40" width="46" height="28" rx="3" fill="#0a1820"/>
  <rect x="68" y="40" width="46" height="28" rx="3" fill="none" stroke="#334455" stroke-width="0.8"/>
  <rect x="70" y="42" width="42" height="3" rx="1" fill="#88aacc" opacity="0.5"/>
  <rect x="70" y="48" width="30" height="2" rx="1" fill="#88aacc" opacity="0.4"/>
  <rect x="70" y="53" width="36" height="2" rx="1" fill="#88aacc" opacity="0.3"/>
  <rect x="70" y="58" width="24" height="2" rx="1" fill="#88aacc" opacity="0.3"/>
  <!-- Keypad (right bottom) -->
  <rect x="76" y="72" width="38" height="32" rx="3" fill="#180e0e"/>
  <rect x="76" y="72" width="38" height="32" rx="3" fill="none" stroke="#553333" stroke-width="0.7"/>
  <!-- Key buttons 3x4 -->
  <rect x="78" y="74" width="8" height="6" rx="1" fill="#2a1818"/><rect x="88" y="74" width="8" height="6" rx="1" fill="#2a1818"/><rect x="98" y="74" width="8" height="6" rx="1" fill="#2a1818"/>
  <rect x="78" y="82" width="8" height="6" rx="1" fill="#2a1818"/><rect x="88" y="82" width="8" height="6" rx="1" fill="#2a1818"/><rect x="98" y="82" width="8" height="6" rx="1" fill="#2a1818"/>
  <rect x="78" y="90" width="8" height="6" rx="1" fill="#2a1818"/><rect x="88" y="90" width="8" height="6" rx="1" fill="#2a1818"/><rect x="98" y="90" width="8" height="6" rx="1" fill="#2a1818"/>
  <rect x="78" y="98" width="26" height="5" rx="1" fill="#553333"/>
  <!-- Key switch -->
  <circle cx="21" cy="95" r="7" fill="#1a1010" stroke="#663333" stroke-width="1"/>
  <circle cx="21" cy="95" r="4.5" fill="#2a1818"/>
  <line x1="21" y1="92" x2="21" y2="98" stroke="#88aacc" stroke-width="1.5" transform="rotate(45 21 95)"/>
  <!-- Bottom buttons row -->
  <rect x="14" y="96" width="18" height="8" rx="3" fill="#553333"/>
  <rect x="34" y="96" width="18" height="8" rx="3" fill="#2a3845"/>
  <rect x="14" y="96" width="8" height="3" rx="1" fill="#ffffff" opacity="0.15"/>
  <rect x="34" y="96" width="8" height="3" rx="1" fill="#ffffff" opacity="0.1"/>
  <!-- Corner screws -->
  <circle cx="12" cy="12" r="2.5" fill="#1a1010"/><circle cx="12" cy="12" r="1.5" fill="#2a1818"/>
  <circle cx="116" cy="12" r="2.5" fill="#1a1010"/><circle cx="116" cy="12" r="1.5" fill="#2a1818"/>
  <circle cx="12" cy="116" r="2.5" fill="#1a1010"/><circle cx="12" cy="116" r="1.5" fill="#2a1818"/>
  <circle cx="116" cy="116" r="2.5" fill="#1a1010"/><circle cx="116" cy="116" r="1.5" fill="#2a1818"/>
</svg>
