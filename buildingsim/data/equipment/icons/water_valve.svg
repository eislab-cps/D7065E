<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="wvBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a6070"/>
      <stop offset="50%" stop-color="#88aacc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2a3845"/>
    </linearGradient>
    <linearGradient id="wvWheel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#445566"/>
      <stop offset="100%" stop-color="#2a3040"/>
    </linearGradient>
  </defs>
  <!-- Left pipe flange -->
  <rect x="4" y="58" width="16" height="12" rx="3" fill="#2a3845"/>
  <rect x="4" y="58" width="16" height="12" rx="3" fill="none" stroke="#445566" stroke-width="0.8"/>
  <!-- Flange bolt holes left -->
  <circle cx="7" cy="61" r="2" fill="#1a2030"/><circle cx="7" cy="67" r="2" fill="#1a2030"/>
  <circle cx="17" cy="61" r="2" fill="#1a2030"/><circle cx="17" cy="67" r="2" fill="#1a2030"/>
  <!-- Right pipe flange -->
  <rect x="108" y="58" width="16" height="12" rx="3" fill="#2a3845"/>
  <rect x="108" y="58" width="16" height="12" rx="3" fill="none" stroke="#445566" stroke-width="0.8"/>
  <circle cx="111" cy="61" r="2" fill="#1a2030"/><circle cx="111" cy="67" r="2" fill="#1a2030"/>
  <circle cx="121" cy="61" r="2" fill="#1a2030"/><circle cx="121" cy="67" r="2" fill="#1a2030"/>
  <!-- Main pipe body -->
  <rect x="16" y="58" width="96" height="12" rx="2" fill="url(#wvBody)"/>
  <rect x="16" y="58" width="96" height="5" rx="1" fill="#88aacc" opacity="0.15"/>
  <!-- Flow arrow -->
  <line x1="24" y1="64" x2="40" y2="64" stroke="#88aacc" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,2"/>
  <path d="M37 61 L41 64 L37 67" fill="none" stroke="#88aacc" stroke-width="1.5" opacity="0.5" stroke-linejoin="round"/>
  <!-- Valve body (center) -->
  <rect x="48" y="50" width="32" height="28" rx="4" fill="#2a3a45"/>
  <rect x="48" y="50" width="32" height="28" rx="4" fill="none" stroke="#445566" stroke-width="1"/>
  <!-- Valve body seam line -->
  <line x1="48" y1="64" x2="80" y2="64" stroke="#3a4a55" stroke-width="1.5"/>
  <!-- Valve bonnet (upper part) -->
  <rect x="54" y="34" width="20" height="18" rx="3" fill="#334455"/>
  <rect x="54" y="34" width="20" height="5" rx="2" fill="#445566" opacity="0.7"/>
  <!-- Valve stem -->
  <rect x="61" y="18" width="6" height="18" rx="2" fill="#3a5060"/>
  <rect x="61" y="18" width="3" height="18" rx="1" fill="#88aacc" opacity="0.25"/>
  <!-- Handwheel rim -->
  <circle cx="64" cy="16" r="18" fill="none" stroke="url(#wvWheel)" stroke-width="4"/>
  <circle cx="64" cy="16" r="18" fill="none" stroke="#88aacc" stroke-width="0.5" opacity="0.3"/>
  <!-- Handwheel spokes -->
  <line x1="64" y1="16" x2="64" y2="0" stroke="#334455" stroke-width="2.5"/>
  <line x1="64" y1="16" x2="80" y2="22" stroke="#334455" stroke-width="2.5"/>
  <line x1="64" y1="16" x2="74" y2="30" stroke="#334455" stroke-width="2.5"/>
  <line x1="64" y1="16" x2="54" y2="30" stroke="#334455" stroke-width="2.5"/>
  <line x1="64" y1="16" x2="48" y2="22" stroke="#334455" stroke-width="2.5"/>
  <!-- Handwheel center hub -->
  <circle cx="64" cy="16" r="5" fill="#334455"/>
  <circle cx="64" cy="16" r="3" fill="#445566"/>
  <!-- Packing gland nuts on bonnet -->
  <rect x="52" y="44" width="8" height="5" rx="1" fill="#2a3845" stroke="#334455" stroke-width="0.5"/>
  <rect x="68" y="44" width="8" height="5" rx="1" fill="#2a3845" stroke="#334455" stroke-width="0.5"/>
  <!-- Flow direction label area -->
  <rect x="82" y="60" width="22" height="8" rx="2" fill="#1a2030" opacity="0.5"/>
  <line x1="84" y1="64" x2="96" y2="64" stroke="#88aacc" stroke-width="1" opacity="0.4"/>
  <path d="M93 61 L97 64 L93 67" fill="none" stroke="#88aacc" stroke-width="1" opacity="0.4"/>
</svg>
