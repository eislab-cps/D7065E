<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="gearFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a6070"/>
      <stop offset="50%" stop-color="#3a4a55"/>
      <stop offset="100%" stop-color="#1e2830"/>
    </linearGradient>
    <linearGradient id="gearShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#88aacc" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#88aacc" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#88aacc" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="gearHub" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#445566"/>
      <stop offset="100%" stop-color="#1a2530"/>
    </radialGradient>
  </defs>
  <!-- Gear/cog with 8 teeth -->
  <!-- Outer ring -->
  <circle cx="64" cy="64" r="56" fill="url(#gearFace)"/>
  <circle cx="64" cy="64" r="56" fill="url(#gearShine)"/>
  <circle cx="64" cy="64" r="56" fill="none" stroke="#99aabb" stroke-width="1" opacity="0.4"/>
  <!-- Gear teeth (8 teeth, rectangular) -->
  <!-- Tooth 1 (top) -->
  <rect x="56" y="4" width="16" height="20" rx="3" fill="url(#gearFace)"/>
  <rect x="56" y="4" width="16" height="20" rx="3" fill="url(#gearShine)"/>
  <rect x="56" y="4" width="16" height="20" rx="3" fill="none" stroke="#99aabb" stroke-width="0.8" opacity="0.4"/>
  <!-- Tooth 2 (top-right) -->
  <rect x="56" y="4" width="16" height="20" rx="3" fill="url(#gearFace)" transform="rotate(45 64 64)"/>
  <rect x="56" y="4" width="16" height="20" rx="3" fill="url(#gearShine)" transform="rotate(45 64 64)"/>
  <rect x="56" y="4" width="16" height="20" rx="3" fill="none" stroke="#99aabb" stroke-width="0.8" opacity="0.4" transform="rotate(45 64 64)"/>
  <!-- Tooth 3 (right) -->
  <rect x="56" y="4" width="16" height="20" rx="3" fill="url(#gearFace)" transform="rotate(90 64 64)"/>
  <rect x="56" y="4" width="16" height="20" rx="3" fill="url(#gearShine)" transform="rotate(90 64 64)"/>
  <rect x="56" y="4" width="16" height="20" rx="3" fill="none" stroke="#99aabb" stroke-width="0.8" opacity="0.4" transform="rotate(90 64 64)"/>
  <!-- Tooth 4 (bottom-right) -->
  <rect x="56" y="4" width="16" height="20" rx="3" fill="url(#gearFace)" transform="rotate(135 64 64)"/>
  <rect x="56" y="4" width="16" height="20" rx="3" fill="url(#gearShine)" transform="rotate(135 64 64)"/>
  <rect x="56" y="4" width="16" height="20" rx="3" fill="none" stroke="#99aabb" stroke-width="0.8" opacity="0.4" transform="rotate(135 64 64)"/>
  <!-- Tooth 5 (bottom) -->
  <rect x="56" y="4" width="16" height="20" rx="3" fill="url(#gearFace)" transform="rotate(180 64 64)"/>
  <rect x="56" y="4" width="16" height="20" rx="3" fill="url(#gearShine)" transform="rotate(180 64 64)"/>
  <rect x="56" y="4" width="16" height="20" rx="3" fill="none" stroke="#99aabb" stroke-width="0.8" opacity="0.4" transform="rotate(180 64 64)"/>
  <!-- Tooth 6 (bottom-left) -->
  <rect x="56" y="4" width="16" height="20" rx="3" fill="url(#gearFace)" transform="rotate(225 64 64)"/>
  <rect x="56" y="4" width="16" height="20" rx="3" fill="url(#gearShine)" transform="rotate(225 64 64)"/>
  <rect x="56" y="4" width="16" height="20" rx="3" fill="none" stroke="#99aabb" stroke-width="0.8" opacity="0.4" transform="rotate(225 64 64)"/>
  <!-- Tooth 7 (left) -->
  <rect x="56" y="4" width="16" height="20" rx="3" fill="url(#gearFace)" transform="rotate(270 64 64)"/>
  <rect x="56" y="4" width="16" height="20" rx="3" fill="url(#gearShine)" transform="rotate(270 64 64)"/>
  <rect x="56" y="4" width="16" height="20" rx="3" fill="none" stroke="#99aabb" stroke-width="0.8" opacity="0.4" transform="rotate(270 64 64)"/>
  <!-- Tooth 8 (top-left) -->
  <rect x="56" y="4" width="16" height="20" rx="3" fill="url(#gearFace)" transform="rotate(315 64 64)"/>
  <rect x="56" y="4" width="16" height="20" rx="3" fill="url(#gearShine)" transform="rotate(315 64 64)"/>
  <rect x="56" y="4" width="16" height="20" rx="3" fill="none" stroke="#99aabb" stroke-width="0.8" opacity="0.4" transform="rotate(315 64 64)"/>
  <!-- Gear face surface detail - concentric circle -->
  <circle cx="64" cy="64" r="44" fill="none" stroke="#2a3845" stroke-width="1" opacity="0.5"/>
  <!-- Bolt circle (8 bolts) -->
  <circle cx="64" cy="24" r="4" fill="#1a2030"/><circle cx="64" cy="24" r="2.5" fill="#2a3845"/><circle cx="64" cy="24" r="1" fill="#88aacc" opacity="0.5"/>
  <circle cx="64" cy="24" r="4" fill="#1a2030" transform="rotate(45 64 64)"/><circle cx="64" cy="24" r="2.5" fill="#2a3845" transform="rotate(45 64 64)"/><circle cx="64" cy="24" r="1" fill="#88aacc" opacity="0.5" transform="rotate(45 64 64)"/>
  <circle cx="64" cy="24" r="4" fill="#1a2030" transform="rotate(90 64 64)"/><circle cx="64" cy="24" r="2.5" fill="#2a3845" transform="rotate(90 64 64)"/>
  <circle cx="64" cy="24" r="4" fill="#1a2030" transform="rotate(135 64 64)"/><circle cx="64" cy="24" r="2.5" fill="#2a3845" transform="rotate(135 64 64)"/>
  <circle cx="64" cy="24" r="4" fill="#1a2030" transform="rotate(180 64 64)"/><circle cx="64" cy="24" r="2.5" fill="#2a3845" transform="rotate(180 64 64)"/>
  <circle cx="64" cy="24" r="4" fill="#1a2030" transform="rotate(225 64 64)"/><circle cx="64" cy="24" r="2.5" fill="#2a3845" transform="rotate(225 64 64)"/>
  <circle cx="64" cy="24" r="4" fill="#1a2030" transform="rotate(270 64 64)"/><circle cx="64" cy="24" r="2.5" fill="#2a3845" transform="rotate(270 64 64)"/>
  <circle cx="64" cy="24" r="4" fill="#1a2030" transform="rotate(315 64 64)"/><circle cx="64" cy="24" r="2.5" fill="#2a3845" transform="rotate(315 64 64)"/>
  <!-- Hub with shaft hole -->
  <circle cx="64" cy="64" r="22" fill="url(#gearHub)"/>
  <circle cx="64" cy="64" r="22" fill="none" stroke="#667788" stroke-width="1.5"/>
  <circle cx="64" cy="64" r="16" fill="#2a3845"/>
  <!-- Keyway slot -->
  <rect x="60" y="42" width="8" height="10" rx="1" fill="#1a2030"/>
  <!-- Shaft hole -->
  <circle cx="64" cy="64" r="10" fill="#1a2030"/>
  <circle cx="64" cy="64" r="10" fill="none" stroke="#334455" stroke-width="1"/>
  <!-- Hub highlight -->
  <path d="M52 54 A14 14 0 0 1 70 50" fill="none" stroke="#88aacc" stroke-width="1" opacity="0.3"/>
</svg>
