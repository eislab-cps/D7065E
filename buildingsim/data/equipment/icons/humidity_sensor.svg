<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="hsBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a4a55"/>
      <stop offset="100%" stop-color="#1e2830"/>
    </linearGradient>
    <linearGradient id="hsPCB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3020"/>
      <stop offset="100%" stop-color="#0f1f14"/>
    </linearGradient>
  </defs>
  <!-- Main housing -->
  <rect x="18" y="14" width="88" height="90" rx="8" fill="url(#hsBody)"/>
  <rect x="18" y="14" width="88" height="90" rx="8" fill="none" stroke="#667788" stroke-width="1" opacity="0.5"/>
  <!-- Top vent grille -->
  <rect x="24" y="16" width="76" height="22" rx="5" fill="#1a2830"/>
  <rect x="24" y="16" width="76" height="22" rx="5" fill="none" stroke="#445566" stroke-width="0.6"/>
  <!-- Vent slots -->
  <rect x="28" y="20" width="68" height="2" rx="1" fill="#2a3845" opacity="0.8"/>
  <rect x="28" y="24" width="68" height="2" rx="1" fill="#2a3845" opacity="0.8"/>
  <rect x="28" y="28" width="68" height="2" rx="1" fill="#2a3845" opacity="0.8"/>
  <rect x="28" y="32" width="68" height="2" rx="1" fill="#2a3845" opacity="0.8"/>
  <!-- Moisture/humidity element (droplet shape) -->
  <path d="M64 40 Q72 52 72 60 A8 8 0 0 1 56 60 Q56 52 64 40Z" fill="#1a3040" stroke="#88aacc" stroke-width="1" opacity="0.9"/>
  <path d="M64 42 Q70 53 70 60 A6 6 0 0 1 58 60 Q58 53 64 42Z" fill="#88aacc" opacity="0.15"/>
  <!-- PCB visible through cutout -->
  <rect x="24" y="70" width="76" height="28" rx="4" fill="url(#hsPCB)"/>
  <rect x="24" y="70" width="76" height="28" rx="4" fill="none" stroke="#2a4030" stroke-width="0.8"/>
  <!-- PCB traces -->
  <line x1="30" y1="76" x2="60" y2="76" stroke="#2a5030" stroke-width="1" opacity="0.8"/>
  <line x1="30" y1="80" x2="50" y2="80" stroke="#2a5030" stroke-width="1" opacity="0.8"/>
  <line x1="60" y1="76" x2="60" y2="88" stroke="#2a5030" stroke-width="1" opacity="0.8"/>
  <line x1="70" y1="78" x2="90" y2="78" stroke="#2a5030" stroke-width="1" opacity="0.8"/>
  <line x1="70" y1="84" x2="88" y2="84" stroke="#2a5030" stroke-width="1" opacity="0.8"/>
  <!-- IC chip -->
  <rect x="38" y="73" width="18" height="12" rx="1" fill="#1a2820"/>
  <rect x="38" y="73" width="18" height="12" rx="1" fill="none" stroke="#3a5040" stroke-width="0.6"/>
  <line x1="38" y1="76" x2="34" y2="76" stroke="#3a5040" stroke-width="0.8"/>
  <line x1="38" y1="79" x2="34" y2="79" stroke="#3a5040" stroke-width="0.8"/>
  <line x1="38" y1="82" x2="34" y2="82" stroke="#3a5040" stroke-width="0.8"/>
  <line x1="56" y1="76" x2="60" y2="76" stroke="#3a5040" stroke-width="0.8"/>
  <line x1="56" y1="79" x2="60" y2="79" stroke="#3a5040" stroke-width="0.8"/>
  <line x1="56" y1="82" x2="60" y2="82" stroke="#3a5040" stroke-width="0.8"/>
  <!-- Status LEDs -->
  <circle cx="76" cy="76" r="3" fill="#1a2030"/><circle cx="76" cy="76" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="84" cy="76" r="3" fill="#1a2030"/><circle cx="84" cy="76" r="2" fill="#ffffff" opacity="0.4"/>
  <!-- Cable connector at bottom -->
  <rect x="52" y="100" width="24" height="8" rx="2" fill="#1a2030"/>
  <rect x="54" y="102" width="6" height="4" rx="1" fill="#2a3845"/>
  <rect x="62" y="102" width="6" height="4" rx="1" fill="#2a3845"/>
  <rect x="70" y="102" width="4" height="4" rx="1" fill="#2a3845"/>
  <!-- Cable -->
  <path d="M64 108 Q64 116 56 120" fill="none" stroke="#1a2030" stroke-width="3" stroke-linecap="round"/>
  <path d="M64 108 Q64 116 56 120" fill="none" stroke="#334455" stroke-width="2" stroke-linecap="round"/>
  <!-- Mounting screws -->
  <circle cx="26" cy="22" r="2.5" fill="#1a2030"/><circle cx="26" cy="22" r="1.5" fill="#334455"/>
  <circle cx="98" cy="22" r="2.5" fill="#1a2030"/><circle cx="98" cy="22" r="1.5" fill="#334455"/>
</svg>
