<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="thDial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a4a55"/>
      <stop offset="100%" stop-color="#1a2530"/>
    </radialGradient>
    <radialGradient id="thScreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2840"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </radialGradient>
  </defs>
  <!-- Outer dial ring -->
  <circle cx="64" cy="64" r="58" fill="#1e2830"/>
  <circle cx="64" cy="64" r="58" fill="none" stroke="#667788" stroke-width="1.5" opacity="0.4"/>
  <!-- Dial body -->
  <circle cx="64" cy="64" r="54" fill="url(#thDial)"/>
  <circle cx="64" cy="64" r="54" fill="none" stroke="#445566" stroke-width="1"/>
  <!-- Temperature tick marks (every 10 degrees, 270 degree arc) -->
  <!-- Major ticks -->
  <line x1="64" y1="12" x2="64" y2="20" stroke="#88aacc" stroke-width="2" opacity="0.7" transform="rotate(-135 64 64)"/>
  <line x1="64" y1="12" x2="64" y2="20" stroke="#88aacc" stroke-width="2" opacity="0.7" transform="rotate(-90 64 64)"/>
  <line x1="64" y1="12" x2="64" y2="20" stroke="#88aacc" stroke-width="2" opacity="0.7" transform="rotate(-45 64 64)"/>
  <line x1="64" y1="12" x2="64" y2="20" stroke="#88aacc" stroke-width="2" opacity="0.7" transform="rotate(0 64 64)"/>
  <line x1="64" y1="12" x2="64" y2="20" stroke="#88aacc" stroke-width="2" opacity="0.7" transform="rotate(45 64 64)"/>
  <line x1="64" y1="12" x2="64" y2="20" stroke="#88aacc" stroke-width="2" opacity="0.7" transform="rotate(90 64 64)"/>
  <line x1="64" y1="12" x2="64" y2="20" stroke="#88aacc" stroke-width="2" opacity="0.7" transform="rotate(135 64 64)"/>
  <!-- Minor ticks -->
  <line x1="64" y1="12" x2="64" y2="17" stroke="#445566" stroke-width="1" opacity="0.6" transform="rotate(-112.5 64 64)"/>
  <line x1="64" y1="12" x2="64" y2="17" stroke="#445566" stroke-width="1" opacity="0.6" transform="rotate(-67.5 64 64)"/>
  <line x1="64" y1="12" x2="64" y2="17" stroke="#445566" stroke-width="1" opacity="0.6" transform="rotate(-22.5 64 64)"/>
  <line x1="64" y1="12" x2="64" y2="17" stroke="#445566" stroke-width="1" opacity="0.6" transform="rotate(22.5 64 64)"/>
  <line x1="64" y1="12" x2="64" y2="17" stroke="#445566" stroke-width="1" opacity="0.6" transform="rotate(67.5 64 64)"/>
  <line x1="64" y1="12" x2="64" y2="17" stroke="#445566" stroke-width="1" opacity="0.6" transform="rotate(112.5 64 64)"/>
  <!-- Digital display center -->
  <circle cx="64" cy="58" r="28" fill="url(#thScreen)"/>
  <circle cx="64" cy="58" r="28" fill="none" stroke="#334455" stroke-width="1"/>
  <!-- Temp display -->
  <text x="46" y="62" font-size="16" font-weight="bold" fill="#88aacc" opacity="0.9" font-family="monospace">21°C</text>
  <rect x="46" y="42" width="36" height="3" rx="1" fill="#445566" opacity="0.4"/>
  <text x="52" y="52" font-size="7" fill="#667788" font-family="monospace">SET 20°</text>
  <!-- Needle -->
  <line x1="64" y1="58" x2="64" y2="20" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.8" transform="rotate(20 64 58)"/>
  <circle cx="64" cy="58" r="4" fill="#334455" stroke="#88aacc" stroke-width="1"/>
  <!-- Control buttons at bottom -->
  <rect x="42" y="92" width="14" height="8" rx="3" fill="#1e2830" stroke="#334455" stroke-width="0.8"/>
  <line x1="46" y1="96" x2="52" y2="96" stroke="#667788" stroke-width="1.5"/>
  <rect x="62" y="92" width="14" height="8" rx="3" fill="#1e2830" stroke="#334455" stroke-width="0.8"/>
  <line x1="66" y1="96" x2="72" y2="96" stroke="#667788" stroke-width="1.5"/>
  <line x1="69" y1="93" x2="69" y2="99" stroke="#667788" stroke-width="1.5"/>
  <!-- Wiring terminals at base -->
  <rect x="54" y="104" width="20" height="10" rx="2" fill="#1a2030"/>
  <circle cx="58" cy="109" r="2" fill="#2a3845"/><circle cx="64" cy="109" r="2" fill="#2a3845"/><circle cx="70" cy="109" r="2" fill="#2a3845"/>
  <!-- Mounting ring detail -->
  <circle cx="64" cy="64" r="58" fill="none" stroke="#99aabb" stroke-width="0.6" opacity="0.2"/>
</svg>
