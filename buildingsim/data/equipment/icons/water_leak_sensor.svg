<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="wlsPad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3a45"/>
      <stop offset="100%" stop-color="#1a2530"/>
    </linearGradient>
  </defs>
  <!-- Flat pad body -->
  <rect x="10" y="44" width="108" height="40" rx="6" fill="url(#wlsPad)"/>
  <rect x="10" y="44" width="108" height="40" rx="6" fill="none" stroke="#445566" stroke-width="1.2" opacity="0.5"/>
  <!-- Pad top shine -->
  <rect x="12" y="46" width="104" height="6" rx="3" fill="#88aacc" opacity="0.1"/>
  <!-- Label area (center) -->
  <rect x="36" y="52" width="56" height="24" rx="3" fill="#1a2030"/>
  <rect x="36" y="52" width="56" height="24" rx="3" fill="none" stroke="#334455" stroke-width="0.7"/>
  <!-- Water drop symbol on display -->
  <path d="M64 57 Q70 63 70 67 A6 6 0 0 1 58 67 Q58 63 64 57Z" fill="#2244aa" opacity="0.7"/>
  <path d="M64 58 Q69 64 69 67 A5 5 0 0 1 59 67 Q59 64 64 58Z" fill="#3366cc" opacity="0.5"/>
  <!-- Alarm LED -->
  <circle cx="80" cy="60" r="5" fill="#1a2030"/>
  <circle cx="80" cy="60" r="3.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="80" cy="60" r="2" fill="#ffffff"/>
  <!-- Probe tips (left and right bottom) -->
  <!-- Left probe array -->
  <rect x="16" y="82" width="4" height="20" rx="2" fill="#667788"/>
  <rect x="16" y="82" width="2" height="20" rx="1" fill="#88aacc" opacity="0.3"/>
  <circle cx="18" cy="102" r="3" fill="#445566"/>
  <circle cx="18" cy="102" r="1.5" fill="#88aacc" opacity="0.5"/>
  <rect x="24" y="82" width="4" height="20" rx="2" fill="#667788"/>
  <circle cx="26" cy="102" r="3" fill="#445566"/>
  <circle cx="26" cy="102" r="1.5" fill="#88aacc" opacity="0.5"/>
  <rect x="32" y="82" width="4" height="20" rx="2" fill="#667788"/>
  <circle cx="34" cy="102" r="3" fill="#445566"/>
  <circle cx="34" cy="102" r="1.5" fill="#88aacc" opacity="0.5"/>
  <!-- Right probe array -->
  <rect x="90" y="82" width="4" height="20" rx="2" fill="#667788"/>
  <circle cx="92" cy="102" r="3" fill="#445566"/>
  <circle cx="92" cy="102" r="1.5" fill="#88aacc" opacity="0.5"/>
  <rect x="98" y="82" width="4" height="20" rx="2" fill="#667788"/>
  <circle cx="100" cy="102" r="3" fill="#445566"/>
  <circle cx="100" cy="102" r="1.5" fill="#88aacc" opacity="0.5"/>
  <rect x="106" y="82" width="4" height="20" rx="2" fill="#667788"/>
  <circle cx="108" cy="102" r="3" fill="#445566"/>
  <circle cx="108" cy="102" r="1.5" fill="#88aacc" opacity="0.5"/>
  <!-- Cable connector (top right) -->
  <rect x="90" y="36" width="28" height="10" rx="3" fill="#1a2030"/>
  <rect x="92" y="38" width="8" height="5" rx="1" fill="#2a3845"/>
  <rect x="102" y="38" width="8" height="5" rx="1" fill="#2a3845"/>
  <!-- Cable -->
  <path d="M104 36 Q104 28 96 22" fill="none" stroke="#1a2030" stroke-width="3.5"/>
  <path d="M104 36 Q104 28 96 22" fill="none" stroke="#334455" stroke-width="2.5"/>
  <!-- Mounting screws on pad -->
  <circle cx="18" cy="52" r="3" fill="#1a2030"/><circle cx="18" cy="52" r="2" fill="#334455"/>
  <circle cx="110" cy="52" r="3" fill="#1a2030"/><circle cx="110" cy="52" r="2" fill="#334455"/>
  <circle cx="18" cy="76" r="3" fill="#1a2030"/><circle cx="18" cy="76" r="2" fill="#334455"/>
  <circle cx="110" cy="76" r="3" fill="#1a2030"/><circle cx="110" cy="76" r="2" fill="#334455"/>
</svg>
