<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="gldBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a2a"/>
      <stop offset="100%" stop-color="#1e1e14"/>
    </linearGradient>
  </defs>
  <!-- Explosion-proof housing (rounded thick walls) -->
  <rect x="10" y="14" width="108" height="100" rx="12" fill="url(#gldBody)"/>
  <rect x="10" y="14" width="108" height="100" rx="12" fill="none" stroke="#554422" stroke-width="2" opacity="0.6"/>
  <!-- Heavy wall effect (inner rect) -->
  <rect x="18" y="22" width="92" height="84" rx="8" fill="#2a2a1a" opacity="0.5"/>
  <!-- Body bolts (explosion-proof flange bolts) -->
  <circle cx="22" cy="26" r="4" fill="#1a1a10"/><circle cx="22" cy="26" r="2.5" fill="#2a2a18"/><line x1="20" y1="26" x2="24" y2="26" stroke="#3a3a28" stroke-width="0.8"/><line x1="22" y1="24" x2="22" y2="28" stroke="#3a3a28" stroke-width="0.8"/>
  <circle cx="106" cy="26" r="4" fill="#1a1a10"/><circle cx="106" cy="26" r="2.5" fill="#2a2a18"/>
  <circle cx="22" cy="102" r="4" fill="#1a1a10"/><circle cx="22" cy="102" r="2.5" fill="#2a2a18"/>
  <circle cx="106" cy="102" r="4" fill="#1a1a10"/><circle cx="106" cy="102" r="2.5" fill="#2a2a18"/>
  <circle cx="22" cy="64" r="4" fill="#1a1a10"/><circle cx="22" cy="64" r="2.5" fill="#2a2a18"/>
  <circle cx="106" cy="64" r="4" fill="#1a1a10"/><circle cx="106" cy="64" r="2.5" fill="#2a2a18"/>
  <!-- Catalytic bead sensor mesh window -->
  <rect x="26" y="30" width="44" height="44" rx="6" fill="#1a1a0a"/>
  <rect x="26" y="30" width="44" height="44" rx="6" fill="none" stroke="#443322" stroke-width="1"/>
  <!-- Mesh grid over sensor -->
  <line x1="28" y1="35" x2="68" y2="35" stroke="#2a2a18" stroke-width="1.2" opacity="0.8"/>
  <line x1="28" y1="41" x2="68" y2="41" stroke="#2a2a18" stroke-width="1.2" opacity="0.8"/>
  <line x1="28" y1="47" x2="68" y2="47" stroke="#2a2a18" stroke-width="1.2" opacity="0.8"/>
  <line x1="28" y1="53" x2="68" y2="53" stroke="#2a2a18" stroke-width="1.2" opacity="0.8"/>
  <line x1="28" y1="59" x2="68" y2="59" stroke="#2a2a18" stroke-width="1.2" opacity="0.8"/>
  <line x1="28" y1="65" x2="68" y2="65" stroke="#2a2a18" stroke-width="1.2" opacity="0.8"/>
  <line x1="34" y1="30" x2="34" y2="74" stroke="#2a2a18" stroke-width="1.2" opacity="0.8"/>
  <line x1="42" y1="30" x2="42" y2="74" stroke="#2a2a18" stroke-width="1.2" opacity="0.8"/>
  <line x1="50" y1="30" x2="50" y2="74" stroke="#2a2a18" stroke-width="1.2" opacity="0.8"/>
  <line x1="58" y1="30" x2="58" y2="74" stroke="#2a2a18" stroke-width="1.2" opacity="0.8"/>
  <line x1="66" y1="30" x2="66" y2="74" stroke="#2a2a18" stroke-width="1.2" opacity="0.8"/>
  <!-- Catalytic bead glow (orange/hot) -->
  <circle cx="48" cy="52" r="10" fill="#331100" opacity="0.8"/>
  <circle cx="48" cy="52" r="7" fill="#441500" opacity="0.7"/>
  <circle cx="48" cy="52" r="4" fill="#cc5500" opacity="0.4"/>
  <!-- Control section (right) -->
  <rect x="74" y="30" width="44" height="44" rx="4" fill="#1a1a10"/>
  <rect x="74" y="30" width="44" height="44" rx="4" fill="none" stroke="#443322" stroke-width="0.8"/>
  <!-- Alarm LED (large, red) -->
  <circle cx="96" cy="44" r="10" fill="#1a0808"/>
  <circle cx="96" cy="44" r="7" fill="#ffffff" opacity="0.7"/>
  <circle cx="96" cy="44" r="4" fill="#ffffff"/>
  <!-- ALARM text area -->
  <rect x="78" y="56" width="36" height="8" rx="2" fill="#1a0808"/>
  <rect x="80" y="58" width="24" height="2" rx="1" fill="#ffffff" opacity="0.3"/>
  <!-- Cable gland (conduit entry) -->
  <rect x="34" y="78" width="14" height="16" rx="3" fill="#2a2a18"/>
  <rect x="34" y="78" width="14" height="6" rx="2" fill="#3a3a28" opacity="0.6"/>
  <circle cx="41" cy="82" r="3" fill="#1a1a10"/>
  <!-- Status LEDs (bottom row) -->
  <rect x="26" y="80" width="76" height="16" rx="4" fill="#1a1a10"/>
  <circle cx="56" cy="88" r="4" fill="#1a0808"/><circle cx="56" cy="88" r="2.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="70" cy="88" r="4" fill="#1a0808"/><circle cx="70" cy="88" r="2.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="84" cy="88" r="4" fill="#1a0808"/><circle cx="84" cy="88" r="2.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="96" cy="88" r="4" fill="#1a0808"/><circle cx="96" cy="88" r="2.5" fill="#ffffff" opacity="0.3"/>
  <!-- Conduit knockout at bottom -->
  <rect x="52" y="108" width="24" height="8" rx="3" fill="#2a2a18" stroke="#3a3a28" stroke-width="0.7"/>
</svg>
