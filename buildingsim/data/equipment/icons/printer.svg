<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="prnBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3a45"/>
      <stop offset="100%" stop-color="#1a2530"/>
    </linearGradient>
  </defs>
  <!-- Paper output tray with paper sheet -->
  <rect x="22" y="8" width="84" height="4" rx="1" fill="#aabbcc" opacity="0.7"/>
  <rect x="26" y="10" width="76" height="18" rx="1" fill="#99aabb" opacity="0.5"/>
  <rect x="26" y="10" width="76" height="5" rx="1" fill="#ffffff" opacity="0.3"/>
  <!-- Paper lines on output sheet -->
  <line x1="32" y1="14" x2="78" y2="14" stroke="#667788" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="18" x2="66" y2="18" stroke="#667788" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="22" x2="74" y2="22" stroke="#667788" stroke-width="0.8" opacity="0.4"/>
  <!-- Main printer body -->
  <rect x="14" y="26" width="100" height="62" rx="7" fill="url(#prnBody)"/>
  <rect x="14" y="26" width="100" height="62" rx="7" fill="none" stroke="#445566" stroke-width="1.2" opacity="0.5"/>
  <!-- Top chrome stripe -->
  <rect x="14" y="26" width="100" height="7" rx="4" fill="#334455" opacity="0.6"/>
  <!-- Paper path slot (top center) -->
  <rect x="32" y="25" width="64" height="4" rx="1" fill="#1a2030"/>
  <!-- Control panel (right side) -->
  <rect x="80" y="32" width="30" height="50" rx="3" fill="#1a2030"/>
  <rect x="80" y="32" width="30" height="50" rx="3" fill="none" stroke="#334455" stroke-width="0.7"/>
  <!-- Control display -->
  <rect x="82" y="34" width="26" height="18" rx="2" fill="#0a1820"/>
  <rect x="84" y="36" width="18" height="3" rx="1" fill="#88aacc" opacity="0.6"/>
  <rect x="84" y="42" width="12" height="2" rx="1" fill="#88aacc" opacity="0.4"/>
  <rect x="84" y="47" width="20" height="2" rx="1" fill="#88aacc" opacity="0.3"/>
  <!-- Control buttons -->
  <rect x="82" y="56" width="8" height="6" rx="2" fill="#2a3845"/>
  <rect x="92" y="56" width="8" height="6" rx="2" fill="#2a3845"/>
  <rect x="82" y="64" width="8" height="6" rx="2" fill="#2a3845"/>
  <rect x="92" y="64" width="8" height="6" rx="2" fill="#334455"/>
  <!-- Status LED -->
  <circle cx="105" cy="38" r="3.5" fill="#1a2030"/>
  <circle cx="105" cy="38" r="2.2" fill="#ffffff" opacity="0.8"/>
  <!-- Main body panel (left) -->
  <rect x="16" y="32" width="60" height="54" rx="3" fill="#1e2a34"/>
  <rect x="16" y="32" width="60" height="54" rx="3" fill="none" stroke="#334455" stroke-width="0.6"/>
  <!-- Paper cassette tray at bottom -->
  <rect x="14" y="84" width="100" height="18" rx="4" fill="#1e2a34"/>
  <rect x="14" y="84" width="100" height="18" rx="4" fill="none" stroke="#334455" stroke-width="0.8"/>
  <rect x="14" y="84" width="100" height="5" rx="2" fill="#2a3845" opacity="0.5"/>
  <!-- Tray paper edge visible -->
  <rect x="20" y="88" width="88" height="8" rx="1" fill="#99aabb" opacity="0.2"/>
  <!-- Paper path lines (internal visible) -->
  <line x1="22" y1="60" x2="76" y2="60" stroke="#334455" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.5"/>
  <!-- Front USB/ports -->
  <rect x="18" y="74" width="10" height="6" rx="1" fill="#1a2030" stroke="#334455" stroke-width="0.5"/>
  <rect x="30" y="74" width="8" height="6" rx="1" fill="#1a2030" stroke="#334455" stroke-width="0.5"/>
  <!-- Vent slots -->
  <line x1="18" y1="42" x2="18" y2="72" stroke="#334455" stroke-width="1.2" opacity="0.5"/>
  <line x1="22" y1="42" x2="22" y2="72" stroke="#334455" stroke-width="1.2" opacity="0.5"/>
</svg>
