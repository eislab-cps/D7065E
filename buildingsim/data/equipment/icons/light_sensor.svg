<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="lsBoard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2820"/>
      <stop offset="100%" stop-color="#0f1a14"/>
    </linearGradient>
    <radialGradient id="lsDome" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#8aaa80" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#3a5040" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1a2830" stop-opacity="0.9"/>
    </radialGradient>
    <radialGradient id="lsGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- PCB board -->
  <rect x="20" y="60" width="88" height="56" rx="5" fill="url(#lsBoard)"/>
  <rect x="20" y="60" width="88" height="56" rx="5" fill="none" stroke="#2a4030" stroke-width="1"/>
  <!-- PCB corner holes -->
  <circle cx="28" cy="68" r="3" fill="#0f1a14"/><circle cx="28" cy="68" r="2" fill="#1a2820"/>
  <circle cx="100" cy="68" r="3" fill="#0f1a14"/><circle cx="100" cy="68" r="2" fill="#1a2820"/>
  <circle cx="28" cy="108" r="3" fill="#0f1a14"/><circle cx="28" cy="108" r="2" fill="#1a2820"/>
  <circle cx="100" cy="108" r="3" fill="#0f1a14"/><circle cx="100" cy="108" r="2" fill="#1a2820"/>
  <!-- PCB traces -->
  <line x1="64" y1="60" x2="64" y2="90" stroke="#2a5030" stroke-width="1.5"/>
  <line x1="34" y1="88" x2="94" y2="88" stroke="#2a5030" stroke-width="0.8"/>
  <line x1="34" y1="92" x2="60" y2="92" stroke="#2a5030" stroke-width="0.8"/>
  <line x1="80" y1="84" x2="94" y2="84" stroke="#2a5030" stroke-width="0.8"/>
  <!-- Supporting components on PCB -->
  <rect x="76" y="70" width="16" height="10" rx="1" fill="#1a2820" stroke="#3a5040" stroke-width="0.6"/>
  <rect x="34" y="70" width="12" height="10" rx="1" fill="#1a2820" stroke="#3a5040" stroke-width="0.6"/>
  <!-- Capacitors -->
  <rect x="48" y="96" width="6" height="10" rx="1" fill="#1e3824"/>
  <rect x="57" y="96" width="6" height="10" rx="1" fill="#1e3824"/>
  <rect x="66" y="96" width="6" height="10" rx="1" fill="#1e3824"/>
  <!-- Photodiode dome (top center) -->
  <ellipse cx="64" cy="60" rx="22" ry="12" fill="#1a2820"/>
  <ellipse cx="64" cy="60" rx="22" ry="12" fill="none" stroke="#3a5040" stroke-width="1"/>
  <!-- Dome lens (circle looking up) -->
  <circle cx="64" cy="52" r="20" fill="url(#lsDome)"/>
  <circle cx="64" cy="52" r="20" fill="none" stroke="#88aacc" stroke-width="0.8" opacity="0.5"/>
  <!-- Fresnel lens rings in dome -->
  <circle cx="64" cy="52" r="14" fill="none" stroke="#6a9080" stroke-width="0.5" opacity="0.4"/>
  <circle cx="64" cy="52" r="8" fill="none" stroke="#6a9080" stroke-width="0.5" opacity="0.4"/>
  <circle cx="64" cy="52" r="4" fill="none" stroke="#6a9080" stroke-width="0.5" opacity="0.4"/>
  <!-- Inner photodiode -->
  <circle cx="64" cy="52" r="10" fill="#1a2830" opacity="0.6"/>
  <circle cx="64" cy="52" r="6" fill="#1a2040" opacity="0.8"/>
  <!-- Lens reflection highlight -->
  <circle cx="58" cy="46" r="4" fill="url(#lsGlow)"/>
  <!-- Light rays incoming (above dome) -->
  <line x1="64" y1="32" x2="64" y2="40" stroke="#ffffff" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <line x1="50" y1="28" x2="55" y2="38" stroke="#ffffff" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
  <line x1="78" y1="28" x2="73" y2="38" stroke="#ffffff" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
  <line x1="40" y1="36" x2="48" y2="42" stroke="#ffffff" stroke-width="0.8" opacity="0.1" stroke-linecap="round"/>
  <line x1="88" y1="36" x2="80" y2="42" stroke="#ffffff" stroke-width="0.8" opacity="0.1" stroke-linecap="round"/>
  <!-- Signal output pins at bottom -->
  <rect x="50" y="114" width="28" height="8" rx="2" fill="#1a2030"/>
  <circle cx="57" cy="118" r="2" fill="#3a5040"/>
  <circle cx="64" cy="118" r="2" fill="#3a5040"/>
  <circle cx="71" cy="118" r="2" fill="#3a5040"/>
</svg>
