<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bs5gTower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#556677"/>
      <stop offset="100%" stop-color="#3a4a55"/>
    </linearGradient>
    <linearGradient id="bs5gBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a4a55"/>
      <stop offset="100%" stop-color="#1e2830"/>
    </linearGradient>
  </defs>
  <!-- Base platform -->
  <rect x="38" y="108" width="52" height="12" rx="3" fill="url(#bs5gBase)"/>
  <rect x="38" y="108" width="52" height="12" rx="3" fill="none" stroke="#667788" stroke-width="0.8"/>
  <!-- Mounting bolts -->
  <circle cx="44" cy="114" r="2" fill="#1e2830" stroke="#556677" stroke-width="0.5"/>
  <circle cx="84" cy="114" r="2" fill="#1e2830" stroke="#556677" stroke-width="0.5"/>
  <!-- Tower mast -->
  <rect x="60" y="28" width="8" height="82" rx="2" fill="url(#bs5gTower)"/>
  <rect x="60" y="28" width="8" height="82" rx="2" fill="none" stroke="#88aacc" stroke-width="0.5" opacity="0.4"/>
  <!-- Mast highlight -->
  <rect x="61" y="30" width="2.5" height="78" rx="1" fill="#88aacc" opacity="0.1"/>
  <!-- Cross brace top -->
  <line x1="56" y1="50" x2="72" y2="50" stroke="#667788" stroke-width="1.5"/>
  <!-- Cross brace middle -->
  <line x1="54" y1="72" x2="74" y2="72" stroke="#667788" stroke-width="1.5"/>
  <!-- Diagonal braces -->
  <line x1="56" y1="50" x2="54" y2="72" stroke="#556677" stroke-width="0.8"/>
  <line x1="72" y1="50" x2="74" y2="72" stroke="#556677" stroke-width="0.8"/>
  <!-- Antenna panel left -->
  <rect x="38" y="32" width="18" height="28" rx="2" fill="#2a3a45"/>
  <rect x="38" y="32" width="18" height="28" rx="2" fill="none" stroke="#88aacc" stroke-width="0.8" opacity="0.6"/>
  <!-- Antenna panel left details -->
  <rect x="41" y="35" width="12" height="5" rx="1" fill="#1e2830"/>
  <rect x="41" y="42" width="12" height="5" rx="1" fill="#1e2830"/>
  <rect x="41" y="49" width="12" height="5" rx="1" fill="#1e2830"/>
  <rect x="40" y="34" width="4" height="22" rx="1" fill="#88aacc" opacity="0.06"/>
  <!-- Antenna panel right -->
  <rect x="72" y="32" width="18" height="28" rx="2" fill="#2a3a45"/>
  <rect x="72" y="32" width="18" height="28" rx="2" fill="none" stroke="#88aacc" stroke-width="0.8" opacity="0.6"/>
  <!-- Antenna panel right details -->
  <rect x="75" y="35" width="12" height="5" rx="1" fill="#1e2830"/>
  <rect x="75" y="42" width="12" height="5" rx="1" fill="#1e2830"/>
  <rect x="75" y="49" width="12" height="5" rx="1" fill="#1e2830"/>
  <rect x="74" y="34" width="4" height="22" rx="1" fill="#88aacc" opacity="0.06"/>
  <!-- Panel mounting brackets -->
  <line x1="56" y1="40" x2="60" y2="40" stroke="#667788" stroke-width="1.5"/>
  <line x1="56" y1="52" x2="60" y2="52" stroke="#667788" stroke-width="1.5"/>
  <line x1="68" y1="40" x2="72" y2="40" stroke="#667788" stroke-width="1.5"/>
  <line x1="68" y1="52" x2="72" y2="52" stroke="#667788" stroke-width="1.5"/>
  <!-- Top antenna / dome -->
  <circle cx="64" cy="24" r="6" fill="#2a3a45" stroke="#88aacc" stroke-width="0.8" opacity="0.8"/>
  <circle cx="64" cy="24" r="3" fill="#1e2830"/>
  <circle cx="64" cy="24" r="1.5" fill="#ffffff" opacity="0.8"/>
  <!-- Signal waves left -->
  <path d="M32 36 Q26 44 32 52" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <path d="M26 32 Q18 44 26 56" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.35" stroke-linecap="round"/>
  <path d="M20 28 Q10 44 20 60" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <!-- Signal waves right -->
  <path d="M96 36 Q102 44 96 52" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <path d="M102 32 Q110 44 102 56" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.35" stroke-linecap="round"/>
  <path d="M108 28 Q118 44 108 60" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <!-- 5G label -->
  <rect x="48" y="78" width="32" height="16" rx="3" fill="#1e2830" stroke="#88aacc" stroke-width="0.8"/>
  <text x="64" y="91" font-family="monospace" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">5G</text>
  <!-- Status LED -->
  <circle cx="64" cy="100" r="3" fill="#ffffff" opacity="0.9"/>
  <circle cx="64" cy="100" r="5" fill="#ffffff" opacity="0.2"/>
  <!-- Cable entry -->
  <rect x="62" y="108" width="4" height="4" rx="1" fill="#1e2830"/>
</svg>
