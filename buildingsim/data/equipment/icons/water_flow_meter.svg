<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="wfmPipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a6070"/>
      <stop offset="50%" stop-color="#88aacc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2a3845"/>
    </linearGradient>
    <linearGradient id="wfmBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a4a55"/>
      <stop offset="100%" stop-color="#1e2830"/>
    </linearGradient>
  </defs>
  <!-- Left flange -->
  <rect x="4" y="54" width="18" height="20" rx="4" fill="#2a3845"/>
  <rect x="4" y="54" width="18" height="20" rx="4" fill="none" stroke="#445566" stroke-width="0.8"/>
  <!-- Flange bolts -->
  <circle cx="8" cy="58" r="2.5" fill="#1a2030"/><circle cx="8" cy="58" r="1.5" fill="#334455"/>
  <circle cx="18" cy="58" r="2.5" fill="#1a2030"/><circle cx="18" cy="58" r="1.5" fill="#334455"/>
  <circle cx="8" cy="70" r="2.5" fill="#1a2030"/><circle cx="8" cy="70" r="1.5" fill="#334455"/>
  <circle cx="18" cy="70" r="2.5" fill="#1a2030"/><circle cx="18" cy="70" r="1.5" fill="#334455"/>
  <!-- Right flange -->
  <rect x="106" y="54" width="18" height="20" rx="4" fill="#2a3845"/>
  <rect x="106" y="54" width="18" height="20" rx="4" fill="none" stroke="#445566" stroke-width="0.8"/>
  <circle cx="110" cy="58" r="2.5" fill="#1a2030"/><circle cx="110" cy="58" r="1.5" fill="#334455"/>
  <circle cx="120" cy="58" r="2.5" fill="#1a2030"/><circle cx="120" cy="58" r="1.5" fill="#334455"/>
  <circle cx="110" cy="70" r="2.5" fill="#1a2030"/><circle cx="110" cy="70" r="1.5" fill="#334455"/>
  <circle cx="120" cy="70" r="2.5" fill="#1a2030"/><circle cx="120" cy="70" r="1.5" fill="#334455"/>
  <!-- Meter body (central section) -->
  <rect x="20" y="48" width="88" height="32" rx="8" fill="url(#wfmBody)"/>
  <rect x="20" y="48" width="88" height="32" rx="8" fill="none" stroke="#667788" stroke-width="1.2" opacity="0.5"/>
  <!-- Body shine -->
  <rect x="22" y="50" width="28" height="28" rx="6" fill="#88aacc" opacity="0.06"/>
  <!-- Turbine window (visible rotor) -->
  <rect x="32" y="52" width="32" height="24" rx="4" fill="#1a2030"/>
  <rect x="32" y="52" width="32" height="24" rx="4" fill="none" stroke="#334455" stroke-width="0.8"/>
  <!-- Turbine rotor -->
  <circle cx="48" cy="64" r="9" fill="#1a2030" stroke="#2a3845" stroke-width="1"/>
  <!-- Turbine vanes -->
  <path d="M48 55 Q54 57 52 64 Q46 64 48 55Z" fill="#334455" opacity="0.8"/>
  <path d="M57 64 Q55 70 48 68 Q48 62 57 64Z" fill="#334455" opacity="0.8"/>
  <path d="M48 73 Q42 71 44 64 Q50 64 48 73Z" fill="#334455" opacity="0.8"/>
  <path d="M39 64 Q41 58 48 60 Q48 66 39 64Z" fill="#334455" opacity="0.8"/>
  <circle cx="48" cy="64" r="3" fill="#2a3845"/>
  <circle cx="48" cy="64" r="1.5" fill="#88aacc" opacity="0.5"/>
  <!-- Counter display -->
  <rect x="68" y="52" width="36" height="24" rx="4" fill="#0a1820"/>
  <rect x="68" y="52" width="36" height="24" rx="4" fill="none" stroke="#334455" stroke-width="0.7"/>
  <rect x="70" y="54" width="28" height="3" rx="1" fill="#88aacc" opacity="0.4"/>
  <text x="71" y="67" font-size="10" fill="#88aacc" opacity="0.9" font-family="monospace">0123</text>
  <rect x="70" y="70" width="18" height="2" rx="1" fill="#88aacc" opacity="0.3"/>
  <!-- Flow arrow on pipe -->
  <line x1="14" y1="64" x2="26" y2="64" stroke="#88aacc" stroke-width="1.5" opacity="0.5" stroke-dasharray="2,2"/>
  <path d="M23 61 L27 64 L23 67" fill="none" stroke="#88aacc" stroke-width="1.5" opacity="0.5" stroke-linejoin="round"/>
  <line x1="102" y1="64" x2="114" y2="64" stroke="#88aacc" stroke-width="1.5" opacity="0.5" stroke-dasharray="2,2"/>
  <path d="M111 61 L115 64 L111 67" fill="none" stroke="#88aacc" stroke-width="1.5" opacity="0.5" stroke-linejoin="round"/>
  <!-- Top sensor head -->
  <rect x="44" y="36" width="16" height="14" rx="3" fill="#2a3845"/>
  <rect x="44" y="36" width="16" height="6" rx="2" fill="#334455" opacity="0.6"/>
  <!-- Sensor LED on head -->
  <circle cx="52" cy="40" r="3" fill="#1a2030"/>
  <circle cx="52" cy="40" r="2" fill="#ffffff" opacity="0.7"/>
</svg>
