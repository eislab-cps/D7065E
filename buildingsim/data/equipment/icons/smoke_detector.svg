<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="sdBody" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#3a4a55"/>
      <stop offset="100%" stop-color="#1a2530"/>
    </radialGradient>
    <radialGradient id="sdChamber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2030"/>
      <stop offset="100%" stop-color="#0f1520"/>
    </radialGradient>
  </defs>
  <!-- Ceiling mount plate -->
  <ellipse cx="64" cy="24" rx="54" ry="8" fill="#1e2830"/>
  <ellipse cx="64" cy="24" rx="54" ry="8" fill="none" stroke="#334455" stroke-width="1"/>
  <ellipse cx="64" cy="24" rx="40" ry="5" fill="#2a3845" opacity="0.5"/>
  <!-- Mount screws -->
  <circle cx="30" cy="24" r="3.5" fill="#1a2030"/><circle cx="30" cy="24" r="2.5" fill="#334455"/><circle cx="30" cy="24" r="1" fill="#88aacc" opacity="0.5"/>
  <circle cx="98" cy="24" r="3.5" fill="#1a2030"/><circle cx="98" cy="24" r="2.5" fill="#334455"/><circle cx="98" cy="24" r="1" fill="#88aacc" opacity="0.5"/>
  <!-- Detector body disc -->
  <ellipse cx="64" cy="72" rx="54" ry="46" fill="url(#sdBody)"/>
  <ellipse cx="64" cy="72" rx="54" ry="46" fill="none" stroke="#667788" stroke-width="1.5" opacity="0.5"/>
  <!-- Top connecting stem -->
  <rect x="54" y="24" width="20" height="16" rx="3" fill="#2a3a45"/>
  <!-- Ventilation slots around body -->
  <line x1="14" y1="60" x2="24" y2="60" stroke="#1a2030" stroke-width="2" opacity="0.8"/>
  <line x1="14" y1="66" x2="24" y2="66" stroke="#1a2030" stroke-width="2" opacity="0.8"/>
  <line x1="14" y1="72" x2="24" y2="72" stroke="#1a2030" stroke-width="2" opacity="0.8"/>
  <line x1="14" y1="78" x2="24" y2="78" stroke="#1a2030" stroke-width="2" opacity="0.8"/>
  <line x1="14" y1="84" x2="24" y2="84" stroke="#1a2030" stroke-width="2" opacity="0.8"/>
  <line x1="104" y1="60" x2="114" y2="60" stroke="#1a2030" stroke-width="2" opacity="0.8"/>
  <line x1="104" y1="66" x2="114" y2="66" stroke="#1a2030" stroke-width="2" opacity="0.8"/>
  <line x1="104" y1="72" x2="114" y2="72" stroke="#1a2030" stroke-width="2" opacity="0.8"/>
  <line x1="104" y1="78" x2="114" y2="78" stroke="#1a2030" stroke-width="2" opacity="0.8"/>
  <line x1="104" y1="84" x2="114" y2="84" stroke="#1a2030" stroke-width="2" opacity="0.8"/>
  <!-- Vent slots bottom -->
  <line x1="38" y1="112" x2="38" y2="118" stroke="#1a2030" stroke-width="2" opacity="0.8"/>
  <line x1="46" y1="114" x2="46" y2="118" stroke="#1a2030" stroke-width="2" opacity="0.8"/>
  <line x1="54" y1="116" x2="54" y2="118" stroke="#1a2030" stroke-width="2" opacity="0.8"/>
  <line x1="74" y1="116" x2="74" y2="118" stroke="#1a2030" stroke-width="2" opacity="0.8"/>
  <line x1="82" y1="114" x2="82" y2="118" stroke="#1a2030" stroke-width="2" opacity="0.8"/>
  <line x1="90" y1="112" x2="90" y2="118" stroke="#1a2030" stroke-width="2" opacity="0.8"/>
  <!-- Sensing chamber ring -->
  <circle cx="64" cy="72" r="32" fill="url(#sdChamber)" stroke="#334455" stroke-width="1.2"/>
  <!-- Chamber vent slots (radiating) -->
  <line x1="64" y1="40" x2="64" y2="46" stroke="#2a3845" stroke-width="2"/>
  <line x1="64" y1="40" x2="64" y2="46" stroke="#2a3845" stroke-width="2" transform="rotate(30 64 72)"/>
  <line x1="64" y1="40" x2="64" y2="46" stroke="#2a3845" stroke-width="2" transform="rotate(60 64 72)"/>
  <line x1="64" y1="40" x2="64" y2="46" stroke="#2a3845" stroke-width="2" transform="rotate(90 64 72)"/>
  <line x1="64" y1="40" x2="64" y2="46" stroke="#2a3845" stroke-width="2" transform="rotate(120 64 72)"/>
  <line x1="64" y1="40" x2="64" y2="46" stroke="#2a3845" stroke-width="2" transform="rotate(150 64 72)"/>
  <line x1="64" y1="40" x2="64" y2="46" stroke="#2a3845" stroke-width="2" transform="rotate(180 64 72)"/>
  <line x1="64" y1="40" x2="64" y2="46" stroke="#2a3845" stroke-width="2" transform="rotate(210 64 72)"/>
  <line x1="64" y1="40" x2="64" y2="46" stroke="#2a3845" stroke-width="2" transform="rotate(240 64 72)"/>
  <line x1="64" y1="40" x2="64" y2="46" stroke="#2a3845" stroke-width="2" transform="rotate(270 64 72)"/>
  <line x1="64" y1="40" x2="64" y2="46" stroke="#2a3845" stroke-width="2" transform="rotate(300 64 72)"/>
  <line x1="64" y1="40" x2="64" y2="46" stroke="#2a3845" stroke-width="2" transform="rotate(330 64 72)"/>
  <!-- Inner ring -->
  <circle cx="64" cy="72" r="20" fill="#1a2030" stroke="#2a3845" stroke-width="1"/>
  <!-- LED center -->
  <circle cx="64" cy="72" r="9" fill="#1a2030" stroke="#334455" stroke-width="1"/>
  <circle cx="64" cy="72" r="6" fill="#ffffff" opacity="0.7"/>
  <circle cx="64" cy="72" r="3.5" fill="#ffffff"/>
  <!-- Test button -->
  <circle cx="64" cy="100" r="6" fill="#1a2030" stroke="#334455" stroke-width="1"/>
  <circle cx="64" cy="100" r="4" fill="#2a3845"/>
  <rect x="62" y="99" width="4" height="2" rx="1" fill="#667788"/>
