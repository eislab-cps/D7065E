<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="prjBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3a45"/>
      <stop offset="100%" stop-color="#1a2530"/>
    </linearGradient>
    <radialGradient id="prjLens" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#5a7080" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#1a3040"/>
      <stop offset="100%" stop-color="#0a1828"/>
    </radialGradient>
    <linearGradient id="prjBeam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Ceiling mount arm -->
  <rect x="56" y="4" width="16" height="22" rx="4" fill="#1e2830"/>
  <rect x="58" y="6" width="6" height="20" rx="2" fill="#88aacc" opacity="0.1"/>
  <rect x="50" y="4" width="28" height="8" rx="3" fill="#2a3040"/>
  <circle cx="60" cy="8" r="3" fill="#1a2030"/><circle cx="60" cy="8" r="2" fill="#334455"/>
  <circle cx="68" cy="8" r="3" fill="#1a2030"/><circle cx="68" cy="8" r="2" fill="#334455"/>
  <!-- Main projector body -->
  <rect x="14" y="24" width="100" height="60" rx="8" fill="url(#prjBody)"/>
  <rect x="14" y="24" width="100" height="60" rx="8" fill="none" stroke="#445566" stroke-width="1.2" opacity="0.5"/>
  <!-- Body top chrome line -->
  <rect x="14" y="24" width="100" height="7" rx="4" fill="#334455" opacity="0.6"/>
  <!-- Body shine -->
  <rect x="16" y="26" width="28" height="56" rx="6" fill="#88aacc" opacity="0.05"/>
  <!-- Lens barrel (front left) -->
  <circle cx="38" cy="54" r="24" fill="#1a2030" stroke="#334455" stroke-width="1.5"/>
  <circle cx="38" cy="54" r="20" fill="#1a2030"/>
  <!-- Lens focus ring teeth -->
  <circle cx="38" cy="54" r="20" fill="none" stroke="#2a3845" stroke-width="2.5" stroke-dasharray="3,2"/>
  <!-- Lens glass -->
  <circle cx="38" cy="54" r="15" fill="url(#prjLens)"/>
  <circle cx="38" cy="54" r="15" fill="none" stroke="#334455" stroke-width="0.5"/>
  <!-- Lens inner -->
  <circle cx="38" cy="54" r="8" fill="#1a2840" opacity="0.8"/>
  <circle cx="38" cy="54" r="4" fill="#1a2030"/>
  <!-- Lens reflection -->
  <circle cx="32" cy="47" r="5" fill="#88aacc" opacity="0.15"/>
  <circle cx="31" cy="46" r="2" fill="#ffffff" opacity="0.15"/>
  <!-- Light beam (cone from lens) -->
  <path d="M16 42 L4 10 L4 86 L16 66Z" fill="url(#prjBeam)"/>
  <!-- Vent grilles -->
  <rect x="66" y="30" width="20" height="48" rx="3" fill="#1a2030"/>
  <line x1="68" y1="34" x2="68" y2="74" stroke="#2a3845" stroke-width="1.2"/>
  <line x1="72" y1="34" x2="72" y2="74" stroke="#2a3845" stroke-width="1.2"/>
  <line x1="76" y1="34" x2="76" y2="74" stroke="#2a3845" stroke-width="1.2"/>
  <line x1="80" y1="34" x2="80" y2="74" stroke="#2a3845" stroke-width="1.2"/>
  <line x1="84" y1="34" x2="84" y2="74" stroke="#2a3845" stroke-width="1.2"/>
  <!-- Rear vent -->
  <rect x="90" y="30" width="20" height="48" rx="3" fill="#1a2030"/>
  <line x1="92" y1="34" x2="92" y2="74" stroke="#2a3845" stroke-width="1.2"/>
  <line x1="96" y1="34" x2="96" y2="74" stroke="#2a3845" stroke-width="1.2"/>
  <line x1="100" y1="34" x2="100" y2="74" stroke="#2a3845" stroke-width="1.2"/>
  <line x1="104" y1="34" x2="104" y2="74" stroke="#2a3845" stroke-width="1.2"/>
  <line x1="108" y1="34" x2="108" y2="74" stroke="#2a3845" stroke-width="1.2"/>
  <!-- Control indicator LEDs -->
  <circle cx="50" cy="34" r="3.5" fill="#1a2030"/>
  <circle cx="50" cy="34" r="2.2" fill="#ffffff" opacity="0.8"/>
  <circle cx="58" cy="34" r="3.5" fill="#1a2030"/>
  <circle cx="58" cy="34" r="2.2" fill="#ffffff" opacity="0.5"/>
  <!-- Top adjustment foot -->
  <rect x="46" y="22" width="12" height="4" rx="2" fill="#1a2030"/>
  <!-- Keystone indicator on top -->
  <rect x="46" y="26" width="36" height="4" rx="1" fill="#334455" opacity="0.4"/>
</svg>
