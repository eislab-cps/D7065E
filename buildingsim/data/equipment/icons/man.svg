<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="64" height="64">
  <defs>
    <linearGradient id="persJacket" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a4a55"/>
      <stop offset="100%" stop-color="#1e2830"/>
    </linearGradient>
    <linearGradient id="persSkin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c89070"/>
      <stop offset="100%" stop-color="#a07050"/>
    </linearGradient>
    <linearGradient id="persPants" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3040"/>
      <stop offset="100%" stop-color="#1a2030"/>
    </linearGradient>
  </defs>
  <!-- Shadow under feet -->
  <ellipse cx="64" cy="124" rx="28" ry="4" fill="#1a2030" opacity="0.4"/>
  <!-- Legs -->
  <rect x="44" y="88" width="16" height="36" rx="6" fill="url(#persPants)"/>
  <rect x="68" y="88" width="16" height="36" rx="6" fill="url(#persPants)"/>
  <!-- Pants crease highlight -->
  <rect x="46" y="88" width="6" height="36" rx="3" fill="#88aacc" opacity="0.08"/>
  <rect x="70" y="88" width="6" height="36" rx="3" fill="#88aacc" opacity="0.08"/>
  <!-- Shoes -->
  <ellipse cx="52" cy="122" rx="12" ry="5" fill="#1a1820"/>
  <ellipse cx="76" cy="122" rx="12" ry="5" fill="#1a1820"/>
  <ellipse cx="50" cy="121" rx="8" ry="3" fill="#2a2830" opacity="0.5"/>
  <ellipse cx="74" cy="121" rx="8" ry="3" fill="#2a2830" opacity="0.5"/>
  <!-- Body (jacket) -->
  <rect x="38" y="46" width="52" height="46" rx="10" fill="url(#persJacket)"/>
  <rect x="38" y="46" width="52" height="46" rx="10" fill="none" stroke="#445566" stroke-width="0.8" opacity="0.4"/>
  <!-- Jacket lapels -->
  <path d="M64 48 L56 58 L64 62Z" fill="#2a3845" opacity="0.5"/>
  <path d="M64 48 L72 58 L64 62Z" fill="#2a3845" opacity="0.5"/>
  <!-- Jacket button row -->
  <circle cx="64" cy="64" r="2" fill="#1a2030"/>
  <circle cx="64" cy="72" r="2" fill="#1a2030"/>
  <circle cx="64" cy="80" r="2" fill="#1a2030"/>
  <!-- Jacket shine/highlight -->
  <rect x="40" y="48" width="14" height="42" rx="7" fill="#88aacc" opacity="0.07"/>
  <!-- Jacket pocket detail -->
  <rect x="42" y="74" width="12" height="8" rx="2" fill="#2a3040" stroke="#334455" stroke-width="0.5"/>
  <rect x="74" y="74" width="12" height="8" rx="2" fill="#2a3040" stroke="#334455" stroke-width="0.5"/>
  <!-- Arms -->
  <rect x="20" y="48" width="18" height="42" rx="8" fill="url(#persJacket)"/>
  <rect x="90" y="48" width="18" height="42" rx="8" fill="url(#persJacket)"/>
  <!-- Arm shine -->
  <rect x="22" y="50" width="6" height="38" rx="3" fill="#88aacc" opacity="0.08"/>
  <rect x="92" y="50" width="6" height="38" rx="3" fill="#88aacc" opacity="0.08"/>
  <!-- Hands -->
  <ellipse cx="29" cy="90" rx="8" ry="7" fill="url(#persSkin)"/>
  <ellipse cx="99" cy="90" rx="8" ry="7" fill="url(#persSkin)"/>
  <!-- Neck -->
  <rect x="56" y="34" width="16" height="16" rx="6" fill="url(#persSkin)"/>
  <!-- Head -->
  <ellipse cx="64" cy="24" rx="20" ry="22" fill="url(#persSkin)"/>
  <ellipse cx="64" cy="24" rx="20" ry="22" fill="none" stroke="#a07050" stroke-width="0.5" opacity="0.3"/>
  <!-- Face highlight -->
  <ellipse cx="58" cy="18" rx="8" ry="7" fill="#ffffff" opacity="0.1"/>
  <!-- Eyes -->
  <ellipse cx="56" cy="22" rx="3.5" ry="3" fill="#2a1810"/>
  <ellipse cx="72" cy="22" rx="3.5" ry="3" fill="#2a1810"/>
  <circle cx="55" cy="21" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="71" cy="21" r="1" fill="#ffffff" opacity="0.5"/>
  <!-- Nose -->
  <path d="M62 26 Q64 30 66 26" fill="none" stroke="#a07050" stroke-width="1" opacity="0.6"/>
  <!-- Mouth -->
  <path d="M58 32 Q64 36 70 32" fill="none" stroke="#8a5040" stroke-width="1.2" opacity="0.7" stroke-linecap="round"/>
  <!-- Ear -->
  <ellipse cx="44" cy="24" rx="5" ry="7" fill="url(#persSkin)"/>
  <ellipse cx="84" cy="24" rx="5" ry="7" fill="url(#persSkin)"/>
  <!-- Hair -->
  <path d="M44 12 Q64 4 84 12 Q84 6 64 2 Q44 6 44 12Z" fill="#1a1010"/>
</svg>
