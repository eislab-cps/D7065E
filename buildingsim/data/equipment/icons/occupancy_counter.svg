<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="ocBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3a45"/>
      <stop offset="100%" stop-color="#1a2530"/>
    </linearGradient>
    <linearGradient id="ocDisplay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1820"/>
      <stop offset="100%" stop-color="#060f14"/>
    </linearGradient>
  </defs>
  <!-- Overhead mounting bar -->
  <rect x="8" y="18" width="112" height="28" rx="6" fill="url(#ocBar)"/>
  <rect x="8" y="18" width="112" height="28" rx="6" fill="none" stroke="#445566" stroke-width="1.2" opacity="0.5"/>
  <!-- Top chrome strip -->
  <rect x="8" y="18" width="112" height="6" rx="4" fill="#334455" opacity="0.6"/>
  <!-- Mounting screw holes on bar -->
  <circle cx="20" cy="32" r="4" fill="#1a2030"/><circle cx="20" cy="32" r="2.5" fill="#334455"/>
  <circle cx="108" cy="32" r="4" fill="#1a2030"/><circle cx="108" cy="32" r="2.5" fill="#334455"/>
  <!-- Dual IR emitters (left and right on bar) -->
  <!-- Left emitter housing -->
  <rect x="16" y="22" width="20" height="20" rx="4" fill="#1a2030"/>
  <circle cx="26" cy="32" r="7" fill="#1a2030" stroke="#334455" stroke-width="1"/>
  <circle cx="26" cy="32" r="4" fill="#2a3845"/>
  <circle cx="26" cy="32" r="2" fill="#ffffff" opacity="0.3"/>
  <!-- Right emitter housing -->
  <rect x="92" y="22" width="20" height="20" rx="4" fill="#1a2030"/>
  <circle cx="102" cy="32" r="7" fill="#1a2030" stroke="#334455" stroke-width="1"/>
  <circle cx="102" cy="32" r="4" fill="#2a3845"/>
  <circle cx="102" cy="32" r="2" fill="#ffffff" opacity="0.3"/>
  <!-- IR beam lines -->
  <line x1="26" y1="46" x2="26" y2="100" stroke="#88aacc" stroke-width="1" opacity="0.25" stroke-dasharray="4,3"/>
  <line x1="102" y1="46" x2="102" y2="100" stroke="#88aacc" stroke-width="1" opacity="0.25" stroke-dasharray="4,3"/>
  <!-- Counter display (center) -->
  <rect x="34" y="24" width="60" height="20" rx="4" fill="url(#ocDisplay)"/>
  <rect x="34" y="24" width="60" height="20" rx="4" fill="none" stroke="#334455" stroke-width="0.7"/>
  <!-- Display content -->
  <text x="40" y="38" font-size="14" font-weight="bold" fill="#88aacc" opacity="0.9" font-family="monospace">IN:12</text>
  <!-- Sub-display below -->
  <rect x="34" y="48" width="60" height="14" rx="3" fill="#0a1020"/>
  <rect x="34" y="48" width="60" height="14" rx="3" fill="none" stroke="#2a3040" stroke-width="0.6"/>
  <text x="38" y="59" font-size="8" fill="#667788" font-family="monospace">OUT: 8</text>
  <!-- Cross-beam bracket below the bar -->
  <rect x="50" y="46" width="28" height="60" rx="4" fill="#1e2830"/>
  <rect x="50" y="46" width="28" height="60" rx="4" fill="none" stroke="#334455" stroke-width="0.8"/>
  <!-- Cable management on bracket -->
  <line x1="54" y1="50" x2="74" y2="50" stroke="#334455" stroke-width="0.8" opacity="0.6"/>
  <line x1="54" y1="60" x2="74" y2="60" stroke="#334455" stroke-width="0.8" opacity="0.6"/>
  <line x1="54" y1="70" x2="74" y2="70" stroke="#334455" stroke-width="0.8" opacity="0.6"/>
  <!-- Person silhouettes detected (ghostly outlines below) -->
  <circle cx="38" cy="90" r="7" fill="#88aacc" opacity="0.12"/>
  <rect x="31" y="97" width="14" height="20" rx="5" fill="#88aacc" opacity="0.1"/>
  <circle cx="90" cy="90" r="7" fill="#88aacc" opacity="0.08"/>
  <rect x="83" y="97" width="14" height="20" rx="5" fill="#88aacc" opacity="0.06"/>
  <!-- LED status row on bar -->
  <circle cx="54" cy="32" r="3" fill="#1a2030"/><circle cx="54" cy="32" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="64" cy="32" r="3" fill="#1a2030"/><circle cx="64" cy="32" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="74" cy="32" r="3" fill="#1a2030"/><circle cx="74" cy="32" r="2" fill="#ffffff" opacity="0.3"/>
</svg>
