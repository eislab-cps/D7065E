<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuildSim</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
  #canvas { display: block; }
  #info-panel {
    position: absolute; top: 12px; left: 12px;
    background: rgba(20,20,40,0.92); color: #e0e0e0;
    padding: 14px 18px; border-radius: 8px; min-width: 220px; max-width: 260px;
    font-size: 13px; line-height: 1.6;
    border: 1px solid rgba(100,120,255,0.3); backdrop-filter: blur(8px);
    max-height: 90vh; overflow-y: auto;
    z-index: 20;
  }
  #info-panel h3 { color: #8ab4f8; margin-bottom: 6px; font-size: 15px; cursor: pointer; }
  #info-panel-body { }
  #info-panel.collapsed #info-panel-body { display: none; }
  #info-panel.collapsed { min-width: auto; max-width: none; padding: 8px 14px; }
  #info-panel h3::after { content: ' ▼'; font-size: 10px; opacity: 0.5; }
  #info-panel.collapsed h3::after { content: ' ▶'; }
  #controls {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(20,20,40,0.92); color: #aaa;
    padding: 10px 14px; border-radius: 8px; font-size: 12px;
    border: 1px solid rgba(100,120,255,0.2);
    display: flex; gap: 4px; align-items: center; flex-wrap: wrap; justify-content: center;
  }
  #controls label { margin-right: 14px; cursor: pointer; }
  #controls input[type=checkbox] { margin-right: 4px; }
  #legend {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(20,20,40,0.92); color: #ccc;
    padding: 8px 18px; border-radius: 8px; font-size: 12px;
    border: 1px solid rgba(100,120,255,0.2);
    display: flex; gap: 16px; z-index: 10; flex-wrap: wrap; justify-content: center;
  }
  @media (max-width: 768px) {
    #info-panel { max-width: 180px; font-size: 11px; padding: 8px 12px; }
    #info-panel h3 { font-size: 13px; }
    #controls { font-size: 10px; padding: 6px 8px; gap: 2px; }
    #controls label { margin-right: 6px; }
    #legend { font-size: 10px; padding: 4px 10px; gap: 8px; display: none; }
    #edit-tools { display: none !important; }
  }
  @media (max-width: 480px) {
    #info-panel { max-width: 150px; font-size: 10px; top: 6px; left: 6px; padding: 6px 10px; }
    #info-panel.collapsed { padding: 4px 10px; }
    #controls { bottom: 6px; font-size: 9px; }
  }
  @media (max-height: 500px) and (orientation: landscape) {
    #info-panel { max-width: 200px; max-height: 80vh; font-size: 11px; top: 6px; left: 6px; padding: 8px 12px; }
    #info-panel h3 { font-size: 12px; margin-bottom: 3px; }
    #controls { bottom: 4px; font-size: 10px; padding: 4px 8px; }
    #legend { display: none; }
  }
  .legend-item { display: flex; align-items: center; margin: 3px 0; }
  .legend-color { width: 14px; height: 14px; border-radius: 2px; margin-right: 8px; }
  #edit-tools {
    position: absolute; bottom: 12px; right: 12px;
    background: rgba(20,20,40,0.92); color: #aaa;
    padding: 10px 14px; border-radius: 8px; font-size: 12px;
    border: 1px solid rgba(100,120,255,0.2);
    display: flex; gap: 6px; flex-wrap: wrap; max-width: 360px;
  }
  #edit-tools button {
    background: #2a3a5c; color: #ccc; border: 1px solid #4a6fa5;
    padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  #edit-tools button:hover { background: #3a5a8c; }
  #edit-tools button.active { background: #4a8fd4; color: #fff; }
  #edit-tools button:disabled { opacity: 0.4; cursor: default; }
  #save-status { color: #5cb85c; font-size: 11px; margin-top: 4px; width: 100%; }
  #floor-selector {
    position: absolute; top: 150px; left: 12px;
    background: rgba(20,20,40,0.92); color: #ccc;
    padding: 10px 14px; border-radius: 8px; font-size: 12px;
    border: 1px solid rgba(100,120,255,0.2);
  }
  #floor-selector button {
    display: block; width: 100%; margin: 3px 0;
    background: #2a3a5c; color: #ccc; border: 1px solid #4a6fa5;
    padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  #floor-selector button:hover { background: #3a5a8c; }
  #floor-selector button.active { background: #4a8fd4; color: #fff; }
  #view-mode {
    position: absolute; top: 80px; right: 12px;
    background: rgba(20,20,40,0.92); color: #ccc;
    padding: 8px 12px; border-radius: 8px; font-size: 12px;
    border: 1px solid rgba(100,120,255,0.2);
  }
  #view-mode button {
    background: #2a3a5c; color: #ccc; border: 1px solid #4a6fa5;
    padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; margin: 2px;
  }
  #view-mode button:hover { background: #3a5a8c; }
  #view-mode button.active { background: #4a8fd4; color: #fff; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>


<div id="floor-selector" style="display:none"></div>

<div id="info-panel">
  <h3 onclick="document.getElementById('info-panel').classList.toggle('collapsed')">Smart Factory</h3>
  <div id="info-panel-body">
    <div style="margin-bottom:8px">
      <select id="buildingSelect" style="width:100%;margin-bottom:4px;padding:4px;background:#1a1a2e;color:#ccc;border:1px solid #4a6fa5;border-radius:4px"></select>
      <div style="display:flex;gap:4px;flex-wrap:wrap" id="floorButtonsInline"></div>
    </div>

    <div style="margin-bottom:6px;display:flex;gap:4px">

    </div>

  </div>
</div>

  <label><input type="checkbox" id="showDoors" checked> Doors</label>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
               "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x1a1a2e);

const scene = new THREE.Scene();

// Cameras
const aspect = window.innerWidth / window.innerHeight;
let frustumSize = 500;
const camera2D = new THREE.OrthographicCamera(
  -frustumSize*aspect/2, frustumSize*aspect/2, frustumSize/2, -frustumSize/2, 0.1, 1000);
camera2D.position.set(0, 0, 100);
camera2D.lookAt(0, 0, 0);

const camera3D = new THREE.PerspectiveCamera(50, aspect, 1, 2000);
camera3D.position.set(300, -300, 400);
camera3D.up.set(0, 0, 1); // Z is up (like a real building)
camera3D.lookAt(0, 0, 0);

let activeCamera = camera3D;
let is3DView = true;
let orbitControls = new OrbitControls(camera3D, canvas);
orbitControls.enabled = true;
orbitControls.maxPolarAngle = Math.PI / 2; // can't go below ground
orbitControls.minPolarAngle = 0.1;         // can't go directly overhead
orbitControls.enableDamping = true;
orbitControls.dampingFactor = 0.1;
orbitControls.zoomSpeed = 8.0;

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Floor data
// Building config from URL: ?building=abuilding
const BUILDINGS = {
  'abuilding': { name: 'A-Building (LTU)', levels: ['level0','level1','level2'], labels: ['Floor 0','Floor 1','Floor 2'] },
};
const urlParams = new URLSearchParams(window.location.search);
const currentBuilding = urlParams.get('building') || 'abuilding';
const BLDG = BUILDINGS[currentBuilding];
const LEVELS = BLDG.levels.map(l => currentBuilding + '/' + l);
const FLOOR_COLORS = [0x2a3a5c, 0x3a2a5c, 0x2a5c3a];
const FLOOR_SPACING = 25; // vertical spacing in 3D view
// Floor alignment: coordinates already aligned in the data (top-left corner anchoring)
const FLOOR_ALIGN = {
  0: { x: 0, y: 0 },
  1: { x: 0, y: 0 },
  2: { x: 0, y: 0 },
};

// Stairs and elevators (to be populated for plant)
// Vertical connections (stairs and elevators)
const STAIRS = [
  { name: 'TRAPPA A', positions: [{l:0,x:306.5,y:32.2},{l:1,x:306.3,y:44.0},{l:2,x:306.4,y:44.0}] },
  { name: 'TRAPPA B', positions: [{l:0,x:227.8,y:19.9},{l:1,x:228.2,y:18.5},{l:2,x:228.5,y:18.5}] },
  { name: 'TRAPPA C', positions: [{l:0,x:127.1,y:20.1},{l:1,x:126.4,y:20.3},{l:2,x:126.5,y:20.3}] },
  { name: 'TRAPPA D', positions: [{l:1,x:16.8,y:27.4},{l:2,x:17.3,y:27.6}] },
  { name: 'TRAPPA E', positions: [{l:0,x:7.2,y:127.0},{l:1,x:9.9,y:126.9},{l:2,x:10.7,y:128.2}] },
  { name: 'TRAPPA F', positions: [{l:0,x:111.0,y:126.8},{l:1,x:112.8,y:128.2},{l:2,x:113.1,y:128.2}] },
  { name: 'TRAPPA G', positions: [{l:0,x:212.7,y:127.2},{l:1,x:214.7,y:128.0},{l:2,x:214.9,y:128.0}] },
  { name: 'TRAPPA H', positions: [{l:0,x:314.9,y:126.8},{l:1,x:316.0,y:126.6},{l:2,x:314.2,y:126.0}] },
  { name: 'TRAPPA I', positions: [{l:0,x:371.4,y:119.6},{l:1,x:370.6,y:118.2}] },
  { name: 'A119/A219', positions: [{l:0,x:328.6,y:330.7},{l:1,x:319.9,y:322.2}] },
  { name: 'A183/A283', positions: [{l:0,x:127.0,y:323.9},{l:1,x:126.4,y:324.4}] },
  { name: 'A303/A403/A503', positions: [{l:0,x:192.8,y:282.4},{l:1,x:192.6,y:281.4},{l:2,x:192.2,y:281.5}] },
  { name: '1575/2604', positions: [{l:0,x:102.4,y:330.5},{l:1,x:101.8,y:329.7}] },
  { name: '1568/2580/3454', positions: [{l:0,x:11.3,y:333.0},{l:1,x:11.0,y:332.8},{l:2,x:11.1,y:332.9}] },
  { name: '1541/2541/3421', positions: [{l:0,x:33.3,y:179.8},{l:1,x:30.6,y:178.1},{l:2,x:32.7,y:178.3}] },
  { name: 'A104/A204', positions: [{l:0,x:325.6,y:226.2},{l:1,x:320.2,y:222.9}] },
];
const ELEVATORS = [
  { name: 'HISS 12', positions: [{l:0,x:133.4,y:17.4},{l:1,x:133.0,y:16.4},{l:2,x:133.1,y:16.6}] },
  { name: 'HISS 13', positions: [{l:0,x:318.0,y:38.1},{l:1,x:317.7,y:37.2},{l:2,x:317.8,y:37.2}] },
  { name: 'HISS 14', positions: [{l:0,x:126.1,y:160.1},{l:1,x:125.8,y:159.2},{l:2,x:125.9,y:159.3}] },
];
let floorData = {};   // level -> json data
let floorGroups = {};  // level -> { wallGroup, doorGroup, roomGroup, meshes[] }
let currentLevel = 'level0';

let selectedRoom = null, selectedMesh = null;
let vertexHandles = [], vertexGroup = new THREE.Group();
scene.add(vertexGroup);
let dragVertex = null, editMode = 'select', isDirty = false;
let eraseHoverIdx = -1, eraseHighlight = null;
let mergeSource = null, mergeSourceMesh = null;
let splitFreeMode = false, splitPoint1 = null, splitLine = null;
let weldMode = false, weldFirstIdx = null;
let newRoomMode = false, newRoomCorner1 = null, newRoomPreview = null;
let drawWallMode = false, drawWallPoints = [], drawWallPreview = null;
let undoStack = [];
const MAX_UNDO = 50;

let panOffset = new THREE.Vector2(0, 0);
let isPanning = false, panStart = new THREE.Vector2();

function pdfToWorld(x, y, pw, ph) { return [x - pw/2, -(y - ph/2)]; }
function worldToPdf(wx, wy, pw, ph) { return [wx + pw/2, -(wy - ph/2)]; }

function createLineSegments(lines, color, group, opacity, pw, ph) {
  if (!lines || lines.length === 0) return;
  const positions = new Float32Array(lines.length * 6);
  let idx = 0;
  for (const seg of lines) {
    const [x1,y1] = pdfToWorld(seg[0][0], seg[0][1], pw, ph);
    const [x2,y2] = pdfToWorld(seg[1][0], seg[1][1], pw, ph);
    positions[idx++]=x1; positions[idx++]=y1; positions[idx++]=0;
    positions[idx++]=x2; positions[idx++]=y2; positions[idx++]=0;
  }
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(positions.slice(0,idx), 3));
  group.add(new THREE.LineSegments(geom, new THREE.LineBasicMaterial({ color, transparent: true, opacity })));
}

function createRoomPolygons(rooms, group, meshes, color, pw, ph) {
  for (const room of rooms) {
    const pts = room.polygon;
    if (pts.length < 3) continue;
    const shape = new THREE.Shape();
    const [sx,sy] = pdfToWorld(pts[0][0], pts[0][1], pw, ph);
    shape.moveTo(sx, sy);
    for (let i = 1; i < pts.length; i++) {
      const [px,py] = pdfToWorld(pts[i][0], pts[i][1], pw, ph);
      shape.lineTo(px, py);
    }
    shape.closePath();
    const roomColor = room.type === 'corridor' ? 0x5c5c2a : color;
    const mesh = new THREE.Mesh(new THREE.ShapeGeometry(shape),
      new THREE.MeshBasicMaterial({ color: roomColor, transparent: true, opacity: 0.4, side: THREE.DoubleSide }));
    mesh.userData = room;
    mesh.position.z = 1;
    group.add(mesh);
    meshes.push(mesh);
    // Outline
    const op = pts.map(p => { const [ox,oy] = pdfToWorld(p[0],p[1],pw,ph); return new THREE.Vector3(ox,oy,2); });
    op.push(op[0].clone());
    const outline = new THREE.Line(new THREE.BufferGeometry().setFromPoints(op),
      new THREE.LineBasicMaterial({ color: 0x4a6fa5, transparent: true, opacity: 0.6 }));
    outline.userData = { roomOutline: true, roomId: room.id };
    group.add(outline);
  }
}

function createLabels(labels, group, pw, ph) {
  if (!labels) return;
  for (const label of labels) {
    const [wx,wy] = pdfToWorld(label.x, label.y, pw, ph);
    const lc = document.createElement('canvas');
    lc.width = 128; lc.height = 32;
    const ctx = lc.getContext('2d');
    ctx.fillStyle = '#aaccff'; ctx.font = '14px monospace'; ctx.textAlign = 'center';
    ctx.fillText(label.text, 64, 20);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(lc), transparent: true, depthWrite: false }));
    sprite.position.set(wx, wy, 3);
    sprite.scale.set(12, 3, 1);
    group.add(sprite);
  }
}

async function loadFloor(level) {
  const levelID = level.split('/').pop();
  const resp = await fetch(`/api/building/floors/${levelID}?t=${Date.now()}`);
  const data = await resp.json();
  floorData[level] = data;

  const pw = data.page.width, ph = data.page.height;
  const container = new THREE.Group();
  const wallGroup = new THREE.Group();
  const doorGroup = new THREE.Group();
  const roomGroup = new THREE.Group();
  const meshes = [];

  const levelIdx = LEVELS.indexOf(level);

  // Background image (raster floor plan)
  if (data.background) {
    const loader = new THREE.TextureLoader();
    loader.load(data.background, (texture) => {
      texture.minFilter = THREE.LinearFilter;
      const bgGeom = new THREE.PlaneGeometry(pw, ph);
      const bgMat = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide, transparent: true, opacity: 0.3 });
      const bgMesh = new THREE.Mesh(bgGeom, bgMat);
      bgMesh.position.set(0, 0, -0.5);
      container.add(bgMesh);
      render();
    });
  }

  createLineSegments(data.walls || [], 0x888888, wallGroup, 0.6, pw, ph);
  createLineSegments(data.red_lines || [], 0xe04040, doorGroup, 0.6, pw, ph);
  createRoomPolygons(data.rooms, roomGroup, meshes, FLOOR_COLORS[levelIdx] || 0x2a3a5c, pw, ph);
  const labelGroup = new THREE.Group();
  labelGroup.visible = false;
  createLabels(data.labels || [], labelGroup, pw, ph);

  // Build graph layer
  const graphGroup = new THREE.Group();
  graphGroup.visible = false;
  if (data.graph) {
    const g = data.graph;
    // Edges
    for (const edge of g.edges) {
      const nA = g.nodes.find(n => n.id === edge.from);
      const nB = g.nodes.find(n => n.id === edge.to);
      if (!nA || !nB) continue;
      const [x1,y1] = pdfToWorld(nA.x, nA.y, pw, ph);
      const [x2,y2] = pdfToWorld(nB.x, nB.y, pw, ph);
      const geom = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(x1,y1,4), new THREE.Vector3(x2,y2,4)]);
      graphGroup.add(new THREE.Line(geom, new THREE.LineBasicMaterial({color:0xff66ff, transparent:true, opacity:0.4})));
    }
    // Nodes
    for (const node of g.nodes) {
      const [wx,wy] = pdfToWorld(node.x, node.y, pw, ph);
      const dot = new THREE.Mesh(new THREE.CircleGeometry(1, 8),
        new THREE.MeshBasicMaterial({color:0xff66ff, side:THREE.DoubleSide}));
      dot.position.set(wx, wy, 4.5);
      graphGroup.add(dot);
    }
  }

  // Build walkable graph layer
  const walkableGroup = new THREE.Group();
  walkableGroup.visible = false;
  if (data.walkable_graph) {
    const wg = data.walkable_graph;
    const nodeMap = {};
    for (const node of wg.nodes) nodeMap[node.id] = node;
    // Edges
    for (const edge of wg.edges) {
      const [x1,y1] = edge.x1 !== undefined
        ? pdfToWorld(edge.x1, edge.y1, pw, ph)
        : pdfToWorld(nodeMap[edge.from]?.x||0, nodeMap[edge.from]?.y||0, pw, ph);
      const [x2,y2] = edge.x2 !== undefined
        ? pdfToWorld(edge.x2, edge.y2, pw, ph)
        : pdfToWorld(nodeMap[edge.to]?.x||0, nodeMap[edge.to]?.y||0, pw, ph);
      const geom = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(x1,y1,4), new THREE.Vector3(x2,y2,4)]);
      walkableGroup.add(new THREE.Line(geom, new THREE.LineBasicMaterial({color:0x00ffaa, transparent:true, opacity:0.5})));
    }
    // Nodes
    for (const node of wg.nodes) {
      const [wx,wy] = pdfToWorld(node.x, node.y, pw, ph);
      const color = node.type === 'corridor' ? 0x00ffaa : node.type === 'entry' ? 0xffaa00 : 0x4488ff;
      const size = node.type === 'corridor' ? 0.8 : 0.6;
      const dot = new THREE.Mesh(new THREE.CircleGeometry(size, 8),
        new THREE.MeshBasicMaterial({color, side:THREE.DoubleSide}));
      dot.position.set(wx, wy, 4.5);
      walkableGroup.add(dot);
    }
  }

  container.add(wallGroup, doorGroup, roomGroup, labelGroup, graphGroup, walkableGroup);
  scene.add(container);

  floorGroups[level] = { container, wallGroup, doorGroup, roomGroup, labelGroup, graphGroup, walkableGroup, meshes };
  return data;
}

let editModeEnabled = false;
let sessionId = null;
let sessionWs = null;
let sessionClosing = false;
let localEquipmentVersion = 0;
let localOccupancyVersion = 0;

async function initSession() {
  try {
    const resp = await fetch('/api/sessions', { method: 'POST' });
    const sess = await resp.json();
    sessionId = sess.id;
    sessionClosing = false;
    console.log('Session created:', sessionId);
    connectWebSocket();
  } catch(e) {
    console.log('Failed to create session:', e);
  }
}

function connectWebSocket() {
  if (!sessionId || sessionClosing) return;
  const id = sessionId;
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  sessionWs = new WebSocket(`${proto}//${location.host}/ws/${id}`);
  let wasConnected = false;

  sessionWs.onopen = () => {
    wasConnected = true;
    console.log('WebSocket connected to session:', id);
  };
  sessionWs.onclose = () => {
    if (!sessionClosing && sessionId === id && wasConnected) {
      console.log('WebSocket disconnected, reconnecting in 3s...');
      setTimeout(connectWebSocket, 3000);
    } else if (!wasConnected) {
      console.log('WebSocket failed to connect (session may not exist)');
    }
  };
  sessionWs.onerror = () => {}; // suppress console error, onclose handles it
  sessionWs.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      handleSessionMessage(msg);
    } catch(e) {
      console.log('Bad WS message:', e);
    }
  };
}

function handleSessionMessage(msg) {
  switch (msg.type) {
    case 'viewport':
      applyViewport(msg.data);
      break;
    case 'highlights':
      applyHighlights(msg.data);
      break;
    case 'route':
      applyRoute(msg.data);
      break;
    case 'coverage':
      if (msg.data) applyCoverage(msg.data);
      else fetchAndApplyCoverage();
      break;
    case 'occupancy':
      if (msg.version > localOccupancyVersion) {
        localOccupancyVersion = msg.version;
        fetchAndApplyOccupancy();
      }
      break;
    case 'equipment':
      if (msg.version > localEquipmentVersion) {
        localEquipmentVersion = msg.version;
        fetchAndApplyEquipment();
      }
      break;
  }
}

function applyViewport(vp) {
  if (!vp) return;
  const pw = floorData[LEVELS[0]]?.page?.width || 595;
  const ph = floorData[LEVELS[0]]?.page?.height || 842;

  // Find target room center if room name specified
  let targetX = null, targetY = null, targetLevel = null;
  if (vp.room) {
    for (const l of LEVELS) {
      const data = floorData[l];
      if (!data) continue;
      const room = data.rooms.find(r => r.name === vp.room);
      if (room) {
        const [wx, wy] = pdfToWorld(room.center[0], room.center[1], data.page.width, data.page.height);
        targetX = wx;
        targetY = wy;
        targetLevel = l;
        break;
      }
    }
    if (targetX === null) { console.log('Room not found:', vp.room); return; }
  }

  if (vp.mode === '3d') {
    if (!is3DView) switchTo3D();
    if (targetX !== null) {
      const levelIdx = LEVELS.indexOf(targetLevel);
      const tz = levelIdx * FLOOR_SPACING;
      const dist = 150 / (vp.zoom || 1);
      const targetPos = new THREE.Vector3(targetX + dist, targetY - dist, tz + dist);
      const targetLookAt = new THREE.Vector3(targetX, targetY, tz);
      animateCamera3D(targetPos, targetLookAt, 1500);
    }
  } else {
    const floor = vp.floor || (targetLevel ? targetLevel.split('/').pop() : 'level0');
    const level = currentBuilding + '/' + floor;
    if (is3DView || currentLevel !== level) switchToFloor(level);
    const targetZoom = (vp.zoom && vp.zoom > 0) ? Math.max(pw, ph) * 1.1 / vp.zoom : frustumSize;
    const targetPanX = targetX !== null ? targetX : panOffset.x;
    const targetPanY = targetY !== null ? targetY : panOffset.y;
    animateCamera2D(targetPanX, targetPanY, targetZoom, 1500);
  }
}

let _animId = 0;
function animateCamera3D(targetPos, targetLookAt, duration) {
  const id = ++_animId;
  const startPos = camera3D.position.clone();
  const startTarget = orbitControls.target.clone();
  const startTime = performance.now();

  function tick(now) {
    if (id !== _animId) return;
    const t = Math.min((now - startTime) / duration, 1);
    const ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; // easeInOutCubic

    camera3D.position.lerpVectors(startPos, targetPos, ease);
    orbitControls.target.lerpVectors(startTarget, targetLookAt, ease);
    orbitControls.update();
    render();

    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function animateCamera2D(targetPanX, targetPanY, targetFrustum, duration) {
  const id = ++_animId;
  const startPanX = panOffset.x, startPanY = panOffset.y;
  const startFrustum = frustumSize;
  const startTime = performance.now();

  function tick(now) {
    if (id !== _animId) return;
    const t = Math.min((now - startTime) / duration, 1);
    const ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;

    panOffset.x = startPanX + (targetPanX - startPanX) * ease;
    panOffset.y = startPanY + (targetPanY - startPanY) * ease;
    frustumSize = startFrustum + (targetFrustum - startFrustum) * ease;
    updateCamera2D();
    render();

    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function applyHighlights(highlights) {
  if (!highlights) return;
  // Remove previous highlights
  LEVELS.forEach(l => {
    const fg = floorGroups[l];
    if (!fg) return;
    fg.meshes.forEach(m => {
      if (m.userData.highlighted) {
        m.material.color.setHex(m.userData.originalColor || 0x2a3a5c);
        m.material.opacity = 0.6;
        m.userData.highlighted = false;
      }
    });
  });

  // Apply new highlights
  for (const h of highlights) {
    LEVELS.forEach(l => {
      const fg = floorGroups[l];
      if (!fg) return;
      const mesh = fg.meshes.find(m => m.userData.id === h.room_id);
      if (mesh) {
        if (!mesh.userData.originalColor) mesh.userData.originalColor = mesh.material.color.getHex();
        mesh.material.color.setStyle(h.color);
        mesh.material.opacity = h.opacity || 0.8;
        mesh.userData.highlighted = true;
      }
    });
  }
  render();
}

function applyRoute(route) {
  // Clear existing path
  while (pathGroup.children.length > 0) {
    const c = pathGroup.children[0];
    pathGroup.remove(c);
    if (c.geometry) c.geometry.dispose();
    if (c.material) c.material.dispose();
  }

  if (!route || !route.path || route.path.length < 2) { render(); return; }

  const pw = floorData[LEVELS[0]]?.page?.width || 595;
  const ph = floorData[LEVELS[0]]?.page?.height || 842;
  const points = route.path.map(n => {
    const [wx, wy] = pdfToWorld(n.x, n.y, pw, ph);
    return new THREE.Vector3(wx, wy, 8);
  });

  const geom = new THREE.BufferGeometry().setFromPoints(points);
  const line = new THREE.Line(geom, new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 2 }));
  pathGroup.add(line);

  // Route nodes
  for (const pt of points) {
    const dot = new THREE.Mesh(
      new THREE.CircleGeometry(1.5, 12),
      new THREE.MeshBasicMaterial({ color: 0x00ffff, side: THREE.DoubleSide }));
    dot.position.copy(pt);
    dot.position.z = 8.5;
    pathGroup.add(dot);
  }
  render();
}

function renderOccupancy(occupancy) {
  // Clear old occupancy sprites
  while (occupancyGroup.children.length > 0) {
    const c = occupancyGroup.children[0];
    occupancyGroup.remove(c);
    if (c.material && c.material.map) c.material.map.dispose();
    if (c.material) c.material.dispose();
  }

  if (!occupancy) { render(); return; }

  const iconPromises = [];

  for (const [roomIdStr, occ] of Object.entries(occupancy)) {
    const roomId = parseInt(roomIdStr);
    const personCount = occ.persons ? occ.persons.length : 0;
    const alienCount = occ.aliens ? occ.aliens.length : 0;
    if (personCount === 0 && alienCount === 0) continue;

    // Find room across all levels
    let roomCenter = null, roomPw = 0, roomPh = 0, roomLevel = null;
    for (const l of LEVELS) {
      const data = floorData[l];
      if (!data) continue;
      const room = data.rooms.find(r => r.id === roomId);
      if (room) {
        roomPw = data.page.width;
        roomPh = data.page.height;
        roomCenter = room.center;
        roomLevel = l;
        break;
      }
    }
    if (!roomCenter) continue;

    const [wx, wy] = pdfToWorld(roomCenter[0], roomCenter[1], roomPw, roomPh);
    const levelIdx = LEVELS.indexOf(roomLevel);
    const zBase = is3DView ? levelIdx * FLOOR_SPACING + 3 : 12;
    const iconSize = 3;
    const spacing = iconSize * 1.3;
    const yOffset = is3DView ? 0 : iconSize * 5; // offset upward in 2D to clear equipment icons

    // Collect all entities to render
    const entities = [];
    if (occ.persons) {
      for (const person of occ.persons) {
        entities.push({ type: person.icon || 'man', name: person.name, id: person.id });
      }
    }
    if (occ.aliens) {
      for (const alien of occ.aliens) {
        entities.push({ type: 'alien', name: 'Alien', id: alien.id });
      }
    }

    // Spread entities horizontally, centered on room
    const totalWidth = (entities.length - 1) * spacing;
    const startX = wx - totalWidth / 2;

    for (let ei = 0; ei < entities.length; ei++) {
      const ent = entities[ei];
      const ex = startX + ei * spacing;

      const p = loadEquipmentIcon(ent.type, null, true).then(canvas => {
        const sprite = createEquipmentSprite(ex, wy + yOffset, zBase, iconSize, canvas);
        occupancyGroup.add(sprite);

        // Name label below icon
        const lc = document.createElement('canvas');
        lc.width = 128; lc.height = 32;
        const ctx = lc.getContext('2d');
        ctx.font = 'bold 14px monospace';
        ctx.fillStyle = ent.type === 'alien' ? '#ff2222' : '#00ccff';
        ctx.textAlign = 'center';
        ctx.fillText(ent.name || ent.type, 64, 18);
        const label = new THREE.Sprite(new THREE.SpriteMaterial({
          map: new THREE.CanvasTexture(lc), transparent: true, depthWrite: false }));
        label.position.set(ex, wy + yOffset - iconSize * 1.2, zBase);
        label.scale.set(6, 1.5, 1);
        occupancyGroup.add(label);
      });
      iconPromises.push(p);
    }
  }

  Promise.all(iconPromises).then(() => render());
}

function applyCoverage(zones) {
  // Clear old coverage
  while (coverageGroup.children.length > 0) {
    const c = coverageGroup.children[0];
    coverageGroup.remove(c);
    if (c.geometry) c.geometry.dispose();
    if (c.material) c.material.dispose();
  }

  if (!zones || zones.length === 0) { render(); return; }

  const defaultData = floorData[LEVELS[0]];
  if (!defaultData) return;
  const pw = defaultData.page.width, ph = defaultData.page.height;

  // Build clipping planes from building room bounds
  const allRooms = [];
  for (const l of LEVELS) {
    const fd = floorData[l];
    if (fd) allRooms.push(...fd.rooms);
  }
  const allPts = allRooms.flatMap(r => r.polygon);
  const minX = Math.min(...allPts.map(p => p[0]));
  const maxX = Math.max(...allPts.map(p => p[0]));
  const minY = Math.min(...allPts.map(p => p[1]));
  const maxY = Math.max(...allPts.map(p => p[1]));

  const [wMinX, wMaxY] = pdfToWorld(minX, minY, pw, ph);
  const [wMaxX, wMinY] = pdfToWorld(maxX, maxY, pw, ph);

  const maxFloorZ = (LEVELS.length - 1) * FLOOR_SPACING + 10;
  const clipPlanes = [
    new THREE.Plane(new THREE.Vector3(1, 0, 0), -wMinX),    // left
    new THREE.Plane(new THREE.Vector3(-1, 0, 0), wMaxX),    // right
    new THREE.Plane(new THREE.Vector3(0, 1, 0), -wMinY),    // front
    new THREE.Plane(new THREE.Vector3(0, -1, 0), wMaxY),    // back
    new THREE.Plane(new THREE.Vector3(0, 0, 1), 0),         // below ground
    new THREE.Plane(new THREE.Vector3(0, 0, -1), maxFloorZ), // above top floor
  ];
  renderer.localClippingEnabled = true;

  for (const zone of zones) {
    // Resolve room name to center if specified
    let cx = zone.center[0], cy = zone.center[1];
    let resolvedLevel = zone.level || '';
    if (zone.room) {
      let found = false;
      for (const l of LEVELS) {
        const fd = floorData[l];
        if (!fd) continue;
        const room = fd.rooms.find(r => r.name === zone.room);
        if (room) {
          cx = room.center[0]; cy = room.center[1];
          if (!resolvedLevel) resolvedLevel = l.split('/').pop();
          found = true;
          break;
        }
      }
      if (!found) continue;
    }
    const [wx, wy] = pdfToWorld(cx, cy, pw, ph);
    const radius = zone.radius || 30;
    const color = new THREE.Color(zone.color || '#00aaff');
    const opacity = zone.opacity || 0.15;
    const height = zone.height || 0;

    // Determine which floors to render on
    let floors = [];
    if (zone.level && zone.level !== '') {
      const li = LEVELS.findIndex(l => l.endsWith(zone.level));
      if (li >= 0) floors.push(li);
    } else {
      // All floors
      for (let i = 0; i < LEVELS.length; i++) floors.push(i);
    }

    if (is3DView) {
      // 3D: render as translucent sphere, centered on the floor(s)
      const minFloorZ = Math.min(...floors) * FLOOR_SPACING;
      const maxFloorZ = Math.max(...floors) * FLOOR_SPACING;
      const centerZ = (minFloorZ + maxFloorZ) / 2 + 5;
      const scaleZ = height > 0 ? height / (radius * 2) : 0.5; // flatten vertically

      const geom = new THREE.SphereGeometry(radius, 32, 24);
      const mat = new THREE.MeshBasicMaterial({
        color, transparent: true, opacity,
        side: THREE.DoubleSide, depthWrite: false,
        clippingPlanes: clipPlanes
      });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.position.set(wx, wy, centerZ);
      mesh.scale.set(1, 1, scaleZ);
      mesh.renderOrder = 500;
      coverageGroup.add(mesh);

      // Inner glow (smaller, brighter sphere)
      const innerGeom = new THREE.SphereGeometry(radius * 0.5, 24, 16);
      const innerMat = new THREE.MeshBasicMaterial({
        color, transparent: true, opacity: opacity * 1.5,
        side: THREE.DoubleSide, depthWrite: false,
        clippingPlanes: clipPlanes
      });
      const inner = new THREE.Mesh(innerGeom, innerMat);
      inner.position.set(wx, wy, centerZ);
      inner.scale.set(1, 1, scaleZ);
      inner.renderOrder = 501;
      coverageGroup.add(inner);
    } else {
      // 2D: flat disc per floor
      for (const fi of floors) {
        const z = 2;
        const geom = new THREE.CircleGeometry(radius, 48);
        const mat = new THREE.MeshBasicMaterial({
          color, transparent: true, opacity,
          side: THREE.DoubleSide, depthWrite: false,
          clippingPlanes: clipPlanes
        });
        const mesh = new THREE.Mesh(geom, mat);
        mesh.position.set(wx, wy, z);
        mesh.renderOrder = 500;
        coverageGroup.add(mesh);

        // Soft edge ring
        const ringGeom = new THREE.RingGeometry(radius * 0.85, radius, 48);
        const ringMat = new THREE.MeshBasicMaterial({
          color, transparent: true, opacity: opacity * 0.4,
          side: THREE.DoubleSide, depthWrite: false,
          clippingPlanes: clipPlanes
        });
        const ring = new THREE.Mesh(ringGeom, ringMat);
        ring.position.set(wx, wy, z + 0.1);
        ring.renderOrder = 499;
        coverageGroup.add(ring);
      }
    }
  }

  render();
}

function switchToFloor(level) {
  deselectRoom(); updateInfo();
  currentLevel = level;
  is3DView = false;
  activeCamera = camera2D;
  orbitControls.enabled = false;

  LEVELS.forEach(l => {
    const fg = floorGroups[l];
    if (!fg) return;
    fg.container.visible = (l === level);
    fg.container.position.set(0, 0, 0);
  });
  stairConnectors.visible = false;
  elevatorConnectors.visible = false;
  crossFloorGraphGroup.visible = false;

  document.querySelectorAll('#floorButtonsInline button').forEach(b => { b.classList.remove('active'); b.style.background = '#2a3a5c'; b.style.color = '#ccc'; });
  const floorIdx = LEVELS.indexOf(level);
  const floorBtns = document.getElementById('floorButtonsInline').querySelectorAll('button');
  if (floorBtns[floorIdx]) { floorBtns[floorIdx].classList.add('active'); floorBtns[floorIdx].style.background = '#4a8fd4'; floorBtns[floorIdx].style.color = '#fff'; }
  if (editModeEnabled) document.getElementById('edit-tools').style.display = 'flex';

  // If there's a last searched room on this floor, animate zoom-in to it
  if (_lastSearchedRoom && _lastSearchedRoom.level === level) {
    const sData = floorData[level];
    if (sData) {
      const sRoom = sData.rooms.find(r => r.name === _lastSearchedRoom.name);
      if (sRoom) {
        const pw = sData.page.width, ph = sData.page.height;
        const [swx, swy] = pdfToWorld(sRoom.center[0], sRoom.center[1], pw, ph);

        // Start zoomed out, animate to room
        frustumSize = Math.max(pw, ph) * 1.1;
        panOffset.set(0, 0);
        updateCamera2D();

        _eqFilterRoom = _lastSearchedRoom.name;
        filterEquipment();

        // Highlight the room
        const fg = floorGroups[level];
        if (fg) {
          const mesh = fg.meshes.find(m => m.userData.name === _lastSearchedRoom.name);
          if (mesh) {
            mesh.userData._levelIdx = LEVELS.indexOf(level);
            mesh.material.color.setHex(0x00ff88);
            mesh.material.opacity = 0.7;
            highlightedMesh = mesh;
          }
        }

        // Animate zoom-in
        animateCamera2D(swx, swy, 80, 1500);
        return;
      }
    }
  }

  render();
}

let stairConnectors = new THREE.Group();

function createStairSymbol(x, y, z, size) {
  // Stair: zigzag lines (like steps seen from above)
  const group = new THREE.Group();
  const steps = 4;
  const pts = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    pts.push(new THREE.Vector3(-size/2 + t*size, -size/2 + (i%2)*size, 0));
    if (i < steps) pts.push(new THREE.Vector3(-size/2 + (i+1)/steps*size, -size/2 + (i%2)*size, 0));
  }
  const geom = new THREE.BufferGeometry().setFromPoints(pts);
  group.add(new THREE.Line(geom, new THREE.LineBasicMaterial({ color: 0xffaa00, linewidth: 2 })));
  // Border square
  const border = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-size/2,-size/2,0), new THREE.Vector3(size/2,-size/2,0),
    new THREE.Vector3(size/2,size/2,0), new THREE.Vector3(-size/2,size/2,0),
    new THREE.Vector3(-size/2,-size/2,0)]);
  group.add(new THREE.Line(border, new THREE.LineBasicMaterial({ color: 0xffaa00 })));
  group.position.set(x, y, z);
  return group;
}

function createElevatorSymbol(x, y, z, size) {
  // Elevator: square with up/down arrows
  const group = new THREE.Group();
  // Border square
  const border = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-size/2,-size/2,0), new THREE.Vector3(size/2,-size/2,0),
    new THREE.Vector3(size/2,size/2,0), new THREE.Vector3(-size/2,size/2,0),
    new THREE.Vector3(-size/2,-size/2,0)]);
  group.add(new THREE.Line(border, new THREE.LineBasicMaterial({ color: 0x44ccff })));
  // Up arrow
  const up = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-size*0.15, -size*0.1, 0), new THREE.Vector3(-size*0.15, size*0.3, 0),
    new THREE.Vector3(-size*0.3, size*0.15, 0), new THREE.Vector3(-size*0.15, size*0.3, 0),
    new THREE.Vector3(0, size*0.15, 0)]);
  group.add(new THREE.Line(up, new THREE.LineBasicMaterial({ color: 0x44ccff })));
  // Down arrow
  const dn = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(size*0.15, size*0.1, 0), new THREE.Vector3(size*0.15, -size*0.3, 0),

    new THREE.Vector3(size*0.3, -size*0.15, 0)]);
  group.add(new THREE.Line(dn, new THREE.LineBasicMaterial({ color: 0x44ccff })));
  group.position.set(x, y, z);
  return group;
}

function clearGroup(g) {
  while (g.children.length > 0) {
    const c = g.children[0]; g.remove(c);
    if (c.traverse) c.traverse(o => { if(o.geometry) o.geometry.dispose(); if(o.material) o.material.dispose(); });
  }
}

function buildVerticalConnectors() {
  clearGroup(stairConnectors);
  clearGroup(elevatorConnectors);

  const pw = floorData[LEVELS[0]]?.page?.width || 595;
  const ph = floorData[LEVELS[0]]?.page?.height || 842;
  const symSize = 6;

  // Stairs
  for (const stair of STAIRS) {
    const avgX = stair.positions.reduce((s,p) => s+p.x, 0) / stair.positions.length;
    const avgY = stair.positions.reduce((s,p) => s+p.y, 0) / stair.positions.length;
    const [wx, wy] = pdfToWorld(avgX, avgY, pw, ph);
    const minL = Math.min(...stair.positions.map(p => p.l));
    const maxL = Math.max(...stair.positions.map(p => p.l));
    for (const pos of stair.positions) {
      stairConnectors.add(createStairSymbol(wx, wy, pos.l * FLOOR_SPACING + 3, symSize));
    }
    stairConnectors.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(wx,wy,minL*FLOOR_SPACING), new THREE.Vector3(wx,wy,maxL*FLOOR_SPACING)]),
      new THREE.LineBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.6 })));
  }

  // Elevators
  for (const elev of ELEVATORS) {
    const avgX = elev.positions.reduce((s,p) => s+p.x, 0) / elev.positions.length;
    const avgY = elev.positions.reduce((s,p) => s+p.y, 0) / elev.positions.length;
    const [wx, wy] = pdfToWorld(avgX, avgY, pw, ph);
    const minL = Math.min(...elev.positions.map(p => p.l));
    const maxL = Math.max(...elev.positions.map(p => p.l));
    for (const pos of elev.positions) {
      elevatorConnectors.add(createElevatorSymbol(wx, wy, pos.l * FLOOR_SPACING + 3, symSize));
    }
    elevatorConnectors.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(wx,wy,minL*FLOOR_SPACING), new THREE.Vector3(wx,wy,maxL*FLOOR_SPACING)]),
      new THREE.LineBasicMaterial({ color: 0x44ccff, transparent: true, opacity: 0.6 })));
  }
}

let crossFloorGraphGroup = new THREE.Group();
scene.add(crossFloorGraphGroup);

function buildCrossFloorGraphEdges() {
  clearGroup(crossFloorGraphGroup);
  if (!crossFloorEdges.length) return;

  for (const edge of crossFloorEdges) {
    const fromLevel = edge.from_level;
    const toLevel = edge.to_level;
    const fromData = floorData[fromLevel];
    const toData = floorData[toLevel];
    if (!fromData || !toData) continue;

    // Match by name since IDs change on save
    const fromRoom = fromData.rooms.find(r => r.name === edge.from_name);
    const toRoom = toData.rooms.find(r => r.name === edge.to_name);
    if (!fromRoom || !toRoom) continue;

    const fromIdx = LEVELS.indexOf(fromLevel);
    const toIdx = LEVELS.indexOf(toLevel);
    const pw = fromData.page.width, ph = fromData.page.height;

    const [x1, y1] = pdfToWorld(fromRoom.center[0], fromRoom.center[1], pw, ph);
    const [x2, y2] = pdfToWorld(toRoom.center[0], toRoom.center[1], toData.page.width, toData.page.height);

    const pts = [
      new THREE.Vector3(x1, y1, fromIdx * FLOOR_SPACING + 4),
      new THREE.Vector3(x2, y2, toIdx * FLOOR_SPACING + 4),
    ];
    crossFloorGraphGroup.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({ color: 0xff66ff, transparent: true, opacity: 0.7 })));

    for (const p of pts) {
      const dot = new THREE.Mesh(new THREE.CircleGeometry(1.5, 8),
        new THREE.MeshBasicMaterial({ color: 0xff66ff, side: THREE.DoubleSide }));
      dot.position.copy(p);
      crossFloorGraphGroup.add(dot);
    }
  }

  crossFloorGraphGroup.visible = document.getElementById('showGraph').checked;
}

const STATUS_COLORS = { running: 0x00e676, warning: 0xffab00, stopped: 0xff1744 };
const STATUS_DARK   = { running: 0x00994d, warning: 0xaa7200, stopped: 0xaa1030 };
const STATUS_HEX    = { running: '#00e676', warning: '#ffab00', stopped: '#ff1744' };

// === SVG Icon Loader ===
const iconCache = {}; // type -> Promise<HTMLCanvasElement>
const ICON_RES = 128; // icon texture resolution

function loadEquipmentIcon(type, statusColor, noRecolor) {
  const cacheKey = type + ':' + (noRecolor ? 'raw' : statusColor);
  if (iconCache[cacheKey]) return iconCache[cacheKey];

  const promise = fetch(`/api/icons/${type}.svg`)
    .then(r => {
      if (!r.ok) return fetch('/api/icons/generic.svg');
      return r;
    })
    .then(r => r.text())
    .then(svgText => {
      const finalSvg = noRecolor ? svgText :
        svgText.replace(/#ffffff/gi, statusColor).replace(/white/gi, statusColor);
      const canvas = document.createElement('canvas');
      canvas.width = ICON_RES;
      canvas.height = ICON_RES;
      const ctx = canvas.getContext('2d');
      const img = new Image();
      return new Promise(resolve => {
        img.onload = () => {
          ctx.drawImage(img, 0, 0, ICON_RES, ICON_RES);
          resolve(canvas);
        };
        img.onerror = () => resolve(canvas); // empty canvas fallback
        img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(finalSvg)));
      });
    });

  iconCache[cacheKey] = promise;
  return promise;
}

function createEquipmentSprite(x, y, z, size, canvas) {
  const texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthWrite: false, alphaTest: 0.01 });
  const sprite = new THREE.Sprite(mat);
  sprite.position.set(x, y, z);
  sprite.scale.set(size, size, 1);
  return sprite;
}

// Keep old function signature for backward compat but it's no longer used
function createCompressorSymbol(x, y, z, size, statusColor, status) {
  const group = new THREE.Group();
  const s = size;
  const darkColor = STATUS_DARK[status] || 0x006633;
  const metalColor = 0x556677;
  const metalDark = 0x3a4a55;
  const highlight = 0x88aacc;

  // === Base plate ===
  const baseMat = new THREE.MeshBasicMaterial({ color: metalDark, side: THREE.DoubleSide });
  const base = new THREE.Mesh(new THREE.PlaneGeometry(s * 1.6, s * 0.9), baseMat);
  base.position.set(0, 0, 0);
  group.add(base);
  // Base border
  const baseBorder = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-s*0.8, -s*0.45, 0.05), new THREE.Vector3(s*0.8, -s*0.45, 0.05),
      new THREE.Vector3(s*0.8, s*0.45, 0.05), new THREE.Vector3(-s*0.8, s*0.45, 0.05),
      new THREE.Vector3(-s*0.8, -s*0.45, 0.05)]),
    new THREE.LineBasicMaterial({ color: highlight, transparent: true, opacity: 0.5 }));
  group.add(baseBorder);

  // === Main cylinder tank (horizontal) ===
  const tankRadius = s * 0.32;
  const tankLen = s * 0.9;
  // Tank body - rounded rect approximation
  const tankShape = new THREE.Shape();
  tankShape.moveTo(-tankLen/2, -tankRadius);
  tankShape.lineTo(tankLen/2, -tankRadius);
  tankShape.quadraticCurveTo(tankLen/2 + tankRadius*0.5, -tankRadius, tankLen/2 + tankRadius*0.5, 0);
  tankShape.quadraticCurveTo(tankLen/2 + tankRadius*0.5, tankRadius, tankLen/2, tankRadius);
  tankShape.lineTo(-tankLen/2, tankRadius);
  tankShape.quadraticCurveTo(-tankLen/2 - tankRadius*0.5, tankRadius, -tankLen/2 - tankRadius*0.5, 0);
  tankShape.quadraticCurveTo(-tankLen/2 - tankRadius*0.5, -tankRadius, -tankLen/2, -tankRadius);
  const tankMesh = new THREE.Mesh(new THREE.ShapeGeometry(tankShape),
    new THREE.MeshBasicMaterial({ color: metalColor, transparent: true, opacity: 0.9, side: THREE.DoubleSide }));
  tankMesh.position.set(0, s*0.05, 0.1);
  group.add(tankMesh);
  // Tank highlight stripe
  const stripe = new THREE.Mesh(new THREE.PlaneGeometry(tankLen * 0.85, tankRadius * 0.2),
    new THREE.MeshBasicMaterial({ color: highlight, transparent: true, opacity: 0.25, side: THREE.DoubleSide }));
  stripe.position.set(0, s*0.05 + tankRadius*0.3, 0.15);
  group.add(stripe);
  // Tank outline
  const tankOutlinePts = [];
  for (let i = 0; i <= 48; i++) {
    const t = i / 48;
    const angle = t * Math.PI * 2;
    // Ellipse for tank
    tankOutlinePts.push(new THREE.Vector3(
      Math.cos(angle) * (tankLen/2 + tankRadius*0.5),
      s*0.05 + Math.sin(angle) * tankRadius, 0.2));
  }
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(tankOutlinePts),
    new THREE.LineBasicMaterial({ color: highlight, transparent: true, opacity: 0.6 })));

  // === Motor housing (left side) ===
  const motorR = s * 0.22;
  const motorPts = [];
  for (let i = 0; i <= 24; i++) {
    const a = (i / 24) * Math.PI * 2;
    motorPts.push(new THREE.Vector3(
      -s*0.45 + Math.cos(a) * motorR,
      s*0.05 + Math.sin(a) * motorR, 0.25));
  }
  const motorFill = new THREE.Mesh(new THREE.CircleGeometry(motorR, 24),
    new THREE.MeshBasicMaterial({ color: metalDark, side: THREE.DoubleSide }));
  motorFill.position.set(-s*0.45, s*0.05, 0.22);
  group.add(motorFill);
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(motorPts),
    new THREE.LineBasicMaterial({ color: highlight, transparent: true, opacity: 0.7 })));
  // Motor fan lines
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    const fan = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-s*0.45, s*0.05, 0.3),
      new THREE.Vector3(-s*0.45 + Math.cos(a)*motorR*0.85, s*0.05 + Math.sin(a)*motorR*0.85, 0.3)]);
    group.add(new THREE.Line(fan, new THREE.LineBasicMaterial({ color: highlight, transparent: true, opacity: 0.35 })));
  }

  // === Cooling fins (on top of tank) ===
  for (let i = 0; i < 5; i++) {
    const fx = -s*0.15 + i * s*0.12;
    const fin = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(fx, s*0.05 + tankRadius*0.7, 0.2),
      new THREE.Vector3(fx, s*0.05 + tankRadius + s*0.1, 0.2)]);
    group.add(new THREE.Line(fin, new THREE.LineBasicMaterial({ color: highlight, transparent: true, opacity: 0.4 })));
  }

  // === Outlet pipe (right, going up) ===
  const pipeW = s * 0.06;
  const pipePts = [
    new THREE.Vector3(s*0.55, s*0.05, 0.3),
    new THREE.Vector3(s*0.72, s*0.05, 0.3),
    new THREE.Vector3(s*0.72, s*0.35, 0.3)];
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pipePts),
    new THREE.LineBasicMaterial({ color: 0x88bbdd })));
  // Parallel pipe line
  const pipePts2 = pipePts.map(p => new THREE.Vector3(p.x + pipeW, p.y, p.z));
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pipePts2),
    new THREE.LineBasicMaterial({ color: 0x88bbdd })));
  // Pressure arrow
  const arrowPts = [
    new THREE.Vector3(s*0.69, s*0.28, 0.35),
    new THREE.Vector3(s*0.72 + pipeW/2, s*0.38, 0.35),
    new THREE.Vector3(s*0.75 + pipeW, s*0.28, 0.35)];
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(arrowPts),
    new THREE.LineBasicMaterial({ color: statusColor })));

  // === Inlet pipe (left bottom) ===
  const inPts = [
    new THREE.Vector3(-s*0.72, -s*0.15, 0.3),
    new THREE.Vector3(-s*0.55, -s*0.15, 0.3)];
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(inPts),
    new THREE.LineBasicMaterial({ color: 0x6699aa })));
  const inPts2 = inPts.map(p => new THREE.Vector3(p.x, p.y - pipeW, p.z));
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(inPts2),
    new THREE.LineBasicMaterial({ color: 0x6699aa })));

  // === Status LED indicator (glowing dot) ===
  const ledGeo = new THREE.CircleGeometry(s * 0.06, 16);
  const ledMat = new THREE.MeshBasicMaterial({ color: statusColor, side: THREE.DoubleSide });
  const led = new THREE.Mesh(ledGeo, ledMat);
  led.position.set(s*0.35, s*0.05 - tankRadius*0.5, 0.3);
  group.add(led);
  // LED glow
  const glowGeo = new THREE.CircleGeometry(s * 0.12, 16);
  const glowMat = new THREE.MeshBasicMaterial({ color: statusColor, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.position.set(s*0.35, s*0.05 - tankRadius*0.5, 0.28);
  glow.userData.isLedGlow = true;
  group.add(glow);

  // === Pressure gauge (small circle, right side of tank) ===
  const gaugeR = s * 0.08;
  const gaugePts = [];
  for (let i = 0; i <= 16; i++) {
    const a = (i / 16) * Math.PI * 2;
    gaugePts.push(new THREE.Vector3(s*0.3 + Math.cos(a)*gaugeR, s*0.05 + tankRadius*0.5 + Math.sin(a)*gaugeR, 0.3));
  }
  group.add(new THREE.Mesh(new THREE.CircleGeometry(gaugeR, 16),
    new THREE.MeshBasicMaterial({ color: 0x222233, side: THREE.DoubleSide }))
    .translateX(s*0.3).translateY(s*0.05 + tankRadius*0.5).translateZ(0.28));
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(gaugePts),
    new THREE.LineBasicMaterial({ color: 0xaabbcc })));
  // Gauge needle
  const needleAngle = status === 'running' ? -0.3 : status === 'warning' ? 0.5 : 1.2;
  const needle = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(s*0.3, s*0.05 + tankRadius*0.5, 0.35),
    new THREE.Vector3(s*0.3 + Math.cos(needleAngle)*gaugeR*0.8, s*0.05 + tankRadius*0.5 + Math.sin(needleAngle)*gaugeR*0.8, 0.35)]);
  group.add(new THREE.Line(needle, new THREE.LineBasicMaterial({ color: 0xff4444 })));

  // === Status pulse ring (outer glow) ===
  const pulseGeo = new THREE.RingGeometry(s * 0.85, s * 0.9, 32);
  const pulseMat = new THREE.MeshBasicMaterial({ color: statusColor, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
  const pulse = new THREE.Mesh(pulseGeo, pulseMat);
  pulse.position.z = 0.05;
  pulse.userData.isPulse = true;
  group.add(pulse);

  // === Corner mounting bolts ===
  for (const bx of [-s*0.7, s*0.7]) {
    for (const by of [-s*0.38, s*0.38]) {
      const bolt = new THREE.Mesh(new THREE.CircleGeometry(s*0.03, 8),
        new THREE.MeshBasicMaterial({ color: 0x99aabb, side: THREE.DoubleSide }));
      bolt.position.set(bx, by, 0.1);
      group.add(bolt);
    }
  }

  group.position.set(x, y, z);
  return group;
}

function createCoffeeMachineSymbol(x, y, z, size, statusColor, status) {
  const group = new THREE.Group();
  const s = size;
  const darkColor = STATUS_DARK[status] || 0x006633;
  const bodyColor = 0x2a2024;
  const chrome = 0x99aabb;
  const chromeDark = 0x667788;
  const accent = 0x8b5e3c; // warm coffee brown

  // === Base / drip tray ===
  const baseGeo = new THREE.PlaneGeometry(s * 1.2, s * 0.25);
  const baseMat = new THREE.MeshBasicMaterial({ color: chromeDark, side: THREE.DoubleSide });
  group.add(new THREE.Mesh(baseGeo, baseMat).translateY(-s*0.55).translateZ(0.05));
  // Drip tray grate lines
  for (let i = -2; i <= 2; i++) {
    const grate = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(i * s * 0.12, -s*0.5, 0.1),
      new THREE.Vector3(i * s * 0.12, -s*0.6, 0.1)]);
    group.add(new THREE.Line(grate, new THREE.LineBasicMaterial({ color: chrome, transparent: true, opacity: 0.4 })));
  }

  // === Machine body (tall rectangle) ===
  const bodyShape = new THREE.Shape();
  const bw = s * 0.55, bh = s * 0.65;
  const br = s * 0.06; // corner radius
  bodyShape.moveTo(-bw + br, -bh);
  bodyShape.lineTo(bw - br, -bh);
  bodyShape.quadraticCurveTo(bw, -bh, bw, -bh + br);
  bodyShape.lineTo(bw, bh - br);
  bodyShape.quadraticCurveTo(bw, bh, bw - br, bh);
  bodyShape.lineTo(-bw + br, bh);
  bodyShape.quadraticCurveTo(-bw, bh, -bw, bh - br);
  bodyShape.lineTo(-bw, -bh + br);
  bodyShape.quadraticCurveTo(-bw, -bh, -bw + br, -bh);
  const bodyMesh = new THREE.Mesh(new THREE.ShapeGeometry(bodyShape),
    new THREE.MeshBasicMaterial({ color: bodyColor, transparent: true, opacity: 0.95, side: THREE.DoubleSide }));
  bodyMesh.position.set(0, s*0.05, 0.08);
  group.add(bodyMesh);
  // Body outline
  const bodyOutline = [];
  for (let i = 0; i <= 40; i++) {
    const t = i / 40;
    const angle = t * Math.PI * 2;
    bodyOutline.push(new THREE.Vector3(
      Math.cos(angle) * bw * 1.02,
      s*0.05 + Math.sin(angle) * bh * 1.02, 0.12));
  }
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(bodyOutline),
    new THREE.LineBasicMaterial({ color: chrome, transparent: true, opacity: 0.5 })));

  // === Bean hopper (top) ===
  const hopperShape = new THREE.Shape();
  hopperShape.moveTo(-s*0.3, 0); hopperShape.lineTo(s*0.3, 0);
  hopperShape.lineTo(s*0.2, s*0.3); hopperShape.lineTo(-s*0.2, s*0.3);
  hopperShape.closePath();
  const hopper = new THREE.Mesh(new THREE.ShapeGeometry(hopperShape),
    new THREE.MeshBasicMaterial({ color: 0x3a2a1a, transparent: true, opacity: 0.85, side: THREE.DoubleSide }));
  hopper.position.set(0, s*0.55, 0.15);
  group.add(hopper);
  // Hopper outline
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-s*0.3, s*0.55, 0.2), new THREE.Vector3(s*0.3, s*0.55, 0.2),
    new THREE.Vector3(s*0.2, s*0.85, 0.2), new THREE.Vector3(-s*0.2, s*0.85, 0.2),
    new THREE.Vector3(-s*0.3, s*0.55, 0.2)]),
    new THREE.LineBasicMaterial({ color: accent })));
  // Coffee beans (small dots in hopper)
  for (const bp of [[-0.05,0.68],[0.08,0.72],[0,0.62],[0.12,0.65],[-0.1,0.74]]) {
    const bean = new THREE.Mesh(new THREE.CircleGeometry(s*0.025, 6),
      new THREE.MeshBasicMaterial({ color: 0x5c3a1a, side: THREE.DoubleSide }));
    bean.position.set(bp[0]*s, bp[1]*s, 0.22);
    group.add(bean);
  }

  // === Display screen ===
  const screen = new THREE.Mesh(new THREE.PlaneGeometry(s*0.6, s*0.2),
    new THREE.MeshBasicMaterial({ color: 0x112233, side: THREE.DoubleSide }));
  screen.position.set(0, s*0.3, 0.15);
  group.add(screen);
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-s*0.3, s*0.2, 0.18), new THREE.Vector3(s*0.3, s*0.2, 0.18),
    new THREE.Vector3(s*0.3, s*0.4, 0.18), new THREE.Vector3(-s*0.3, s*0.4, 0.18),
    new THREE.Vector3(-s*0.3, s*0.2, 0.18)]),
    new THREE.LineBasicMaterial({ color: statusColor, transparent: true, opacity: 0.8 })));
  // Screen status text (small colored bar)
  const screenBar = new THREE.Mesh(new THREE.PlaneGeometry(s*0.45, s*0.04),
    new THREE.MeshBasicMaterial({ color: statusColor, transparent: true, opacity: 0.7, side: THREE.DoubleSide }));
  screenBar.position.set(0, s*0.3, 0.17);
  screenBar.userData.isScreenBar = true;
  group.add(screenBar);

  // === Dispensing nozzle area ===
  // Nozzle housing
  const nozzle = new THREE.Mesh(new THREE.PlaneGeometry(s*0.25, s*0.12),
    new THREE.MeshBasicMaterial({ color: chromeDark, side: THREE.DoubleSide }));
  nozzle.position.set(0, s*0.05, 0.15);
  group.add(nozzle);
  // Two spouts
  for (const nx of [-s*0.06, s*0.06]) {
    const spout = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(nx, s*0.08, 0.2),
      new THREE.Vector3(nx, -s*0.05, 0.2)]);
    group.add(new THREE.Line(spout, new THREE.LineBasicMaterial({ color: chrome })));
  }
  // Coffee stream (animated via userData)
  if (status === 'running') {
    for (const nx of [-s*0.06, s*0.06]) {
      const stream = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(nx, -s*0.05, 0.2),
        new THREE.Vector3(nx, -s*0.25, 0.2)]);
      const streamLine = new THREE.Line(stream, new THREE.LineBasicMaterial({
        color: accent, transparent: true, opacity: 0.5 }));
      streamLine.userData.isCoffeeStream = true;
      group.add(streamLine);
    }
  }

  // === Cup (below nozzle) ===
  const cupShape = new THREE.Shape();
  cupShape.moveTo(-s*0.12, 0); cupShape.lineTo(s*0.12, 0);
  cupShape.lineTo(s*0.1, -s*0.18); cupShape.lineTo(-s*0.1, -s*0.18);
  cupShape.closePath();
  const cup = new THREE.Mesh(new THREE.ShapeGeometry(cupShape),
    new THREE.MeshBasicMaterial({ color: 0xeeeeee, transparent: true, opacity: 0.75, side: THREE.DoubleSide }));
  cup.position.set(0, -s*0.25, 0.12);
  group.add(cup);
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-s*0.12, -s*0.25, 0.18), new THREE.Vector3(s*0.12, -s*0.25, 0.18),
    new THREE.Vector3(s*0.1, -s*0.43, 0.18), new THREE.Vector3(-s*0.1, -s*0.43, 0.18),
    new THREE.Vector3(-s*0.12, -s*0.25, 0.18)]),
    new THREE.LineBasicMaterial({ color: chrome, transparent: true, opacity: 0.7 })));
  // Cup handle
  const handlePts = [];
  for (let i = 0; i <= 10; i++) {
    const a = -Math.PI/2 + (i/10) * Math.PI;
    handlePts.push(new THREE.Vector3(s*0.12 + Math.cos(a)*s*0.06, -s*0.32 + Math.sin(a)*s*0.07, 0.18));
  }
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(handlePts),
    new THREE.LineBasicMaterial({ color: chrome, transparent: true, opacity: 0.6 })));
  // Coffee in cup
  if (status === 'running') {
    const coffeeFill = new THREE.Mesh(new THREE.PlaneGeometry(s*0.18, s*0.08),
      new THREE.MeshBasicMaterial({ color: accent, transparent: true, opacity: 0.6, side: THREE.DoubleSide }));
    coffeeFill.position.set(0, -s*0.3, 0.14);
    group.add(coffeeFill);
  }

  // === Steam wisps (above cup, for running status) ===
  if (status === 'running') {
    for (const sx of [-s*0.04, s*0.04]) {
      const steamPts = [
        new THREE.Vector3(sx, -s*0.22, 0.25),
        new THREE.Vector3(sx + s*0.02, -s*0.16, 0.25),
        new THREE.Vector3(sx - s*0.02, -s*0.1, 0.25)];
      const steamLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(steamPts),
        new THREE.LineBasicMaterial({ color: 0xcccccc, transparent: true, opacity: 0.3 }));
      steamLine.userData.isSteam = true;
      group.add(steamLine);
    }
  }

  // === Side buttons (3 dots) ===
  for (let i = 0; i < 3; i++) {
    const btn = new THREE.Mesh(new THREE.CircleGeometry(s*0.025, 8),
      new THREE.MeshBasicMaterial({ color: i === 0 ? statusColor : chrome, side: THREE.DoubleSide }));
    btn.position.set(s*0.42, s*0.15 - i*s*0.1, 0.15);
    group.add(btn);
  }

  // === Status LED ===
  const led = new THREE.Mesh(new THREE.CircleGeometry(s*0.04, 12),
    new THREE.MeshBasicMaterial({ color: statusColor, side: THREE.DoubleSide }));
  led.position.set(-s*0.42, s*0.42, 0.15);
  group.add(led);
  const ledGlow = new THREE.Mesh(new THREE.CircleGeometry(s*0.09, 12),
    new THREE.MeshBasicMaterial({ color: statusColor, transparent: true, opacity: 0.3, side: THREE.DoubleSide }));
  ledGlow.position.set(-s*0.42, s*0.42, 0.13);
  ledGlow.userData.isLedGlow = true;
  group.add(ledGlow);

  // === Pulse ring ===
  const pulseGeo = new THREE.RingGeometry(s * 0.8, s * 0.85, 32);
  const pulseMat = new THREE.MeshBasicMaterial({ color: statusColor, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
  const pulse = new THREE.Mesh(pulseGeo, pulseMat);
  pulse.position.z = 0.03;
  pulse.userData.isPulse = true;
  group.add(pulse);

  group.position.set(x, y, z);
  return group;
}

function createAirConditioningSymbol(x, y, z, size, statusColor, status) {
  const group = new THREE.Group();
  const s = size;
  const darkColor = STATUS_DARK[status] || 0x006633;
  const bodyColor = 0xdde8f0;
  const metalColor = 0xc8d8e8;
  const metalDark = 0x4a5a6a;
  const highlight = 0x88aacc;
  const coolBlue = 0x44aadd;
  const coolDark = 0x2288bb;

  // === Wall mount bracket ===
  const bracketMat = new THREE.MeshBasicMaterial({ color: metalDark, side: THREE.DoubleSide });
  const bracketL = new THREE.Mesh(new THREE.PlaneGeometry(s * 0.08, s * 0.5), bracketMat);
  bracketL.position.set(-s*0.65, s*0.15, -0.02);
  group.add(bracketL);
  const bracketR = new THREE.Mesh(new THREE.PlaneGeometry(s * 0.08, s * 0.5), bracketMat);
  bracketR.position.set(s*0.65, s*0.15, -0.02);
  group.add(bracketR);

  // === Main body (sleek rounded rectangle - wall unit) ===
  const bw = s * 0.75, bh = s * 0.35;
  const bodyShape = new THREE.Shape();
  const br = s * 0.08;
  bodyShape.moveTo(-bw + br, -bh);
  bodyShape.lineTo(bw - br, -bh);
  bodyShape.quadraticCurveTo(bw, -bh, bw, -bh + br);
  bodyShape.lineTo(bw, bh - br);
  bodyShape.quadraticCurveTo(bw, bh, bw - br, bh);
  bodyShape.lineTo(-bw + br, bh);
  bodyShape.quadraticCurveTo(-bw, bh, -bw, bh - br);
  bodyShape.lineTo(-bw, -bh + br);
  bodyShape.quadraticCurveTo(-bw, -bh, -bw + br, -bh);
  const bodyMesh = new THREE.Mesh(new THREE.ShapeGeometry(bodyShape),
    new THREE.MeshBasicMaterial({ color: 0xdde8f0, transparent: true, opacity: 0.95, side: THREE.DoubleSide }));
  bodyMesh.position.set(0, 0, 0.05);
  group.add(bodyMesh);
  // Body outline
  const bodyOutlinePts = [];
  const cornerPts = [[-bw+br,-bh],[ bw-br,-bh],[bw,-bh+br],[bw,bh-br],[bw-br,bh],[-bw+br,bh],[-bw,bh-br],[-bw,-bh+br]];
  for (const p of cornerPts) bodyOutlinePts.push(new THREE.Vector3(p[0], p[1], 0.1));
  bodyOutlinePts.push(bodyOutlinePts[0].clone());
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(bodyOutlinePts),
    new THREE.LineBasicMaterial({ color: highlight, transparent: true, opacity: 0.7 })));

  // === Top accent stripe (brand line) ===
  const accentStripe = new THREE.Mesh(new THREE.PlaneGeometry(bw * 1.8, s * 0.04),
    new THREE.MeshBasicMaterial({ color: coolBlue, transparent: true, opacity: 0.6, side: THREE.DoubleSide }));
  accentStripe.position.set(0, bh - s*0.06, 0.12);
  group.add(accentStripe);

  // === Air outlet vanes (horizontal louvers) ===
  const vaneCount = 5;
  const vaneTop = -s*0.02, vaneBot = -bh + s*0.06;
  for (let i = 0; i < vaneCount; i++) {
    const vy = vaneBot + (vaneTop - vaneBot) * (i / (vaneCount - 1));
    // Each vane is a slightly angled line
    const vaneAngle = status === 'running' ? 0.15 * Math.sin(i * 0.5) : 0;
    const vl = bw * 1.5;
    const vaneLine = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-vl/2, vy - vaneAngle * s * 0.02, 0.15),
      new THREE.Vector3(0, vy + vaneAngle * s * 0.02, 0.15),
      new THREE.Vector3(vl/2, vy - vaneAngle * s * 0.02, 0.15)]);
    group.add(new THREE.Line(vaneLine, new THREE.LineBasicMaterial({
      color: status === 'running' ? coolBlue : 0x8899aa, transparent: true, opacity: 0.5 })));
  }

  // === Air flow indicators (when running) ===
  if (status === 'running') {
    for (const fx of [-s*0.35, 0, s*0.35]) {
      const flowPts = [];
      for (let i = 0; i <= 8; i++) {
        const t = i / 8;
        flowPts.push(new THREE.Vector3(
          fx + Math.sin(t * Math.PI * 2) * s * 0.04,
          -bh - t * s * 0.35,
          0.2));
      }
      const flowLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(flowPts),
        new THREE.LineBasicMaterial({ color: coolBlue, transparent: true, opacity: 0.3 }));
      flowLine.userData.isAirFlow = true;
      group.add(flowLine);
    }
    // Downward arrows
    for (const fx of [-s*0.2, s*0.2]) {
      const arrowPts = [
        new THREE.Vector3(fx - s*0.05, -bh - s*0.12, 0.2),
        new THREE.Vector3(fx, -bh - s*0.22, 0.2),
        new THREE.Vector3(fx + s*0.05, -bh - s*0.12, 0.2)];
      const arrow = new THREE.Line(new THREE.BufferGeometry().setFromPoints(arrowPts),
        new THREE.LineBasicMaterial({ color: coolBlue, transparent: true, opacity: 0.4 }));
      arrow.userData.isAirFlow = true;
      group.add(arrow);
    }
  }

  // === Display panel (right side) ===
  const dispW = s * 0.25, dispH = s * 0.14;
  const display = new THREE.Mesh(new THREE.PlaneGeometry(dispW, dispH),
    new THREE.MeshBasicMaterial({ color: 0x112233, side: THREE.DoubleSide }));
  display.position.set(s*0.42, bh - s*0.18, 0.12);
  group.add(display);
  // Display border
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(s*0.42-dispW/2, bh-s*0.18-dispH/2, 0.14),
    new THREE.Vector3(s*0.42+dispW/2, bh-s*0.18-dispH/2, 0.14),
    new THREE.Vector3(s*0.42+dispW/2, bh-s*0.18+dispH/2, 0.14),
    new THREE.Vector3(s*0.42-dispW/2, bh-s*0.18+dispH/2, 0.14),
    new THREE.Vector3(s*0.42-dispW/2, bh-s*0.18-dispH/2, 0.14)]),
    new THREE.LineBasicMaterial({ color: statusColor, transparent: true, opacity: 0.7 })));
  // Temperature readout bar
  const tempBar = new THREE.Mesh(new THREE.PlaneGeometry(dispW * 0.7, dispH * 0.25),
    new THREE.MeshBasicMaterial({ color: statusColor, transparent: true, opacity: 0.6, side: THREE.DoubleSide }));
  tempBar.position.set(s*0.42, bh - s*0.18, 0.15);
  tempBar.userData.isScreenBar = true;
  group.add(tempBar);

  // === Snowflake icon (center top - cooling indicator) ===
  const sfx = -s*0.42, sfy = bh - s*0.18;
  const sfR = s * 0.08;
  // 6 arms of snowflake
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    const arm = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(sfx, sfy, 0.18),
      new THREE.Vector3(sfx + Math.cos(a)*sfR, sfy + Math.sin(a)*sfR, 0.18)]);
    group.add(new THREE.Line(arm, new THREE.LineBasicMaterial({
      color: status === 'running' ? coolBlue : 0x667788 })));
    // Small branches on each arm
    const bx = sfx + Math.cos(a)*sfR*0.6, by = sfy + Math.sin(a)*sfR*0.6;
    const ba1 = a + 0.6, ba2 = a - 0.6;
    for (const ba of [ba1, ba2]) {
      const branch = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(bx, by, 0.18),
        new THREE.Vector3(bx + Math.cos(ba)*sfR*0.35, by + Math.sin(ba)*sfR*0.35, 0.18)]);
      group.add(new THREE.Line(branch, new THREE.LineBasicMaterial({
        color: status === 'running' ? coolBlue : 0x667788, transparent: true, opacity: 0.6 })));
    }
  }

  // === Fan turbine (visible through grille, center of body) ===
  const fanR = s * 0.18;
  const fanFill = new THREE.Mesh(new THREE.CircleGeometry(fanR, 24),
    new THREE.MeshBasicMaterial({ color: 0xccd8e4, transparent: true, opacity: 0.4, side: THREE.DoubleSide }));
  fanFill.position.set(0, -s*0.04, 0.08);
  group.add(fanFill);
  // Fan blades (4 curved blades)
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI * 2;
    const bladePts = [];
    for (let j = 0; j <= 8; j++) {
      const t = j / 8;
      const r = fanR * t;
      const curve = a + t * 0.8; // blade curvature
      bladePts.push(new THREE.Vector3(
        Math.cos(curve) * r,
        -s*0.04 + Math.sin(curve) * r,
        0.12));
    }
    const blade = new THREE.Line(new THREE.BufferGeometry().setFromPoints(bladePts),
      new THREE.LineBasicMaterial({ color: metalDark, transparent: true, opacity: 0.7 }));
    blade.userData.isFanBlade = true;
    group.add(blade);
  }
  // Fan center hub
  const hub = new THREE.Mesh(new THREE.CircleGeometry(s*0.035, 12),
    new THREE.MeshBasicMaterial({ color: metalDark, side: THREE.DoubleSide }));
  hub.position.set(0, -s*0.04, 0.14);
  group.add(hub);
  // Fan outline ring
  const fanRingPts = [];
  for (let i = 0; i <= 32; i++) {
    const a = (i / 32) * Math.PI * 2;
    fanRingPts.push(new THREE.Vector3(Math.cos(a)*fanR, -s*0.04 + Math.sin(a)*fanR, 0.13));
  }
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(fanRingPts),
    new THREE.LineBasicMaterial({ color: highlight, transparent: true, opacity: 0.4 })));

  // === Refrigerant pipes (left side, going to wall) ===
  const pipeY1 = s*0.1, pipeY2 = -s*0.05;
  // Supply pipe (thicker, cool)
  const supplyPts = [
    new THREE.Vector3(-bw, pipeY1, 0.1),
    new THREE.Vector3(-bw - s*0.2, pipeY1, 0.1),
    new THREE.Vector3(-bw - s*0.2, s*0.4, 0.1)];
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(supplyPts),
    new THREE.LineBasicMaterial({ color: coolBlue })));
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(
    supplyPts.map(p => new THREE.Vector3(p.x + s*0.04, p.y, p.z))),
    new THREE.LineBasicMaterial({ color: coolBlue })));
  // Return pipe (warm)
  const returnPts = [
    new THREE.Vector3(-bw, pipeY2, 0.1),
    new THREE.Vector3(-bw - s*0.12, pipeY2, 0.1),
    new THREE.Vector3(-bw - s*0.12, s*0.4, 0.1)];
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(returnPts),
    new THREE.LineBasicMaterial({ color: 0xcc7744 })));
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(
    returnPts.map(p => new THREE.Vector3(p.x + s*0.04, p.y, p.z))),
    new THREE.LineBasicMaterial({ color: 0xcc7744 })));

  // === Temperature gauge (small thermometer, right of display) ===
  const thX = s*0.62, thY = bh - s*0.18;
  // Thermometer bulb
  const bulb = new THREE.Mesh(new THREE.CircleGeometry(s*0.035, 12),
    new THREE.MeshBasicMaterial({ color: status === 'stopped' ? 0xcc4444 : coolBlue, side: THREE.DoubleSide }));
  bulb.position.set(thX, thY - s*0.06, 0.15);
  group.add(bulb);
  // Thermometer tube
  const tubeGeo = new THREE.PlaneGeometry(s*0.02, s*0.1);
  const tubeMat = new THREE.MeshBasicMaterial({ color: 0xdddddd, side: THREE.DoubleSide });
  group.add(new THREE.Mesh(tubeGeo, tubeMat).translateX(thX).translateY(thY + s*0.01).translateZ(0.15));
  // Mercury level
  const mercH = status === 'running' ? s*0.04 : status === 'warning' ? s*0.07 : s*0.09;
  const merc = new THREE.Mesh(new THREE.PlaneGeometry(s*0.014, mercH),
    new THREE.MeshBasicMaterial({ color: status === 'running' ? coolBlue : status === 'warning' ? 0xffaa00 : 0xcc4444, side: THREE.DoubleSide }));
  merc.position.set(thX, thY - s*0.06 + mercH/2 + s*0.02, 0.16);
  group.add(merc);

  // === Status LED ===
  const ledGeo = new THREE.CircleGeometry(s * 0.05, 16);
  const ledMat = new THREE.MeshBasicMaterial({ color: statusColor, side: THREE.DoubleSide });
  const led = new THREE.Mesh(ledGeo, ledMat);
  led.position.set(s*0.2, bh - s*0.06, 0.15);
  group.add(led);
  // LED glow
  const glowGeo = new THREE.CircleGeometry(s * 0.1, 16);
  const glowMat = new THREE.MeshBasicMaterial({ color: statusColor, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.position.set(s*0.2, bh - s*0.06, 0.13);
  glow.userData.isLedGlow = true;
  group.add(glow);

  // === Power/WiFi indicator dots ===
  for (let i = 0; i < 3; i++) {
    const dotSize = s * 0.02;
    const dot = new THREE.Mesh(new THREE.CircleGeometry(dotSize, 6),
      new THREE.MeshBasicMaterial({ color: i === 0 ? statusColor : highlight, side: THREE.DoubleSide }));
    dot.position.set(s*0.08 + i*s*0.06, bh - s*0.06, 0.15);
    group.add(dot);
  }

  // === Status pulse ring ===
  const pulseGeo = new THREE.RingGeometry(s * 0.85, s * 0.9, 32);
  const pulseMat = new THREE.MeshBasicMaterial({ color: statusColor, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
  const pulse = new THREE.Mesh(pulseGeo, pulseMat);
  pulse.position.z = 0.02;
  pulse.userData.isPulse = true;
  group.add(pulse);

  // === Corner mounting screws ===
  for (const bx of [-bw + s*0.06, bw - s*0.06]) {
    for (const by of [-bh + s*0.06, bh - s*0.06]) {
      const screw = new THREE.Mesh(new THREE.CircleGeometry(s*0.025, 8),
        new THREE.MeshBasicMaterial({ color: 0x99aabb, side: THREE.DoubleSide }));
      screw.position.set(bx, by, 0.1);
      group.add(screw);
    }
  }

  group.position.set(x, y, z);
  return group;
}

function buildEquipmentForLevel(level) {
  const fg = floorGroups[level];
  if (!fg) return;
  const data = floorData[level];
  if (!data) return;
  const pw = data.page.width, ph = data.page.height;
  const levelKey = level.split('/').pop();

  if (equipmentGroups[level]) {
    fg.container.remove(equipmentGroups[level]);
    clearGroup(equipmentGroups[level]);
  }
  const eqGroup = new THREE.Group();
  equipmentGroups[level] = eqGroup;

  const levelEquip = equipment.filter(e => e.level === levelKey);
  const iconPromises = [];

  // Group equipment by room
  const byRoom = {};
  for (const eq of levelEquip) {
    if (!byRoom[eq.room]) byRoom[eq.room] = [];
    byRoom[eq.room].push(eq);
  }

  for (const [roomName, roomEquips] of Object.entries(byRoom)) {
    const room = data.rooms.find(r => r.name === roomName);
    if (!room) continue;
    const [wx, wy] = pdfToWorld(room.center[0], room.center[1], pw, ph);

    // === 2D collapsed icon: generic icon with count ===
    const collapsedP = loadEquipmentIcon('generic', '#88aacc', true).then(canvas => {
      const sprite = createEquipmentSprite(wx, wy, 6, 3, canvas);
      sprite.userData.eqRoom = roomName;
      sprite.userData.eqMode = 'collapsed';
      sprite.visible = false;
      eqGroup.add(sprite);

      // Count badge
      if (roomEquips.length > 1) {
        const bc = document.createElement('canvas');
        bc.width = 64; bc.height = 32;
        const bctx = bc.getContext('2d');
        bctx.font = 'bold 20px monospace'; bctx.fillStyle = '#ffffff'; bctx.textAlign = 'center';
        bctx.fillText(roomEquips.length.toString(), 32, 22);
        const badge = new THREE.Sprite(new THREE.SpriteMaterial({
          map: new THREE.CanvasTexture(bc), transparent: true, depthWrite: false }));
        badge.position.set(wx + 2, wy + 2, 7);
        badge.scale.set(3, 1.5, 1);
        badge.userData.eqRoom = roomName;
        badge.userData.eqMode = 'collapsed';
        badge.visible = false;
        eqGroup.add(badge);
      }
    });
    iconPromises.push(collapsedP);

    // === Build combined list: equipment + occupants ===
    const allItems = roomEquips.map(eq => ({
      iconType: eq.type, name: eq.name, colorHex: STATUS_HEX[eq.status] || '#00e676',
      noRecolor: false, eqData: eq, isOccupant: false
    }));

    // Add occupants from global occupancy
    const globalOcc = window._globalOccupancy || {};
    const roomOcc = globalOcc[room.id];
    if (roomOcc) {
      if (roomOcc.persons) {
        for (const p of roomOcc.persons) {
          allItems.push({ iconType: p.icon || 'man', name: p.name, colorHex: null, noRecolor: true, isOccupant: true });
        }
      }
      if (roomOcc.aliens) {
        for (const a of roomOcc.aliens) {
          allItems.push({ iconType: 'alien', name: 'Alien', colorHex: null, noRecolor: true, isOccupant: true });
        }
      }
    }

    const totalItems = allItems.length;

    // === 3D stacked icons + 2D expanded circle ===
    for (let idx = 0; idx < totalItems; idx++) {
      const item = allItems[idx];
      const size = 3;

      const p = loadEquipmentIcon(item.iconType, item.colorHex, item.noRecolor).then(canvas => {
        // 3D: stack on z-axis
        const zOff = idx * size * 1.1;
        const iconSprite = createEquipmentSprite(wx, wy, 6 + zOff, size, canvas);
        if (item.eqData) iconSprite.userData.equipment = item.eqData;
        iconSprite.userData.eqRoom = roomName;
        iconSprite.userData.eqMode = '3d';
        iconSprite.visible = false;
        eqGroup.add(iconSprite);

        // 2D expanded: arrange in circle
        const angle = (idx / totalItems) * Math.PI * 2 - Math.PI / 2;
        const radius = Math.max(5, totalItems * 1.2);
        const ex = wx + Math.cos(angle) * radius;
        const ey = wy + Math.sin(angle) * radius;

        const expandedSprite = createEquipmentSprite(ex, ey, 6, size, canvas);
        if (item.eqData) expandedSprite.userData.equipment = item.eqData;
        expandedSprite.userData.eqRoom = roomName;
        expandedSprite.userData.eqMode = 'expanded';
        expandedSprite.visible = false;
        eqGroup.add(expandedSprite);

        // Label for expanded view
        const lc = document.createElement('canvas');
        lc.width = 256; lc.height = 32;
        const ctx = lc.getContext('2d');
        const labelColor = item.isOccupant ? (item.iconType === 'alien' ? '#ff2222' : '#00ccff') : (item.colorHex || '#88aacc');
        ctx.font = 'bold 14px monospace'; ctx.fillStyle = labelColor; ctx.textAlign = 'center';
        ctx.fillText(item.name, 128, 16);
        const labelSprite = new THREE.Sprite(new THREE.SpriteMaterial({
          map: new THREE.CanvasTexture(lc), transparent: true, depthWrite: false }));
        labelSprite.position.set(ex, ey - size, 7);
        labelSprite.scale.set(8, 1.2, 1);
        if (item.eqData) labelSprite.userData.equipment = item.eqData;
        labelSprite.userData.eqRoom = roomName;
        labelSprite.userData.eqMode = 'expanded';
        labelSprite.visible = false;
        eqGroup.add(labelSprite);

        // 3D label
        const lc3 = document.createElement('canvas');
        lc3.width = 256; lc3.height = 32;
        const ctx3 = lc3.getContext('2d');
        ctx3.font = 'bold 14px monospace'; ctx3.fillStyle = labelColor; ctx3.textAlign = 'center';
        ctx3.fillText(item.name, 128, 16);
        const label3d = new THREE.Sprite(new THREE.SpriteMaterial({
          map: new THREE.CanvasTexture(lc3), transparent: true, depthWrite: false }));
        label3d.position.set(wx, wy - size, 7 + zOff);
        label3d.scale.set(8, 1.2, 1);
        if (item.eqData) label3d.userData.equipment = item.eqData;
        label3d.userData.eqRoom = roomName;
        label3d.userData.eqMode = '3d';
        label3d.visible = false;
